  text: 孫子注解卷之六
  hash: sha256:89504920a3d801d1d5337fc7b8ceec9df914f1e54d54ac64526c253d6a973ea3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0014_HFL_006-001a, image: hfl/0851/0851-100.png}
body:
  text: 虛實篇曹操曰能虛實彼己也李筌曰善用兵者以虛為實善破敵者以實為虛故次其篇杜牧曰夫兵者避實擊虛先須識彼我之虛實也王皙曰凡自守以實攻敵以虛也張預曰形篇言攻守勢篇說奇正善用兵者先知攻守兩齊之法然後知奇正先知奇正相變之術然後知虛實蓋奇正自攻守而用虛實由奇正而見故次勢孫子曰凡先處戰地而待敵者佚曹操李筌並曰力有餘也賈林曰先處形勝之地以待敵者則有備豫士馬間逸杜佑同賈林注王皙同曹操注張預曰形勢之地我先據之以待敵人之來則士馬間逸而力有餘後處戰地而趨戰者勞李筌曰力不足也太一遁甲云彼來攻我則我為主彼為客主易客難也是以太一遁甲言其定計之義故知勞佚事不同先後勢異杜牧曰後周遣將帥突厥之衆逼齊齊將段韶禦之時大雪之後周人以步卒為前鋒從西而下去城二里諸將欲逆擊之韶曰步人氣力勢自有限今積雪既厚逆戰非便不如陳以待之彼勞我佚破之必矣既而交戰大破之前鋒盡殪自餘遁矣賈林曰敵處便利我則不往引兵别據示不敵其軍敵謂我無謀必來攻襲如此則反令敵倦而我不勞孟氏曰若敵已處便勢之地已方赴利士馬勞倦則不利矣梅堯臣曰先至待敵則力完後至趨戰則力屈何氏曰戰國秦師伐韓圍閼與趙遣將趙奢救之軍士許歷曰秦人不意趙師至此其來氣盛將軍必厚集其陳以待之不然必敗又曰先據北山者勝後至者敗趙奢即發萬人趨之秦兵後至爭山不得上趙奢縱兵擊之大破秦軍遂解閼與之圍後漢初諸將征隗囂為囂所敗光武令悉軍栒邑未及至隗嚚乘勝使其將王元行巡將二萬餘人下隴因分遣巡取栒邑漢將馮異即馳馬欲先據之諸將皆曰虜兵盛而新乘勝不可與爭宜止軍此地徐思方略異曰虜兵方盛臨境狃忲小利遂欲深入若得栒邑三輔動搖是吾憂也夫攻者不足守者有餘今先據城以佚待勞非所以爭鋒也遂潜往閉城偃旗鼓行巡不知馳赴之異乘其不意卒擊鼓建旗而出巡軍驚亂奔走追而大破之東魏將齊神武伐西魏軍過蒲津涉洛至許原西魏將周文帝軍至沙苑齊神武聞周文至引軍來會詰朝候騎告齊神武軍且至周文步將李弼曰彼衆我寡不可平地置陳此東十里有渭曲可先據以待之遂軍至渭曲背水東西為陳合戰大破之張預曰便利之地彼已據之我方趨彼以戰則士馬勞倦而力不足或謂所戰之地我宜先到立陳以待彼則已佚矣彼先結陳我後至則我勞矣若宋人已成列楚師未既濟之類故善戰者致人而不致於人李筌曰故能致人之勞不致人之佚也杜牧曰致令敵來就我我當蓄力待之不就敵人恐我勞也後漢張步將費邑分遣其弟敢守巨里耿弇進兵先脅巨里使多伐樹木揚言以填坑塹數日有降者言邑聞弇欲攻巨里謀來救之弇乃嚴令軍中趨修攻具宣勒諸部後三日當悉力攻巨里城陰緩生口令得亡歸歸者以弇期告邑至日果自將精兵三萬餘人來救之弇喜謂諸將曰吾修攻具者欲誘致邑耳今來適其所求也即分三千人守巨里自引精兵上岡阪乘高大破之遂臨陳斬費邑杜佑曰言兩軍相遠彊弱俱敵彼可使歷險而來我不可歷險而往必能引致敵人已不往從也梅堯臣曰能令敵來則敵勞我不往就則我佚王皙曰致人者以佚乘其勞致於人者以勞乘其佚何氏曰令敵自來張預曰致敵來戰則彼勢常虛不往赴戰則我勢常實此乃虛實彼我之術也耿弇先逼巨里以誘致費邑近之能使敵人自至者利之也曹操曰誘之以利也李筌曰以利誘之敵則自遠而至也趙將李牧誘胸奴則其義也杜牧曰李牧大縱畜牧人衆滿野胸奴小入佯北不勝以數千人委之單于大喜率衆來入牧大破之殺胸奴十萬騎單于奔走歲餘不敢犯邊也梅堯臣曰何能自來示之以利何氏曰以利誘之而來我佚敵勞張預曰所以能致敵之來者誘之以利耳李牧佯北以致胸奴楊素毁車以誘突厥是也能使敵人不得至者害之也曹操曰出其所必趨攻其所必救李筌曰害其所急彼必釋我而自固也魏人寇趙邯鄲乞師於齊齊將田忌欲救趙孫臏曰夫解紛者不控捲救鬭者不搏撠批亢搗虛形格勢禁則自解爾今二國相持輕鋭竭於外疲老殆於內我襲其虛彼必解圍而奔命所謂一舉存趙而弊魏也後魏果釋趙而奔大梁遭齊人於馬陵魏師敗績杜牧曰曹公攻河北師次頓丘黑山賊于毒等攻武陽曹公乃引兵西入山攻毒本屯毒聞之棄武陽還曹公要擊於內大破之也陳皥曰子胥疲楚師孫臏走魏將之類也杜佑曰致其所必走攻其所必救能守其險害之要路敵不得自至故王子曰一猫當穴萬鼠不敢出一虎當溪萬鹿不敢過梅堯臣曰敵不得來當制之以害王皙曰以害形之敵患之而不至張預曰所以能令敵人必不得至者害其所顧愛耳孫臏直走大梁而解邯鄲之圍是也故敵佚能勞之曹操曰以事煩之李筌曰攻其不意使敵疲於奔命杜牧曰高熲言平陳之策於隋祖曰江北寒田收差晚江南土熱水田早熟量彼收穫之際徵兵上馬聲言掩襲彼必屯兵禦守足得廢其農時彼既聚兵我便解甲於是陳人始病梅堯臣曰撓之使不得休息王皙曰巧致之也何氏曰春秋時吳王闔閭問於伍員曰伐楚何如對曰楚執政衆莫適任患若為三師以肄焉一師至彼必皆出彼出則歸彼歸則出彼必道弊亟肄以疲之多方以誤之既罷而後以三軍繼之必大克之闔閭從之楚於是乎始病吳遂入郢張預曰為多方以誤之之術使其不得休息或曰彼若先處戰地以待我則是彼佚也我不可起而與之戰我既不往彼必自來即是變佚為勞也飽能饑之曹操曰絶糧道以饑之李筌曰焚其積聚芟其禾苗絶其糧道杜牧曰我為主敵為客則可以絶糧道而饑之如我為客敵為主則如之何答曰饑敵之術非止絶糧道但能饑之則是隋高熲平陳之策曰江南土薄舍多茅竹有畜積皆非地窖密遣人因風縱火待敵修立更復燒之不出數年自可財力俱盡遂行其策由是陳人益困三國時諸葛誕文欽據壽春及招吳請援司馬景王討之謂諸將曰彼當突圍決一朝之命或謂大軍不能久省食減口冀有他變料賊之情不出此二者當多方以亂之因命合圍遣羸疾寄穀淮北廪軍士豆人三升誕欽聞之果喜景王愈羸形以示之誕等益寬恣食俄而城中糧盡攻而拔之隋末宇文化及率兵攻李密於黎陽密知化及糧少因僞和之以弊其衆化及大喜恣其兵食冀密饋之其後食盡其將王智略張童仁等率所部兵歸於密前後相繼化及以此遂敗陳皥曰饑敵之術在臨事應機梅堯臣曰要其糧使不得饋王皙曰謂敵人足食我能使之饑乏耳曹公曰絶其糧道皙謂火積亦是也何氏曰如吳楚反周亞夫曰楚丘剽輕難與爭鋒願以梁委之絶其食道乃可制也亞夫會兵滎陽吳攻梁梁急請救亞夫引兵東北走昌邑深壁而守使輕騎弓高侯等絶吳楚兵後食道兵乏糧饑欲退數挑戰終不出乃引兵去精兵追擊大破之王莽末天下亂光武兄伯升起兵討莽為莽將甄阜梁丘賜所敗復收會兵衆還保於棘陽阜賜乘勝留輜重於藍鄉引精兵十餘萬人南渡橫臨沘水阻兩山間為營絶後橋示無還心伯升於是大饗軍士設盟約休卒三日為六部潜師夜起襲取藍鄉盡獲其輜重明晨自南攻甄阜下江兵自東南攻梁丘賜乏食陳潰遂斬阜賜唐輔公祏遣其僞將馮惠亮陳當世領水軍屯于博望山陳正通河間王孝恭徐紹宗率步騎軍于青州山河間王孝恭至堅壁不與鬪使奇兵斷其糧道賊漸餒夜薄我營孝恭安卧不動明日縱羸兵以攻賊壘使盧祖尚率精騎列陳以待之俄而攻壘者敗走出追奔數里遇祖尚軍與戰大敗之正通棄營而走張預曰我先舉兵則我為客彼為主為客則食不足為主則飽有餘若奪其畜積掠其田野因糧於彼館穀於敵則我反飽彼反饑矣則是變客為主也不必焚其積聚廢其農時然後能饑敵矣或彼為客則絶其糧道廣武君欲請奇兵以遮絶韓信軍後是也安能動之曹操曰攻其所必愛出其所必趨則使敵不得不相救也李筌曰出其所必趨擊其所不意攻其所必愛使不得不救也杜牧曰司馬宣王攻公孫文懿於遼東阻遼水以拒魏軍宣王曰賊堅營高壘以老我師攻之正入其計古人云敵雖高壘不得不與我戰者攻其所必救我今直指襄平則人懷內懼懼而求戰破之必矣遂整陳而過賊見兵出其後果來邀之乃縱擊大破之竟平遼東陳皥曰左傳楚伐宋宋告急於晋晋先軫曰我執曹君而分曹衛之田以賜宋人楚愛曹衛必不許也喜賂怒頑能無戰乎遂破楚師孟氏注同曹操梅堯臣曰趨其所顧所不得止王皙同李筌注何氏曰攻其所愛豈能安視而不動哉張預曰彼方安守以為自固之術不欲速戰則當攻其所必救使不得已而須出臾駢堅壁秦伯挑其裨將遂皆出戰是也出其所不趨趨其所不意曹操曰使敵不得相往而救之也何氏曰令敵人須應我行千里而不勞者行於無人之地也曹操曰出空擊虛避其所守擊其不意李筌曰出敵無備從孤擊虛何人之有杜牧曰梁元帝時西蜀稱帝率兵東下將攻元帝西魏大將周文帝曰平蜀制梁在兹一舉諸將多有異同文帝謂將軍尉遲迥曰伐蜀之事一以委公然計將安出迥曰蜀與中國隔絶百餘年矣恃其山川險阻不虞我師之至宜以精甲鋭騎星夜奔襲之平路則倍道兼行險途則緩兵漸進出其不意衝其腹心必向風不守竟以平蜀言不勞者空虛之地無敵人之虞行止在我故不勞也陳皥曰夫言空虛者非止為敵人不備也但備之不嚴守之不固將弱兵亂糧少勢孤我整軍臨之彼必望風自潰是我不勞苦如行無人之地梅堯臣曰出所不意何氏曰曹公北征烏桓謀臣郭嘉曰兵貴神速今千里襲人輜重多難以趨利且彼聞之得以為備不如留輜重輕兵兼道以出掩其不意公乃密出盧龍塞直指單于庭虜卒聞公至惶怖合戰大破之斬踓頓及名王已下又唐吐谷渾寇邊以李靖為西海道行軍大總管輕途二千里行空虛之地平吐谷渾而還故太宗曰且李靖三千輕騎深入虜庭克復定襄古今未有也張預曰掩其空虛攻其無備雖千里之征人不疲勞若鄧文伐蜀由陰平之徑行無人之地七百餘里是也攻而必取者攻其所不守也李筌曰無虞易取杜牧曰警其東擊其西誘其前襲其後後漢張步都劇使弟藍守西安又令别將守臨淄去臨淄四十里耿弇引軍營其間弇視西安城小而堅藍兵又精臨淄名雖大其實易攻弇令軍吏治攻具後五日攻西安縱生口令歸藍聞之晨夜守城至期夜半弇勒諸將蓐食及明至臨淄城下護軍荀梁等爭之以為宜速攻西安弇曰西安聞吾欲攻日夜為備臨淄出其不意至必驚擾吾攻之一日必拔拔臨淄即西安勢孤所謂擊一得兩盡如其策後漢末朱隽擊黃巾賊帥韓忠於宛雋作長圍起土山以臨其城內因鳴鼓攻其西南賊悉衆赴之雋自將精兵五千掩其東北乘城而入忠乃退保小城惶懼乞降陳皥曰國家征上黨王宰知劉稹恃天井之險不為固守之計宰悉力攻奪而後守稹失其險終陷其巢穴也梅堯臣曰言擊其南實攻其北王皙曰攻其虛也謂將不能兵不精壘不堅備不嚴救不及食不足心不一爾張預曰善攻者動於九天之上使敵人莫之能備莫之能備則吾之所攻者乃敵之所不守也耿弇之克臨淄朱隽之討黃巾但其一端耳守而必固者守其所不攻也杜牧曰不攻尚守何況其所攻乎漢太尉周亞夫擊七國於昌邑也賊奔壁東南陬亞夫使備其西北俄而賊精卒攻西北不得入因遁走追破之陳皥曰無慮敵不攻慮我不守無所不攻無所不守乃用兵之計備也梅堯臣曰賊擊我西亦備乎東王皙曰守以實也謂將能兵精壘堅備嚴救及食足心一爾張預曰善守者藏於九地之下使敵人莫之能測莫之能測則吾之所守者乃敵之所不攻也周亞夫擊東南而備西北亦是其一端也故善攻者敵不知其所守善守者敵不知其所攻曹操曰情不泄也李筌曰善攻者器械多也東魏高歡攻鄴是也善守謹備也周韋孝寬守晋州是也杜牧曰攻取備禦之情不泄也賈林曰教令行人心附備守堅固微隱無形敵人猶豫智無所措也梅堯臣曰善攻者機密不泄善守者周備不隙王皙曰善攻者待敵有可勝之隙速而攻之則使其不能守也善守者常為不可勝則使其不能攻也云不知者攻守之計不知所出耳何氏曰言攻守之謀令不可測張預曰夫守則不足攻則有餘所謂不足者非力弱也蓋示敵以不足則敵必來攻此是敵不知其所攻也所謂有餘者非力彊也蓋示敵之有餘則敵必自守此是敵不知其所守也情不外泄積乎攻守者也微乎微乎至於無形神乎神乎至於無聲故能為敵之司命李筌曰言二遁用兵之奇正攻守微妙不可形於言說也微妙神乎敵之死生懸形於我故曰司命杜牧曰微者靜也神者動也靜者守動者攻敵之死生悉懸於我故如天之司命杜佑曰言其微妙所不可見也言變化之形倏忽若神故能料敵死生若天之司命也梅堯臣曰無形則微密不可得而窺無聲則神速不可得而知王皙曰微密則難窺神速則難應故能制敵之命何氏曰武論虛實之法至於神微而後見成功之極也吾之實使敵視之為虛吾之虛使敵視之為實敵之實吾能使之為虛敵之虛吾能知其非實蓋敵不識吾虛實而吾能審敵之虛實也吾欲攻敵也知彼所守者為實而所不守者為虛吾將避其堅而攻其脆批其亢而搗其虛敵欲攻我也知彼所攻者為不急而所不攻者為要吾將示敵之虛而鬪吾之實彼示形在東而吾設備於西是故吾之攻也彼不知其所當守吾之守也敵不料其所當攻攻守之變出於虛實之法或藏九地之下以喻吾之守或動九天之上以比吾之攻滅跡而不可見韜聲而不可聞若從地出天下倏出間入星耀鬼行入乎無間之域旋乎九泉之淵微之微者神之神者至於天下之明目不能窺其形之微天下之𦖟耳不能聽其聲之神有形者至於無形有聲者至於無聲非無形也敵人不能窺也非無聲也敵人不能聽也虛實之變極也善守兵者通於虛實之變遂可以入於神微之奧不善者案然尋微窮神而泥其用兵之跡不能泯其形聲而至於聞見者是不知神微之妙固在虛實之變也三軍之衆百萬之師安得無形與聲哉但敵人不能窺聽耳張預曰攻守之術微妙神密至於無形之可覩無聲之可聞故敵人死生之命皆主於我也進而不可禦者衝其虛也退而不可追者速而不可及也曹操曰卒往進攻其虛懈退又疾也李筌曰進者襲空虛懈怠退者必輜重在先行遠而大軍始退是以不可追後趙王石勒兵在葛陂苦雨欲班師于鄴懼晋人躡其後用張賓計令輜重先行遠而不可及也此筌以速字為遠者也杜牧曰既攻其虛敵必敗敗喪之後安能追我我故得以疾退也陳皥曰杜說非也曹公之圍張繡也城未拔力未屈而去之繡兵出襲其後賞詡止之繡不聽果被曹公所敗繡謂詡曰公既能知其敗必能知其勝詡曰復以敗卒襲之繡從之曹公果敗豈是敗喪之後不能追之哉蓋言乘虛而進敵不知所禦逐利而退敵不知所追也杜佑曰神天其虛空也梅堯臣曰進乘其虛則莫我禦退因其弊則莫我追何氏曰兵進則衝虛兵退則利速我能制敵而敵不能制我也張預曰對壘相持之際見彼之虛隙則急進而搗之敵豈能禦我也獲利而退則速還璧以自守敵豈能追我也兵之情主速風來電往敵不能制故我欲戰敵雖高壘深溝不得不與我戰者攻其所必救也曹操李筌曰絶其糧道守其歸路攻其君主也杜牧曰我為主敵為客則絶其糧食守其歸路若我為客敵為主則攻其君主司馬宣王攻遼東直指襄平是也梅堯臣曰攻其要害王皙曰曹公曰絶糧道守歸路攻君主也皙謂敵若堅守但能攻其所必救則與我戰矣若耿弇欲攻巨里以致費邑亦是也何氏曰如魏將司馬宣王征公孫文懿泛舟潜濟遼水作長圍忽棄賊而向襄平諸將言不攻賊而作長圍非所以示衆也宣王曰賊堅營高壘欲以老吾兵也古人言曰敵雖高壘不得不與我戰者攻其所必救也賊大衆在此則窟穴虛矣我直指襄平必人懷內懼懼而求戰破之必矣遂整陳而過賊見兵出其後果邀之宣王謂諸將曰所以不攻其營正欲致此不可失也乃縱兵逆擊大破之三戰皆捷唐馬燧討田悅時軍糧少悅深壁不戰燧令諸軍持十日糧進次倉口與悅夾洹水而軍李抱真李芃問曰糧少而深入何也燧曰糧少利速戰兵法善於致人不致於人今田悅與淄青兖三軍為首尾計欲不戰以老我師若分兵擊其左右兵少未可必破悅且來救是前後受敵也兵法所謂攻其必救彼固當戰也燧為諸軍合而破之燧乃造三橋道逾洹水日挑戰悅不敢出恆州兵以軍少懼為燧所并引軍合於悅悅與燧明日復挑戰乃伏兵萬人欲邀燧燧乃引諸軍半夜皆食先雞鳴時擊鼓吹角潜師傍洹水徑赴魏州令曰聞賊至則止為陳又令百騎吹鼓角皆留於後仍抱薪持火待軍畢發止鼓角匿其旁伺悅軍畢渡焚其橋軍行十數里乃率淄青兖州步騎四萬餘人踰橋掩其後乘風縱火鼓譟而進燧乃坐甲令無動命前除草斬荆棘廣百步以為陳募勇力得五千餘人分為前列以候賊至比悅軍至則火止氣乏力少衰乃縱兵擊之悅軍大敗悅走橋橋已焚矣悅軍亂赴水斬首二萬淄青軍殆盡張預曰我為客彼為主我兵彊而食少彼勢弱而糧多則利在必戰敵人雖有金城湯池之固不得守其險而必來與我戰者在攻其所顧愛使之相救援也若楚人圍宋晋將救之狐偃曰楚始得曹而新婚於衛若伐曹衛楚必救之則宋免矣從之而解又晋宣帝討公孫文懿忽棄賊而走襄平討其巢穴賊果出邀之遂逆擊三戰皆捷亦其義也我不欲戰畫地而守之曹操曰軍不欲煩也李筌曰拒境自守也若入敵境則用天一遁甲真人閉六戊之法以刀畫地為營也孟氏曰以物畫地而守喻其易也蓋我能戾敵人之心不敢至也敵不得與我戰者乖其所之也曹操曰乖戾也戾其道示以利害使敵疑也李筌曰乖異也設奇異而疑之是以敵不可得與我戰漢上谷太守李廣縱馬卸安疑也杜牧曰言敵來攻我我不與戰設權變以疑之使敵人疑惑不決與初來之心乖戾不敢與我戰也曹公爭漢中地蜀先主拒之時將趙雲守别屯將數十騎輕出卒遇大軍雲且鬪且却公軍追至圍雲入營史大開門偃旗息鼓曹公軍疑有伏引去諸葛武侯屯於陽平使魏延諸將并兵東下武侯惟留萬人守城候白司馬宣王曰亮在城中兵少力弱將士失色亮時意氣自若敕軍中悉卧旗息鼓不得輒出開四門掃地却灑宣王疑有伏於是引去趨北山亮謂參佐曰司馬懿謂吾有設伏循山走矣宣王後知頗以為恨曹公與吕布相持公軍出收麥布領衆卒至公營止有千人出陳半隱於堤下吕布遲疑不敢進曰曹操多詐勿入伏中遂引兵去陳皥曰左傳楚令尹子元伐鄭入自純門至于遠市懸門不發子元曰鄭有人焉乃還賈林曰置疑兵於敵惡之所屯營於形勝之地雖未修壘塹敵人不敢來攻於我也梅堯臣曰畫地喻易也乖其道而示以利使其疑而不敢進也王皙曰畫地言易且明制之必有道也張預曰我為主彼為客我糧多而卒寡彼食少而兵衆則利在不戰雖不為營壘之固敵必不敢來與我戰者示以疑形乖其所往也若楚人伐鄭鄭懸門不發效楚言而出楚師不敢進而遁又司馬懿欲攻諸葛亮亮偃旗卧鼓開門却灑懿疑有伏兵遂引而去亦其義也故形人而我無形則我專而敵忿杜佑曰我專一而敵分散梅堯臣曰他人有形我形不見故敵分兵以備我張預曰吾之正使敵視以為奇吾之奇使敵視以為正形人者也以奇為正以正為奇變化紛紜使敵莫測無形者也敵形既見我乃合衆以臨之我形不彰彼必分勢以防備我專為一敵分為十是以十攻其一也杜佑曰我料見敵形審其虛實故所備者少專為一屯以我之專擊彼之散卒為十共擊一也梅堯臣曰離一為十我常以十分擊一分則我衆而敵寡杜佑曰我專為一故衆敵分為十故寡張預曰見敵虛實不勞多備故專為一屯彼則不然不見我形故分為十處是以我之十分擊敵之一分也故我不得不衆敵不得不寡能以衆擊寡者則吾之所與戰者約矣杜牧曰約猶少也我深塹高壘滅跡韜聲出入無形攻取莫測或以輕兵健馬衝其空虛或以彊弩長弓奪其要害觸左履右突後驚前晝日誤之以旌旗暮夜惑之以大鼓故敵人畏懼分兵防虞譬如登山瞰城垂簾視外敵人分張之勢我則盡知我之攻守之方敵則不測故我能專一敵則分離專一者力全分離者力寡以全擊寡故能必勝也杜佑曰言約少而易勝梅堯臣曰以專擊分則我所敵少也王皙曰多為之形使敵備已其實攻者則無備也故我專敵分矣專則衆分則寡十攻一者大約言耳何氏同杜牧注張預曰夫勢聚則彊兵散則弱以衆彊之勢擊寡弱之兵則衆力少而成功多矣吾所與戰之地不可知杜佑曰言舉動微密情不可見使彼知所出而不知吾所舉知所舉而不知吾所集張預曰無形勢故也不可知則敵所備者多梅堯臣曰敵不知則處處為備敵所備者多則吾所與戰者寡矣曹操曰形藏敵疑則分離其衆備我也言少而易擊也王皙曰與敵必戰之地不可使敵知之知則并力得拒於我曹公曰形藏則敵疑張預曰不能測吾車果何出騎果何來徒果何從故分離其衆所在輒為備遂致衆散而弱勢分而衰是以吾所與接戰之處以大衆臨孤軍也故備前則後寡備後則前寡備左則右寡備右則左寡無所不備則無所不寡杜佑曰言敵之所備者多則士卒無不分散而少梅堯臣曰所備皆寡也寡者備人者也衆者使人備已者也曹操曰上所謂形藏敵疑則分離其衆以備我也李筌曰陳兵之地不可令敵人知之彼疑則謂衆離而備我也杜牧曰所戰之地不可令敵人知之我形不泄則左右前後遠近險易敵人不知亦不知我何處來攻何地會戰故分兵徹衛處處防備形藏者衆分多者寡故衆者必勝也寡者必敗也孟氏曰備人則我散備我則彼分杜佑曰敵分散而少者皆先備人也敵所以備已多者由我專而衆故也梅堯臣曰使敵愈備則愈寡也王皙曰左右前後俱備則俱寡何氏同諸注張預曰左右前後無處不為備則無處不兵寡也所以寡者為兵分而廣備於人也所以衆者為勢專而使人備已也故知戰之地知戰之日則可千里而會戰曹操曰以度量知空虛會戰之日李筌曰知戰之地則舟車步騎之所便也魏武以北土未安捨鞍馬仗舟楫與吳越爭强是以有黃蓋之敗吳王濞驅吳楚之衆奔馳於梁鄭之間此不知戰地日者故太一遁甲曰計法三門五將主客成敗則可知也於是千里會戰而勝杜牧曰宋武帝使朱齡石伐譙縱於蜀宋武曰往年劉敬宣出內水向黃武無功而退賊謂我今應從外水來而料我當出其不意猶從內水來也如此必以重兵守涪城以備內道若向黃武正墮其計今以大衆自外取成都疑兵向內水此則制敵之奇也而慮此聲先馳賊知虛實别有函書全封付齡石函邊書曰至白帝乃開諸軍未知處分所由至白帝發書曰衆軍悉從外水取成都臧熹朱林於中水取廣漢使羸弱乘高艦十餘由內水向黃武譙縱果以重兵備內水齡石滅之陳皥曰杜注止言知戰之地未叙知戰之曰我若伐敵至期不得與我戰敵來侵我我必預備以應之項羽謂曹咎曰我十五日必定梁地復與將軍會苟不知必戰之日安能為約孟氏曰以度量知空虛先知戰地之形又審必戰之日則可千里期會先往以待之若敵已先至可不往以勞之杜佑曰夫善戰者必知戰之日知戰之地度道設期分軍雜卒遠者先進近者後發千里之會同時而合若會都市其會地之日無令敵知知之則所備處少不知則所備處多備寡則專備多則分分則力散專則力全梅堯臣曰若能度必戰之地必戰之日雖千里之遠可剋期而與戰王皙曰必先知地利敵情然後以兵法之度量計其遠近知其空虛審敵趣應之所及戰期也如是則雖千里可會戰而破敵矣故曹公曰以度量知空虛會戰之日者是也張預曰凡舉兵伐敵所戰之地必先知之師至之日能使敵人如期而來以與我戰知戰地日則所備者專所守者固雖千里之遠可以赴戰若蹇叔知晋人禦師必於殽是知戰地也陳湯料烏孫圍兵五日必解是知戰曰也又若孫臏龐涓於馬陵度日暮必至是也不知戰地不知戰日則左不能救右右不能救左前不能救後後不能救前而況遠者數十里近者數里乎杜牧曰管子曰計未定而出兵則戰而自毁也杜佑曰敵已先據形勢之地已方趣利欲戰則左右前後疑惑進退不能相救況十數里之間也梅堯臣曰不能救者寡也左右前後尚不能救況遠乎張預曰不知敵入何地會兵何日接戰則所備者不專所守者不固忽遇勍敵則倉遽而與之戰左右前後猶不能相援又況首尾相去之遠乎以吾度之越人之兵雖多亦奚益於勝敗哉曹操曰越人相聚紛然無知也或曰吳越讎國也李筌曰越過也不知戰地及戰日兵雖過人安能知其勝敗乎陳皥曰孫子為吳王闔閭論兵吳與越讎故言越謂過人之兵非義也賈林曰不知戰地不知戰日士衆雖多不能制勝敗之政亦何益也梅堯臣曰吳越敵國也言越人雖多亦當為我分之而寡也王皙曰此武相時料敵也言越兵雖多苟不善相救亦無益於勝敗之數張預曰吾字作吳字之誤也吳越鄰國數相侵伐故下文云吳人與越人相惡也言越國之兵雖曰衆多但不知戰地戰日當分其勢而弱也故曰勝可為也牡牧曰為勝在我故言可為之孟氏曰若使敵不知戰地期日我之必勝可常有也梅堯臣同杜牧注王皙何氏同孟氏注張預曰為勝在我故也形篇云勝可知而不可為今言勝可為者何也蓋形篇論攻守之勢言敵若有備則不可必為也今則主以越兵而言度越人必不能知所戰之地日故云可為也敵雖衆可使無鬪杜牧曰以下四事度量之敵兵雖衆使其不能與我鬪勝也孟氏曰敵雖多兵我能多設變詐分其形勢使不能併力也賈林曰敵雖衆多不知己之兵情常使急自備不暇謀鬪梅堯臣曰苟能寡何有鬪王皙曰多益不救奚所恃而鬪張預曰分散其勢不得齊力同進則焉能與我爭故策之而知得失之計李筌曰用兵者取勝之兵法可制太一遁甲五將之計以定關格掩迫之數得失可知也孟氏曰策度敵情觀其施為則計數可知賈林曰俎帷幄之間以策籌之我得彼失之計皆先知也杜佑曰策度敵情觀其所施計數可知梅堯臣曰彼得失之計我以算策而知王皙曰策其敵情以見得失之數張預曰籌策敵情知其計之得失若薛公料黥布之三計是也作之而知動靜之理李筌曰候望雲氣風鳥人情則動靜可知也王莽時王尋征昆陽有雲氣如壞山當營而墜去地數丈而光武知其必敗梁王僧辨營上有如堤之氣候景知其必勝風鳥貪豺之類也此筌以作字為候字者也杜牧曰作激作也言激作敵人使其應我然後觀其動靜理亂之形也魏武侯曰兩軍相當不知其將如何吳起曰令賤勇者將鋭而擊交合而北北而勿罰觀敵進退一坐一起其政以理奔北不追見利不取此將有謀若其悉衆追北旗幡雜亂行止縱橫貪利務得若此之類將令不行擊而勿疑陳皥曰作為也為之利害使敵赴之則知進退之理也賈林曰善覘候者必知其動靜之理杜佑曰喜怒動作察其舉止則情理可得故知動靜權變為其勝負也梅堯臣曰彼動靜之理因我所發而見王皙曰候其理當動以否張預曰發作久之觀其喜怒則動靜之理可得而知也若晋文公拘宛春以怒楚將子玉子玉遂乘晋軍是其躁動也諸葛亮遺巾幗婦人之飾以怒司馬宣王宣王終不出戰此是其安靜也形之而知死生之地李筌曰夫破陳設奇或偃旗鼓形之以弱或虛列竈火幡幟形之以彊投之以死致之以生是以死生因地而成也韓信下井陘劉裕過大峴則其義也杜牧曰死生之地蓋戰地也投之死地必生置之生地必死言我多方誤撓敵人以觀其應我之形然後隨而制之則死生之地可知也陳皥曰敵人既有動靜則我得見其形有謀者所處之地必生無謀者所投之地必死也孟氏曰形相敵情觀其所據則地形勢生死可得而知賈林曰見所理兵形則可知其死所梅堯臣曰彼生死之地我因形見而識何氏同杜牧注張預曰形之以弱則彼必進形之以彊則彼必退因其進退之際則知彼所據之地死與生也上文云善動敵者形之敵必從之是也死地謂傾覆之地生地謂便利之地角之而知有餘不足之處曹操曰角量也李筌曰角量也量其力精勇則虛實可知也杜牧曰角量也言以我之有餘角量敵人之有餘以我之不足角量敵人之不足管子曰善攻者料衆以攻衆料食以攻食食不存不攻備不存不攻司馬宣王伐遼東司馬陳圭曰昔攻上庸八部並進晝夜不息故能一旬之半拔堅城斬孟達今者遠來而更安緩愚切惑焉王曰孟達衆少而食支一年吾將四倍於達而糧不淹一月以一月圖一年安可不速以四擊一正命半解猶當為之是以不計死傷與糧競也今賊衆我寡賊飢我飽雨水乃爾功力不設賊糧垂盡當示無能以安之既而雨止晝夜攻之竟平遼東梅堯臣曰彼有餘不足之處我以角量而審王皙曰角謂相角也角彼我之力則知有餘不足之處然後可以謀攻守之利也此而上亦所以量敵知戰張預曰有餘彊也不足弱也角量敵形知彼彊弱之所唐太宗曰凡臨陳常以吾彊對敵弱常以吾弱對敵彊苟非角量安得知之故形兵之極至於無形無形則深間不能窺智者不能謀李筌曰形敵之妙入於無形間不可窺智不可謀是謂形也杜牧曰此言用兵之道至於臻極不過於無形無形則雖有間者深來窺我不能知我之虛實彊弱不泄於外雖有智能之士亦不能謀我也梅堯臣曰兵本有形虛實不露是以無形此極致也雖使間者以情釣智者以謀料可得乎王皙曰制兵形於無形是謂極致孰能窺而謀之哉何氏曰行列在外機變在內因形制變人難窺測可謂知微張預曰始以虛實形敵敵不能測故其極致卒歸於無形既無形可覩無迹可求則間者不能窺其隙智者無以運其計因形而錯勝於衆衆不能知曹操曰因敵形而立勝李筌曰錯置也設形險之勢因士卒之勇而取勝焉軍事尚密非衆人之所知也杜牧曰窺形可置勝敗非智者不能固非衆人所能得知也梅堯臣曰衆知我能置勝矣不知因敵之形何氏曰因敵置勝衆不能知張預曰因敵變動之形以置勝非衆人所能知人皆知我所以勝之形而莫知吾所以制勝之形曹操曰不以一形之勝萬形或曰不備知也制勝者人皆知吾所以勝莫知吾因敵形制勝也李筌曰戰勝人知之制勝之法幽密人莫知杜牧曰言已勝之後但知我制敵人使有敗形本自於我然後我能勝之也上文云近而示之遠遠而示之近利而誘之亂而取之實而備之彊而避之怒而撓之卑而驕之佚而勞之親而離之斯皆制勝之道人莫知之也陳皥曰人但知我勝敵之善不能知我因敵之敗形梅堯臣曰知得勝之跡而不知作勝之象王皙曰若韓信背水拔幟是也人但見水上軍殊死戰不可敗及趙軍驚亂遁走不知吾能制使之然者以何道也張預曰立勝之迹人皆知之但莫測吾因敵形而制此勝也故其戰勝不復而應形於無窮曹操曰不重復動而應之也李筌曰不復前謀以取勝隨宜制變也杜牧曰敵每有形我則始能隨而應之以取勝杜佑曰死官也賈林曰應敵形而制勝乃無窮梅堯臣曰不執故態應形有機王皙曰夫制勝之理惟一而所勝之形無窮也何氏曰已勝之分不再用也敵來斯應不循前法故不窮張預曰已勝之後不復更用前謀但隨敵之形而應之出奇無窮也夫兵形象水孟氏曰兵之形勢如水流遲速之勢無常也水之形避高而趨下梅堯臣曰性也兵之形避實而擊虛梅堯臣曰利也張預曰水趨下則順兵擊虛則利水因地而制流杜牧曰因地之下梅堯臣曰順高下也張預曰方圓斜直因地而成形兵因敵而制勝李筌曰不因敵之勢吾何以制哉夫輕兵不能持久守之必敗重兵挑之必出怒兵辱之彊兵緩之將驕宜卑之將貪宜利之將疑宜反間之故因敵而制勝杜牧曰因敵之虛也賈林曰見敵盛衰之形我得因而立勝杜佑曰言水因地之傾側而制其流兵因敵之虧闕而取其勝者也梅堯臣曰隨虛實也王皙曰謂隄防疏導之也何氏曰因敵彊弱而成功張預曰虛實彊弱隨敵而取勝故兵無常勢梅堯臣曰應敵為勢張預曰敵有變動故無常勢水無常形梅堯臣曰因地為形孟氏曰兵有變化地有方圓張預曰地有高下故無常形能因敵變化而取勝者謂之神曹操曰勢盛必衰形露必敗故能因敵變化取勝若神李筌曰能知此道謂之神兵也杜牧曰兵之勢因敵乃見勢不在我故無常勢如水之形因地乃有形不在水故無常形水因地之下則可漂石兵因敵之應則可變化如神者也梅堯臣曰隨而變化微不可測王皙曰兵有常理而無常勢水有常性而無常形兵有常理者擊虛是也無常勢者因敵以應之也水有常性者就下是也無常形者因地以制之也夫兵勢有變則雖敗卒尚復可使擊勝兵況精鋭乎何氏曰行權應變在智略智略不可測則神妙者也張預曰兵勢已定能因敵變動應而勝之其妙如神故五行無常勝杜佑曰五行更王王皙曰迭相克也四時無常位杜佑曰四時迭用王皙曰迭相代也日有短長月有死生曹操曰兵無常勢盈縮隨敵李筌曰五行者休囚王相遞相勝也四時者寒暑往來無常定也日月者周天三百六十五度四分度之一百刻者春秋二分則日夜均夏至之日晝六十刻夜四十刻冬至之日晝四十刻夜六十刻長短不均也月初為朔八日為上弦十五日為望二十四日為下弦三十日為晦則死生義也孫子以為五行四時日月盈縮無常況於兵之形變安常定也梅堯臣曰皆所以象兵之隨敵也王皙曰皆喻兵之變化非一道也張預曰言五行之休王四時之代謝日月之盈昃皆如兵勢之無定也孫子注解卷之六
