body:
  text: 行軍篇曹操曰擇便利而行也王皙曰行軍當據地便察敵情也張預曰知九地之變然後可以擇利而行軍故次九變孫子曰凡處軍相敵王皙曰處軍凡有四相敵凡三十有一張預曰自絶山依谷至伏姦之所處則處軍之事也自敵近而靜至必謹察之則相敵之事也相猶察也料也絶山依谷曹操曰近水草利便也李筌曰軍我敵彼也相其依止則勝敗之數彼我之勢可知也絶山守險也谷近水草夫列營壘必先分卒守隘縱畜牧收樵採而後寧杜牧曰絶過也依近也言行軍經過山險須近谷而有水草之利也吳子曰無當天竈大谷之口言不可當谷但近谷而處可也賈林曰兩軍相當敵宜擇利而動絶山跨山依谷傍谷也跨山無後患依谷有水草也梅堯臣曰前為山所隔則依谷以為固王皙曰絶度也依謂附近耳曹公曰近水草便利也張預曰絶猶越也凡行軍越過山險必依附溪谷而居一則利水草一則負險固後漢武都羌為寇馬援討之羌在山上援據便地奪其水草不與戰羌窮困悉降羌不知依谷之利也視生處高曹操曰生者陽也李筌曰向陽曰生在山曰高生高之地可居也杜牧曰言須處高而面南也陳皥曰若地有東西其法何如答曰然則面東也賈林曰居陽曰生視生為無蔽冒物也處軍當在高杜佑曰高陽也視謂目前生地處軍當在高梅堯臣曰若在陵之上必向陽而居處高乘便也張預曰視生謂面陽也處軍當在高阜戰隆無登曹操曰無迎高也李筌曰敵自高而下我無登而取之杜牧曰隆高也言敵人在高我不可自下往高迎敵人而接戰也作戰降無登降下也賈林曰戰宜乘下不可迎高也杜佑曰無迎高也謂山下也戰於山下敵引之上山無登逐也梅堯臣曰敵處地之高不可登而戰張預曰敵處隆高之地不可登迎與戰一本作戰降無登迎謂敵下山來戰引我上山則不可登迎此處山之軍也梅堯臣曰處山當知此三者張預曰凡高而崇者皆謂之山處山拒敵以上三事為法絶水必遠水曹操李筌曰引敵使渡杜牧曰魏將郭淮在漢中蜀主劉備欲渡漢水來攻諸將議衆寡不敵欲依水為陳以拒之淮曰此示弱而不足挫敵不如遠水為陳引而致之半濟而後擊備可破也既列陳備疑不敢渡梅堯臣曰前為水所隔則遠水以引敵王皙曰我絶水也曹說是也張預曰凡行軍過水欲舍止者必去水稍遠一則引敵使渡一則進退無礙郭淮遠水為陳劉備悟之而不渡是也客絶水而來勿迎之於水內令半濟而擊之利李筌曰韓信殺龍沮於濰水夫槩敗楚子於清發是也杜牧曰楚漢相持項羽自擊彭越令其大司馬曹咎守成臯漢軍桃戰咎涉汜水戰漢軍候半涉擊大破之水內乃汭也誤為內耳梅堯臣曰敵之方來迎於水濱則不渡王皙曰內當作汭迎於水汭則敵不敢濟遠則趨利不及當得其宜也何氏曰如春秋時宋公及楚人戰于泓宋人既成列楚人未既濟司馬曰彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殲焉宋公違之故敗也吳伐楚楚師敗及清發將擊之夫槩王曰困獸猶鬭況人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬭心矣半濟而後可擊也從之又敗之魏將郭淮在漢中蜀主劉備欲渡漢水來攻時諸將等議曰衆寡不敵欲依水為陳以拒之淮曰此則示弱而不足以挫敵非算也不如遠水為陳引而致之半濟而後擊備可破也既陳備疑不敢渡唐武德中薛萬均與羅藝守幽燕竇建德率衆十萬寇范陽萬均謂藝曰衆寡不敵今若出鬭百戰百敗當以計取之可令羸兵弱馬阻水背城為陳以誘之賊若渡水交兵請公精騎百人伏於城側待其半渡而擊之從之建德渡水萬均擊破之張預曰敵若引兵渡水來戰不可迎之於水邊俟其半濟行列未定首尾不接擊之必勝公孫瓚敗黃巾賊於東光薛萬均破竇建德於范陽皆用此術也欲戰者無附於水而迎客曹操曰附近也李筌曰附水迎客敵必不得渡而與我戰杜牧曰言我欲用戰不可近水迎敵恐敵人疑我不渡也義與上同但客主詞異耳杜佑曰附近也近水待敵不得渡也梅堯臣曰必欲戰亦莫若遠水王皙曰我利在戰則當差遠使敵必渡而與之戰也張預曰我欲必戰勿近水迎敵恐其不得渡我不欲戰則阻水拒之使不能濟晋將陽處父與楚將子上夾泜水而軍陽子退舍欲使楚人渡子上亦退舍欲令晋師渡遂皆不戰而歸視生處高曹操曰水上亦當處其高也前向水後當依高而處之梅堯臣曰水上亦據高而向陽王皙曰曹公曰水上亦當處其高皙謂非謂近水之地下曹注云恐溉我也疑當在此下何氏曰視生向陽遠視也軍處高遠見敵勢則敵人不得潜來出我不意也張預曰或岸邊為陳或水上泊舟皆須面陽而居高無迎水流曹操曰恐溉我也李筌曰恐溉我也智伯灌趙襄子光武潰王尋迎水處高乃敗之杜牧曰水流就下不可於卑下處軍也恐敵人開决灌浸我也上文云視生處高也諸葛武侯曰水上之陳不逆其流此言我軍舟船亦不可泊於下流言敵人得以乘流而薄我也賈林曰水流之地可以溉吾軍可以流毒藥迎逆也一云逆流而營軍兵家所忌梅堯臣曰無軍下流防其决灌舳艫之戰逆亦非便王皙曰當乘上流魏曹仁征吳欲攻濡須洲中蔣濟曰賊據西岸列船上流而兵入洲中是謂自內地獄危亡之道也仁不從而敗何氏曰順流而戰則易為力張預曰卑地勿居恐决水溉我舟戰亦不可處下流以彼沿我泝戰不便也兼慮敵人投毒於上流楚令尹拒吳卜戰不吉司馬子魚曰我得上流何故不吉遂决戰果勝是軍須居上流也此處水上之軍也梅堯臣曰處水上當知此五者張預曰凡近水為陳皆謂水上之軍水上拒敵以上五事為法絶斥澤惟亟去無留陳皥曰斥鹹鹵之地水草惡漸洳不可處軍新訓曰地固斥澤不生五穀者是也賈林曰鹹鹵之地多無水草不可久留梅堯臣曰斥遠也曠蕩難守故不可留王皙曰斥鹵也地廣且下而無所依張預曰刑法志云山川沈斥顔師古注曰沈深水之下斥鹹鹵之地然則斥澤謂瘠鹵漸洳之所也以其地氣濕潤水草薄惡故宜急過若交軍於斥澤之中必依水草而背衆樹曹操曰不得已與敵會於斥澤中李筌曰急過不得戰必依水背樹夫有水樹其地無陷溺也杜牧曰斥鹵之地草木不生謂之飛鋒言於此忽遇敵即須擇有水草林木而止之杜佑曰一本作背衆木言不得已與敵戰而會斥澤之中當背稠樹以為固守蓋地利兵之助也梅堯臣曰不得已而會敵則依近水草背倚衆木王皙曰猝與敵遇於此亦必就利而背固也張預曰不得已而會兵於此地必依近水草以便樵汲背倚林木以為險阻此處斥澤之軍也梅堯臣曰處斥澤當知此二者張預曰處斥澤之地以上二事為法平陸處易曹操曰車騎之利也杜牧曰言於平陸必擇就其中坦易平穩之處以處軍使我車騎得以馳逐王皙同曹操注何氏同杜牧注張預曰平原廣野車騎之地必擇其坦易無坎陷之處以居軍所以利於馳突也而右背高前死後生曹操曰戰便也李筌曰夫人利用皆便於右是以背之前死致敵之地後生我自處杜牧曰太公曰軍必左川澤而右丘陵死者下也生者高也下不可以禦高故戰便於軍馬也賈林曰岡阜曰生戰地曰死後岡阜處軍穩前臨地用兵便高在右回轉順也梅堯臣曰擇其坦易車騎便利右背丘陵勢則有憑前低後隆戰者所便王皙曰凡兵皆宜向陽既後背山即前生後死疑文誤也張預曰雖是平陸須有高阜必右背之所以恃為形勢者也前低後高所以便乎奔擊也此處平陸之軍也梅堯臣曰處平陸當知此二者張預曰居平陸之地以上二事為法凡此四軍之利李筌曰四者山水斥澤平陸也張預曰山水斥澤平陸之四軍也諸葛亮曰山陸之戰不升其高水上之戰不逆其流草上之戰不涉其深平地之戰不逆其虛此兵之利也黃帝之所以勝四帝也曹操曰黃帝始立四方諸侯無不稱帝以此四地勝之也李筌曰黃帝始受兵法於風后而滅四方故曰勝四帝也梅堯臣曰四帝當為四軍字之誤歟言黃帝得四者之利處山則勝山處水上則勝水上處斥澤則勝斥澤處平陸則勝平陸也王皙曰四帝或曰當作四軍曹公曰黃帝始立四方諸侯無不稱帝以此四地勝之也一本無作亦何氏曰梅氏之說得之張預曰黃帝始立四方諸侯亦稱帝以此四地勝之按史記黃帝紀云與炎帝戰於阪泉與蚩尤戰於涿鹿北逐葷粥又太公六韜言黃帝七十戰而定天下此即是有四方諸侯戰也兵家之法皆始於黃帝故云然也凡軍好高而惡下梅堯臣曰高則爽塏所以安和亦以便勢下則卑濕所以生疾亦以難戰王皙曰有降無登且遠水患也張預曰居高則便於覘望利於馳逐處下則難以為固易以生疾貴陽而賤陰梅堯臣曰處陽則明順處陰則晦逆王皙曰久處陰濕之地則生憂疾且弊軍器也張預曰東南為陽西北為陰養生而處實曹操曰恃滿實也養生向水草可放牧養畜乘實猶高也梅堯臣曰養生便水草處實利糧道王皙曰養生謂水草糧糒之屬處實者倚固之謂張預曰養生謂就善水草放牧也處實謂倚隆高之地以居也軍無百疾是謂必勝李筌曰夫人處卑下必癘疾惟高陽之地可居也杜牧曰生者陽也實者高也言養之於高則無卑濕陰翳故百疾不生然後必可勝也梅堯臣曰能知上三者則勢勝可必疾氣不生張預曰居高面陽養生處厚可以必勝地氣乾熯故疾癘不作丘陵隄防必處其陽而右背之杜牧曰凡遇丘陵隄防之地常居其東南也梅堯臣曰雖非至高亦當前向明而右依實王皙曰處陽則人舒以和器健以利也張預曰面陽所以貴明顯背高所以為險固此兵之利地之助也梅堯臣曰兵所利者得形勢以為助張預曰用兵之利得地之助上雨水沫至欲涉者待其定也曹操曰恐半涉而水遽漲也李筌曰恐水暴漲杜牧曰言過溪澗見上流有沫此乃上源有雨待其沫盡水定乃可涉不爾半涉恐有暴水卒至也杜佑曰恐半渡水而遂漲上雨水當清而反濁沫至此敵人權遏水之占也欲以中絶軍凡地有水欲漲沫先至皆為絶軍當待其定也梅堯臣曰流沫未定恐有暴漲王皙曰水漲則沫涉步濟也曹說是也張預曰渡未及畢濟而大水忽至也沫謂水上泡漚凡地有絶澗前後嶮峻水橫其中天井四面峻坂澗壑所歸天牢三面環絶易入難出天羅草木蒙密鋒鏑莫施天陷卑下汙濘車騎不通天隙兩山相向洞道狹惡六害皆梅堯臣注必亟去之勿近也曹操曰山深水大者為絶澗中方高中央下為天井深山所過若蒙籠者為天牢可以羅絶人者為天羅地形陷者為天陷山澗道迫狹地形深數尺長數丈者為天隙杜牧曰軍讖曰地形坳下大水所及謂之天井山澗迫狹可以絶人謂之天牢澗水澄闊不測淺深道路泥濘人馬不通謂之天陷地多溝坑坎陷木石謂之天隙林木隱蔽蒹葭深遠謂之天羅賈林曰兩岸深闊斷人行為絶澗下中之下為天井四邊澗險水草相兼中央傾側出入皆難為天牢道路崎嶇或寬或狹細澀難行為天羅地多沮洳為天陷兩邊險絶形狹長而數里中間難通人行可以絶塞出入為天隙此六害之地不可近背也梅堯臣曰六害尚不可近況可留乎王皙曰皙謂絶澗當作絶天澗脫天字耳此六者皆自然之形也牢謂如獄牢羅謂如網羅也陷謂溝坑淤濘之屬隙謂木石若隙罅之地軍行過此勿近不然則脫有不虞智力無所施也張預曰溪谷深峻莫可過者為絶澗外高中下衆水所歸者為天井山險環繞所入者隘為天牢林木縱橫葭葦隱蔽者為天羅陂池泥濘漸車凝騎者為天陷道路迫狹地多坑坎者為天隙凡遇此地宜遠過不可近之吾遠之敵近之吾迎之敵背之曹操曰用兵常遠六害今敵近背之則我利敵凶李筌曰善用兵者致敵之受害之地也杜牧曰迎向也背倚也言遇此六害之地吾遠之向之則進止自由敵人近之倚之則舉動有阻故我利而敵凶也梅堯臣曰言六害當使我遠而敵附我向而敵倚則我利敵凶張預曰六害之地我既遠之向之敵自近之倚之我則行止有利彼則進退多凶也軍行有險阻潢井葭葦山林蘙薈者必謹覆索之此伏姦之所處也曹操曰險者一高一下之地阻者多水也潢者池也井者下也葭葦者衆草所聚山林者衆木所居也蘙薈者可屏蔽之處也此以上論地形也以下相敵情也李筌曰以下恐敵之奇伏誘詐也梅堯臣曰險阻隘也山林之所産潢井下也葭葦之所生皆蘙薈足以蒙蔽當掩搜恐有伏兵張預曰險阻丘阜之地多生山林潢井卑下之處多産葭葦皆蘙薈可以蒙蔽必降索之恐兵伏其中又慮姦細潜隱覘我虛實聽我號令伏姦當為兩事敵近而靜者恃其險也梅堯臣曰近而不動倚險故也王皙曰恃險故不恐也遠而挑戰者欲人之進也杜牧曰若近以挑我則有相薄之勢恐我不進故遠也陳皥曰敵人相近而不挑戰恃其守險也若遠而挑戰者欲誘我使進然後乘利而奮擊也梅堯臣同陳皥注王皙曰欲致人也挑謂擲驍敵求戰張預曰兩軍相近而終不動者倚恃險固也兩軍相遠而數挑戰者欲誘我之進也尉繚子曰分險者無戰心言敵人先分得險地則我勿與之戰也又曰挑戰者無全氣言相去遠則挑戰而延誘我進即不可以全氣擊之與此法同也其所居易者利也曹操曰所居利也李筌曰居易之地致人之利杜牧曰言敵不居險阻而居平易必有以便利於事也一本云士爭其所居者易利也陳皥曰言敵人得其地利則將士爭以居之也賈林曰敵之所居地多便利故挑我使前就已之便戰則易獲其利慎勿從之也梅堯臣曰所居易利故來挑戰王皙同曹操注張預曰敵人捨險而居易者必有利也或曰敵欲人之進故處於平易以示利而誘我也衆樹動者來也曹操曰斬伐樹木除道進來故動梅堯臣同曹操注張預曰凡軍必遣善視者登高覘敵若見林木動搖者是斬木除道而來也或曰不止除道亦將為兵器也若晋人伐木益兵是也衆草多障者疑也曹操曰結草為障欲使我疑也杜牧曰言敵人或營壘未成或拔軍潜去恐我來追或為掩襲故結草使往往相聚如有人伏藏之狀使我疑而不敢進也賈林曰結草多為障蔽者欲使我疑之於中兵必不實欲别為攻襲宜審備之杜佑曰結草多障欲使我疑稠草中多障蔽者敵必避去恐追及多作障蔽使人疑有伏焉張預曰或敵欲追我多為障蔽設留形而遁以避其追或欲襲我叢聚草木以為人屯使我備東而擊西皆所以為疑也鳥起者伏也曹操曰鳥起其上下有伏兵李筌曰藏兵曰伏杜佑曰下有伏兵往藏觸鳥而驚起也張預曰鳥適平飛至彼忽高起者下有伏兵也獸駭者覆也曹操曰敵廣陳張翼來覆我也李筌曰不意而至曰覆杜牧曰凡敵欲覆我必由他道險阻林木之中故驅起伏獸駭逸也覆者來襲我也陳皥曰覆者謂隱於林木之內潜來掩我候兩軍戰酣或出其左右或出其前後若驚駭伏獸也梅堯臣曰獸驚而奔旁有覆張預曰凡欲掩覆人者必由險阻草木中來故驚起伏獸奔駭也塵高而鋭者東來也杜牧曰車馬行疾仍須魚貫故塵高而尖杜佑曰車馬行疾塵相衝故高也梅堯臣曰蹄輪勢重塵必高鋭張預曰車馬行疾而勢重又轍迹相次而進故塵埃高起而鋭直也凡軍行須有探候之人在前若見敵塵必馳報主將如潘黨望晋塵使騁而告是也卑而廣者徒來也杜牧曰步人行遲可以並列故塵低而闊也梅堯臣曰人步低輕塵必卑廣王皙曰車馬起塵猛步人則差緩也張預曰徒步行緩而迹輕又行列疏遠故塵低而來散而條達者樵採也李筌曰煙塵之候晋師伐齊曳柴從之齊人登山望而畏其衆乃夜遁薪來即其義也此筌以樵採二字為薪來字杜牧曰樵採者各隨所向故塵埃散衍條達縱橫斷絶貌也梅堯臣曰樵採隨處塵必縱橫王皙曰條達纖微斷續之貌張預曰分遣厮役隨處樵採故塵埃散亂而成隧道少而往來者營軍也杜牧曰欲立營壘以輕兵往來為斥候故塵少也梅堯臣曰輕兵定營往來塵少張預曰凡分栅營者必遣輕騎四面近視其地欲周知險易廣狹之形故塵微而來辭卑而益備者進也曹操曰其使來卑辭使間視之敵人增備也杜牧曰言敵人使來言辭卑遜復增壘塗壁若懼我者是欲驕我使懈怠必來攻我也趙奢救閼與去邯鄲三十里增壘不進秦間來必善食遣之間以報秦將秦將果大喜曰閼與非趙所有矣奢既遣秦間乃倍道兼行掩秦不備擊之遂大破秦軍也梅堯臣曰欲進者外則卑辭內則益備款我也張預曰使來辭遜敵復增備欲驕我而後進也田單守即墨燕將騎劫圍之單身操版插與士卒分功使妻妾編行伍之間散食饗士乃使女子乘城約降燕大喜又收民金千鎰令富豪遣使遺燕將書曰城即降願無虜妻妾燕人益懈乃出兵擊大破之辭彊而進驅者退也曹操曰詭詐也杜牧曰吳王夫差北征會晋定公於黃池越王句踐伐吳吳晋方爭長未定吳王懼乃合大夫而謀曰無會而歸與會而先晋孰利王孫雒曰必會而先之吳王曰先之若何雒曰今夕必挑戰以廣民心乃能至也於是吳王以帶甲三萬人去晋軍一里聲動天地晋使董褐視之吳王親對曰孤之事君在今日不得事君亦在今日董褐曰臣觀吳王之色類有大憂吳將毒我不可與戰乃許先歃吳王既會遂還焉杜佑曰詭詐驅馳示無所畏是知欲退也梅堯臣曰欲退者使既詞壯兵又彊進脅我也王皙曰辭彊示進形欲我不虞其去也張預曰使來辭壯軍又前進欲脅我而求退也秦行人夜戒晋師曰兩軍之士皆未憗也來日請相見晋庾駢曰使者目動而言肆懼我也秦果宵遁輕車先出居其側者陳也曹操曰陳兵欲戰也杜牧曰出輕車先定戰陳壃界也賈林曰輕車前禦欲結陳而來也張預曰輕車戰車也出軍其旁陳兵欲戰也按魚麗之陳先偏後伍言以車居前以伍次之然則是欲戰者車先出其側也無約而請和者謀也李筌曰無質盟之約請和者必有謀於人田單詐騎劫紀信誑項羽即其義也杜牧曰貞元三年吐蕃首領尚結贊因侵掠河曲遇疫癘人馬死者太半恐不得回乃詐與侍中馬燧款懇因奏請盟會燧乃盟之時河中節度使渾瑊奏曰若國家勒兵境上以謀伐為計蕃戎請盟亦聽信之今吐蕃無所求於國家遽請盟會必恐不實上不納渾瑊率衆二萬屯涇州平凉縣盟壇在縣西三十里五月十三日瑊率三千人會壇所吐蕃果衷甲劫盟焉陳皥曰因盟相劫不獨國朝晋楚會於宋楚人衷甲欲襲晋晋人知之是以失信也今言無約而請和蓋總論兩國之師或侵或伐彼我皆未屈弱而無故請和好者此必敵人國內有憂危之事欲為苟且暫安之計不然則知我有可圖之勢欲使不疑先求和好然後乘我不備而來取也石勒之破王浚也先密為和好又臣服於浚知浚不疑乃請修朝覲之禮浚許之及入因誅浚而滅之杜佑曰未有要約而便來請和有間諜也梅堯臣曰無約請和必有姦謀王皙曰無故驟請和者宜防他謀也張預曰無故請和必有姦謀漢高祖欲擊秦軍使酈食其持重寶坎其將賈堅秦將果欲連和高祖因其怠而擊之秦師大敗又晋將李矩守滎陽劉暢以三萬人討之矩遣使奉牛酒請降潜匿精兵見其弱卒暢大饗士卒人皆醉飽矩夜襲之暢僅以身免奔走而陳兵車者期也李筌曰戰有期及將用是以奔走之杜牧曰上文輕車先出居其側者陳也蓋先出車定戰場界立旗為表奔走赴表以為陳也旗者期也與民期於下也周禮大搜曰車驟徒趨及表乃止是也賈林曰尋常之期不合奔走必有遠兵相應有晷刻之期必欲合勢同來攻我宜速備之梅堯臣曰立旗為表奔以赴列王皙曰陳而期民將求戰也張預曰立旗為表與民期於下故奔走以赴之周禮曰車驟徒趨及表乃止是也半進半退者誘也李筌曰散於前杜牧曰僞為雜亂不整之狀誘我使進也梅堯臣曰進退不一欲以誘我王皙曰詭亂形也張預曰詐為亂形是誘我也若吳子以囚徒示不整以誘楚師之類也杖而立者飢也李筌曰困不能齊杜牧曰不食必困故杖也一本從此仗字杜佑曰倚仗矛㦸而立者飢之意梅堯臣曰倚兵而立者足見飢弊之色王皙曰倚杖者困餒之相張預曰凡人不食則困故倚兵器而立三軍飲食上下同時故一人飢則三軍皆然汲而先飲者渴也李筌曰汲未至先飲者士卒之渴杜牧曰命之汲水未及而先取者渴也覩一人三軍可知也梅堯臣同杜牧注王皙曰以此見其衆行驅飢渴也張預曰汲者未及歸營而先飲水是三軍渴也見利而不進者勞也曹操曰士卒之疲勞也李筌曰士卒難用也杜佑曰士疲倦也敵人來見我利而不能擊進者疲勞也梅堯臣曰人其困乏何利之趨張預曰士卒疲勞不可使戰故雖見利將不敢進也鳥集者虛也李筌曰城上有烏師其遁也杜牧曰設留形而遁齊與晋相持叔向曰烏鳥之聲樂齊師其遁後周齊王憲伐高齊將班師乃以柏葉為幕燒糞壤去高齊視之二日乃知其空營追之不及此乃設留形而遁走也陳皥曰此言敵人若去營幕必空禽鳥既無畏乃鳴集其上楚子元伐鄭將奔諜者告曰楚幕有烏乃止則知其是設留形而遁也此篇蓋孫子辨敵之情僞也杜佑曰敵大作營壘示我衆而鳥集止其中者虛也梅堯臣曰敵人既去營壘空虛鳥烏無猜來集其上張預曰凡敵潜退必奔營幕禽鳥見空鳴集其上楚伐鄭鄭人將奔諜告曰楚幕有烏乃止又晋伐齊叔向曰城上有烏齊師其遁此乃設留形而遁也夜呼者恐也曹操曰軍士夜呼將不勇也李筌曰士卒怯而將懦故驚恐相呼杜牧曰恐懼不安故夜呼以自壯也陳皥曰十人中一人有勇雖九人怯懦恃一人之勇亦可自安今軍士夜呼蓋是將無勇曹說是也孟氏同陳皥注張預曰三軍以將為主將無膽勇不能安衆故士卒恐懼而夜呼若晋軍終夜有聲是也軍擾者將不重也李筌曰將無威重則軍擾杜牧曰言進退舉止輕佻率易無威重軍士亦擾亂也陳皥曰將法令不嚴威容不重士因以擾亂也梅堯臣同陳皥注張預曰軍中多驚擾者將不持重也張遼屯長社夜軍中忽亂一軍盡擾遼謂左右勿動是必有造變者欲以動亂人耳乃令軍士安坐遼中陳而立有頃即定此則能持重也旌旗動者亂也杜牧曰魯莊公敗齊于長勺曹劌請逐之公曰若何對曰視其轍亂而旗靡故逐之杜佑曰旌旗謬動抵東觸西傾倚者亂也梅堯臣曰旌旗輒動偃亞不次無紀律也張預曰旌旗所以齊衆也而動搖無定是部伍雜亂也吏怒者倦也杜牧曰衆悉倦弊故吏不畏而忿怒也陳皥曰將興不急之役故人人倦弊也賈林曰人困則多怒梅堯臣曰吏士倦煩怒不畏避也張預曰政令不一則人情倦故吏多怒也晋楚相攻晋禆將趙旃魏錡怒而欲敗晋軍皆奉命于楚却克曰二憾往矣弗備必敗是也粟馬肉食軍無懸缶不返其舍者窮寇也一云殺馬肉食者軍無糧也軍無懸缶不返其舍者窮寇也李筌曰殺其馬而食肉故曰軍無糧也不返舍者窮迫不及竈也杜牧曰粟馬言以糧穀秣馬也肉食者殺牛馬饗士也軍無懸缶者悉破之示不復炊也不返其舍者晝夜結部伍也如此皆是窮寇必欲決一戰爾缶音府炊器也梅堯臣曰給糧以秣乎馬殺畜以饗乎士棄缶不復炊暴露不返舍是欲決戰而求勝也王皙曰粟馬肉食所以為力且久也軍無缶不復飲食也不返舍無回心也皆謂以死决戰耳敵如此者當堅守以待其弊也張預曰捐糧穀以秣馬殺牛畜以饗士破釜及缶不復炊爨暴露兵衆不復反舍兹窮寇也孟明焚舟楚軍破釜之類是也諄諄翕翕徐與人言者失衆也曹操曰諄諄語貌翕翕失志貌李筌曰諄諄翕翕竊語貌士卒之心恐上則私語而言是失衆也杜牧曰諄諄者乏氣聲促也翕翕者顛倒失次貌如此者憂在內是自失其衆心也賈林曰諄諄竊議貌翕翕不安貌徐與人言遞相問貌如此者必散失部曲也梅堯臣曰諄諄吐誠懇也翕翕曠職事也緩言彊安恐衆離也王皙曰諄諄語誠懇之貌翕翕者患其上也將失人心則衆相與語誠懇而患其上也何氏曰兩人竊語誹議主將者也張預曰諄諄語也翕翕聚也徐緩也言士卒相聚私語低緩而言以非其上是不得衆心也數賞者窘也李筌曰窘則數賞以勸進杜牧曰勢力窮窘恐衆為叛數賞以悅之孟氏曰軍實窘也恐士卒心怠故别行小惠也梅堯臣曰勢窮憂叛離屢賞以悅衆王皙曰衆窘而不和裕則數賞以悅之張預曰勢窘則易離故屢賞以撫士數罰者困也李筌曰困則數罰以勵士杜牧曰人力困弊不畏刑罰故數罰以懼之梅堯臣曰人弊不堪命屢罰以立威王皙曰衆困而不精勤則數罰以脅之也張預曰力困則難用故頻罰以畏衆先暴而後畏其衆者不精之至也曹操曰先輕敵後聞其衆則心惡之也李筌曰先輕後畏是勇而無戰者不精之甚也杜牧曰料敵不精之甚賈林曰教令不能分明士卒又非精練如此之將先欲彊暴伐人衆悖則懼也至懦之極也梅堯臣曰先行乎嚴暴後畏其衆離訓罰不精之極也王皙曰敵先行列暴後畏其衆離為將不精之甚也何氏曰寬猛相濟精於將事也張預曰先輕敵後畏人或曰先刻暴御下後畏衆叛已是用威行愛不精之甚故上文以數賞數罰而言也來委謝者欲休息也李筌曰徐前而疾後曰委謝杜牧曰所以委質來謝此乃勢已窮或有他故必欲休息也賈林曰氣委而言謝者欲求兩解杜佑曰戰未相伏而下意氣相委謝者欲休息也梅堯臣曰力屈欲休兵委質以來謝王皙曰勢不能久張預曰以所親愛委質來謝是勢力窮極欲休兵息戰也兵怒而相迎久而不合又不相去必謹察之曹操曰備奇伏也李筌曰是軍必有奇伏須謹察之杜牧曰盛怒出陳久不交刃復不解去有所待也當謹伺察之恐有奇伏旁起也孟氏曰備有别應梅堯臣曰怒而來逆我久而不接戰且又不解去必有奇伏以待我此以上論敵情張預曰勇怒而來既不合戰又不引退當密伺之必有奇伏也兵非益多也曹操曰權力均一云兵非貴益多賈林曰不貴衆擊寡所貴寡擊衆王皙曰皙謂權力均足矣不以多為益張預曰兵非增多於敵謂權力均也惟無武進曹操曰未見便也賈林曰武不足專進專進則暴王皙曰不可但恃武也當以計智料敵而行張預曰武剛也未能用剛武以輕進謂未見利也足以併力料敵取人而已曹操曰厮養足也李筌曰兵衆武用力均惟得人者勝也杜牧曰言我與敵人兵力皆均惟未能用武前進者蓋未得見其人也但能於厮養之中揀擇其材亦足并力料敵而取勝不假求於他也陳皥曰言我兵力不多於敵又無利便可進不必他國乞師但於厮養中併力取人亦可破敵也賈林曰雖無武勇之力而輕進足以智謀料敵併力而取敵人也梅堯臣曰武繼也兵雖不足以繼進足以并給役厮養之力量敵而取勝也王皙曰皙謂善分合之變者足以併力乘敵間取勝人而已故雖厮養之輩可也況精兵乎曹說是也張預曰兵力既均又未見便雖未足剛進足以取人於厮養之中以并兵合力察敵而取勝不必假他兵以助己故尉繚子曰天下助卒名為十萬其實不過數萬其兵來者無不謂其將曰無為天下先戰此言助卒無益不如己有兵法也夫惟無慮而易敵者必擒於人杜牧曰無有深謀遠慮但恃一夫之勇輕易不顧者必為敵人所擒也陳皥曰惟猶獨也此言殊無遠慮但輕敵者必為其所擒不獨言其勇也左傳曰蜂蠆有毒而況國乎則小敵亦不可輕王皙曰唯不能料敵但以武進則必為敵所擒明患不在於不多也張預曰不能料人反輕敵以武進必為人所擒也齊晋相攻齊侯曰吾姑滅此而朝食不介馬而馳之為晋所敗是也卒未親附而罰之則不服不服則難用也杜牧曰恩信未洽不可以刑罰齊之梅堯臣曰傳至也德以至之恩以親之恩德未敷罰則不服故怨而難使王皙曰恩信非素浹洽於人心未附也張預曰驟居將帥之位恩信未加於民而遽以刑法齊之則怒恚而難用故田穰苴曰臣素卑賤士卒未附百姓不信又伍參曰晋之從政者新未能行令是也卒已親附而罰不行則不可用也曹操曰恩信已洽若無刑罰則驕情難用也梅堯臣曰恩德既洽刑罰不行則驕不可用王皙曰所謂若驕子也張預曰恩信素洽士心已附刑罰寬緩則驕不可用也故令之以文齊之以武曹操曰文仁也武法也李筌曰文仁恩武威罰杜牧曰晏子舉司馬穰苴文能附衆武能威敵也王皙曰吳起云總文武者軍之將兼剛柔者兵之事也是謂必取杜牧曰文武既行必也取勝梅堯臣曰令以仁恩齊以威刑恩威並著則能必勝張預曰文恩以悅之武威以肅之畏愛相兼故戰必勝攻必取或問曰書云威克厥愛允濟愛克厥威允岡功言先威也孫武先愛何也曰晝之所稱仁人之兵也王者之於民恩德素厚人心已附及其用之惟患乎寡威也武之所陳戰國之兵也霸者之於民法令素酷人心易離及其用之惟患乎少恩也令素行以教其民則民服梅堯臣曰素舊也威令舊立教乃聽服張預曰將令素行其民已信教而用之人人聽服令不素行以教其民則民不服王皙曰民不素教難卒為用何氏曰人既失訓安得服教令素行者與衆相得也杜牧曰素先也言為將居常無事之時須恩信威令先著於人然後對敵之時行令立法人人信伏韓信曰我非素得拊循士大夫所謂驅市人而戰也所以使之背水令其人人自戰以其非素受恩信威令之從也陳皥曰晋文公始入國教其民二年欲用之子犯曰民未知義未安其居此言欲令民不苟其生也於是出定襄王此言示以事君之大義入務利民民懷生矣又將用之子犯曰民未知信未宣其用於是伐原以示之信此言在往年伐原不貪其利而守其信民易資者不求豐焉此言人無貪詐也明徵其辭公曰可矣子犯曰民未知禮未生其恭於是大搜以示之禮及戰之時少長有禮其可用也此五者教人之本也夫令要在先申使人聽之不惑法要在必行使人守之無輕信者也三令五申示人不惑也法令簡當議在必行然後可以與衆相得也梅堯臣曰信服已久何事不從王皙曰知此者始可言其並力勝敵矣張預曰上以信使民民以信服上是上下相得也尉繚子曰令之之法小過無更小疑無申言號令一出不可反易自非大過大疑則不須更改申明所以使民信也諸葛亮與魏軍戰以寡對衆卒有當代者不留而遣之曰信不可失於是人人願留一戰遂大敗魏兵是也孫子注解卷之九
