  text: 孫子註解卷之一性一
  hash: sha256:48d15a19f17d9312b0d2ea0e29743793b2490147e1743a966da79f0798f5339c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0014_HFL_001-001a, image: hfl/0850/0850-004.png}
body:
  text: 計篇曹操曰計者選將量敵度地料卒遠近險易計於廟堂也李筌曰計者兵之上也太一遁甲先以計神加德宫以斷主客成敗故孫子論兵亦以計爲篇首杜牧曰計算也曰計算何事曰下之五事所謂道天地將法也於廟堂之上先以彼我之五事計算優劣然後定勝負勝負既定然後興師動衆用兵之道莫先此五事故著爲篇首耳王皙曰計者謂計主將天地法令兵衆士卒賞罰也張預曰管子曰計先定於内而後兵出境故用兵之道以計爲首也或曰兵貴臨敵制宜曹公謂計於廟堂者何也曰將之賢愚敵之强弱地之遠近兵之衆寡安得不先計之及乎兩軍相臨變動相應則在於將之所裁非可以隃度也孫子曰兵者國之大事杜牧曰傳曰國之大事在祀與戎張預曰國之安危在兵故講武練兵實先務也死生之地存亡之道不可不察也李筌曰兵者凶器死生存亡繫於此矣是以重之恐人輕行者也杜牧曰國之存亡人之死生皆由於兵故須審察也賈林曰地猶所也亦謂陳師振旅戰陳之地得其利則生失其便則死故曰死生之地道者權機立勝之道得之則存失之則亡故曰不可不察也書曰有存道者輔而固之有亡道者推而亡之梅堯臣曰地有死生之勢戰有存亡之道王皙曰兵舉則死生存亡繫之張預曰民之死生兆於此則國之存亡見於彼然死生曰地存亡曰道者以死生在勝負之地而存亡繫得失之道也得不重慎審察乎故經之以五事校之以計而索其情曹操曰謂下五事七計求彼我之情也李筌曰謂下五事也校量也量計遠近而求物情以應敵杜牧曰經者經度也五者即下所謂五事也校者校量也計者即篇首計算也索者搜索也情者彼我之情也此言先須經度五事之優劣次復校量計算之得失然後始可搜索彼我勝負之情狀賈林曰校量彼我之計謀搜索兩軍之情實則長短可知勝負易見梅堯臣曰經紀五事校定計利王皙曰經常也又經緯也計者謂下七計索盡也兵之大經不出道天地將法耳就而校之以七計然後能盡彼已勝負之情狀也張預曰經經緯也上先經緯五事之次序下乃用五事以校計彼我之優劣探索勝負之情狀一曰道張預曰恩信使民二曰天張預曰上順天時三曰地張預曰下知地利四曰將張預曰委任賢能五曰法杜牧曰此之謂五事也王皙曰此經之五事也夫用兵之道人和為本天時與地利則其助也三者具然後議舉兵兵舉必須將能將能然後法修孫子所次此之謂矣張預曰節制嚴明夫將與法在五事之末者凡舉兵伐罪廟堂之上先察恩信之厚薄後度天時之逆順次審地形之險易三者已熟然後命將征之兵既出境則法令一從於將此其次序也道者令民與上同意也張預曰以恩信道義撫衆則三軍一心樂為其用易曰悅以犯難民忘其死故可以與之死可以與之生而不畏危曹操曰謂道之以教令危者危疑也李筌曰危亡也以道理衆人自化之得其同用何亡之有杜牧曰道者仁義也李斯問兵於荀卿答曰彼仁義者所以修政者也政修則民親其上樂其君輕為之死復對趙孝成王論兵曰百將一心三軍同力臣之於君也下之於上也若子之事父弟之事兄若手臂之捍頭目而覆胷臆也如此始可令與上下同意死生同致不畏懼於危疑也陳皥註同杜牧孟氏曰一作人不疑謂始終無二志也一作人不危道謂道之以政令齊之以禮教故能化服士民與上下同一也故用兵之妙以權術為道大道廢而有法法廢而有權權廢而有勢勢廢而有術術廢而有數大道淪替人情訛僞非以權數而取之則不得其欲也故其權術之道使民上下同進趨共愛憎一利害故人心歸於德得人之力無私之至也故百萬之衆其心如一可與俱同死力動而不至危亡也臣之於君下之於上若子之事父弟之事兄若手臂之捍頭目而覆胸臆也如此始可與上同意死生同致不畏懼於危疑賈林曰將能以道為心與人同利共患則士卒服自然心與上者同也使士卒懷我如父母視敵如仇讎者非道不能也黄石公云得道者昌失道者亡杜佑曰謂導之以政令齊之以禮教也危者疑也上有仁施下能致命也故與處存亡之難不畏傾危之敗若晋陽之圍沈竈産蛙人無叛疑心矣梅堯臣曰危戾也主有道則政教行人心同則危戾去故主安與安主危與危王皙曰道謂主有道能得民心也夫得民之心者所以得死力也得死力者所以濟患難也易曰悅以犯難民忘其死如是則安畏危難之事乎張預曰危疑也士卒感恩死生存亡與上同之決然無所疑懼天者陰陽寒暑時制也曹操曰順天行誅因陰陽四時之制故司馬法曰冬夏不興師所以兼愛民也李筌曰應天順人因時制敵杜牧曰陰陽者五行刑德向背之類是也今五緯行止最可據驗巫咸甘氏石氏唐蒙史墨梓慎禆竈之徒皆有著述咸稱祕奥察其指歸皆本人事準星經曰歲星所在之分不可攻攻之反受其殃也左傳昭三十二年夏吴伐越始用師於越史墨曰不及四十年越其有吴乎越得歲而吴伐之必受其凶註曰存亡之數不過三紀歲月三周三十六歲故曰不及四十年也此年歲在星紀星紀吴分也歲星所在其國有福吴先用兵故反受其殃哀二十二年越滅吴至此三十八歲也李淳風曰天下誅秦歲星聚於東井秦政暴虐失歲星仁和之理違歲星恭肅之道拒諫信讒是故胡亥終於滅亡復曰歲星清明潤澤所在之國分大吉君令合於時則歲星光喜年豐人安君尚暴虐令人不便則歲星色芒角而怒則兵起由此言之歲星所在或有福德或有灾祥豈不皆本於人事乎夫吴越之君德均勢敵闔閭興師志於吞滅非為拯民故歲星福越而禍吴秦之殘酷天下誅之上合天意故歲星禍秦而祚漢熒惑罰星也宋景公出一善言熒惑退移三舍而延二十七年以此推之歲為善星不福無道火為罰星不罰有德舉此二者其他可知況所臨之分隨其政化之善惡各變其本色芒角大小隨為禍福各隨時而占之淳風曰夫形器著於下精象係於上近取之身耳目為肝腎之用鼻口實心腹所資彼此影響豈不然歟易曰在天成象在地成形變化見矣蓋本於人事而已矣刑德向背之說尤不足信夫刑德天官之陳背水陳者為絶紀向山坂陳者為廢軍武王伐紂背濟水向山坂而陳以二萬二千五百人擊紂之億萬而滅之今可目睹者國家白元和已至今三十年間凡四伐趙㓂昭義軍加以數道之衆常號十萬圍之臨城縣攻其南不拔攻其北不拔攻其東不拔攻其西不拔其四度圍之通有十歲十歲之内東西南北豈有刑德向背王相吉辰哉其不拔者豈不曰城堅池深糧多人一哉復以往事驗之秦累世戰勝竟滅六國豈天道二百年間常在乾方福德常居鶉首豈不曰穆公已還卑身趨士務耕戰明法令而致之乎故梁惠王問尉繚子曰黄帝有刑德可以百戰百勝其有之乎尉繚子曰不然黄帝所謂刑德者刑以伐之德以守之非世之所謂刑德也夫舉賢用能者不時日而利明法審令者不卜筮而吉貴功養勞者不禱祠而福周武王伐紂師次于汜水共頭山風雨疾雷鼓旗毁折王之驂乗惶懼欲死太公曰夫用兵者順天道未必吉逆之未必凶若失人事則三軍敗亡且天道鬼神視之不見聽之不聞故智者不法愚者拘之若乃好賢而任能舉事而得時此則不看時日而事利不假卜筮而事吉不待禱祠而福從遂命驅之前進周公曰今時逆太歲龜灼言凶卜筮不吉星凶為灾請還師太公怒曰今紂剖比干囚箕子以飛廉為政伐之有何不可枯草朽骨安可知乎乃焚龜折蓍率衆先涉武王從之遂滅紂宋高祖圍慕容超於廣固將攻城諸將咸諫曰今往亡之日兵家所忌高祖曰我往彼亡吉孰大焉乃命悉登遂克廣固後魏太祖武帝討後燕慕容麟甲子晦日進軍太史令鼂崇奏曰昔紂以甲子日亡帝曰周武豈不以甲子日勝乎崇無以對遂戰破之後魏太武帝征夏赫連昌於統萬城師次城下昌鼓噪而前會有風雨從賊後來太史進曰天不助人將士飢渴願且避之崔浩曰千里制勝一日豈得變易風道在人豈有常也帝從之昌軍大敗或曰如此者陰陽向背定不足信孫子叙之何也答曰夫暴君昏主或為一珤一馬則必殘人逞志非以天道鬼神誰能制止故孫子叙之蓋有深旨寒暑時氣節制其行止也周瑜為孫權數曹公四敗一曰今盛寒馬無藁草驅中國士衆遠涉江湖不習水土必生疾病此用兵之忌也寒暑同歸於天時故聯以叙之也孟氏曰兵者法天運也陰陽者剛柔盈縮也用陰則沉虚固静用陽則輕捷猛厲後則用陰先則用陽陰無蔽也陽無察也陰陽之象無定形故兵法天天有寒暑兵有生殺天則應殺而制物兵則應機而制形故曰天也賈林曰讀時制為時氣謂從其善時占其氣候之利也杜佑曰謂順天行誅因陰陽四時剛柔之制梅堯臣曰兵必參天道順氣候以時制之所謂制也司馬法曰冬夏不興師所以兼愛民也王皙曰謂陰陽總天道五行四時風雲氣象也善消息之以助軍勝然非異人特授其訣則末由也若黄石授書張良乃太公兵法是也意者豈天機神密非常人所得知耶其諸十數家紛紜抑未足以取審矣寒暑若吴起云疾風大寒盛夏炎熱之類時制因時利害而制宜也范蠡云天時不作弗為人客是也張預曰夫陰陽者非孤虚向背之謂也蓋兵自有陰陽耳范蠡曰後則用陰先則用陽盡敵陽節盈吾陰節而奪之又云設右為牝益左為牝早晏以順天道李衛公解曰左右者人之陰陽早晏者天之陰陽奇正者天人相變之陰陽此皆言兵自有陰陽剛柔之用非天官日時之陰陽也今觀尉繚子天官之篇則義最明矣太白陰經亦有天無陰陽之篇皆著為卷首欲以决世人之惑也太公曰聖人欲止後世之亂故作為譎書以寄勝於天道無益於兵也是亦然矣唐太宗亦曰凶器無甚於兵行兵苟便於人事豈以避忌為疑也寒暑者謂冬夏興師也漢征匈奴士多墮指馬援征蠻卒多疫死皆冬夏興師故也時制者謂順天時而制征討也太白陰經言天時者乃水旱蝗雹荒亂之天時非孤虚向背之天時也地者遠近險易廣狹死生也曹操曰言以九地形勢不同因時制利也論在九地篇中李筌曰得形勢之地有死生之勢梅堯臣曰知形勢之利害張預曰凡用兵貴先知地形知遠近則能為迃直之計知險易則能審步騎之利知廣狹則能度衆寡之用知死生則能識戰散之勢也將者智信仁勇嚴也曹操曰將宜五德備也李筌曰此五者為將之德故師有丈人之稱也杜牧曰先王之道以仁為首兵家者流用智為先蓋智者能機權識變通也信者使人不惑於刑賞也仁者愛人憫物知勤勞也勇者決勝乘勢不逡巡也嚴者以威刑肅三軍也楚申包胥使於越越王勾踐將伐吴問戰焉夫戰智為始仁次之勇次之不智則不能知民之極無以詮度天下之衆寡不仁則不能與三軍共飢勞之殃不勇則不能斷疑以發大計也賈林曰專任智則賊偏施仁則懦固守信則愚恃勇力則暴令過嚴則殘五者兼備各適其用則可為將帥梅堯臣曰智能發謀信能賞罰仁能附衆勇能果斷嚴能立威王皙曰智者先見而不惑能謀慮通權變也信者號令一也仁者惠撫惻隱得人心也勇者徇義不懼能果毅也嚴者以威嚴肅衆心也五者相須闕一不可故曹公曰將宜五德備也何氏曰非智不可以料敵應機非信不可以訓人率下非仁不可以附衆撫士非勇不可以決謀合戰非嚴不可以服强齊衆全此五才將之體也張預曰智不可亂信不可欺仁不可暴勇不可懼嚴不可犯五德皆備然後可以為大將法者曲制官道主用也曹操曰部曲旛幟金鼓之制也官者百官之分也道者糧路也主者主軍費用也李筌曰曲部曲也制節度也官爵賞也道路也主掌也用者軍資用也皆師之常法而將所治也杜牧曰曲者部曲隊伍有分畫也制者金鼓旌旗有節制也官者偏裨校列各有官司也道者營陳開闔各有道徑也主者管庫厮養職守主張其事也用者車馬器械三軍須用之物也荀卿曰械用有數夫兵者以食為本須先計糧道然後興師梅堯臣曰曲制部曲隊伍分畫必有制也官道裨校首長統率必有道也主用主軍之資糧百物必有用度也王皙曰曲者卒伍之屬制者節制其行列進退也官者羣吏偏裨也道者軍行及所舍也主者主守其事用者凡軍之用謂輜重糧積之屬張預曰曲部曲也制節制也官謂分偏裨之任道謂利糧餉之路主者職掌軍資之人用者計度費用之物六者用兵之要宜處置有其法凡此五者將莫不聞知之者勝不知者不勝張預曰已上五事人人同聞但深曉變極之理則勝不然則敗故校之以計而索其情曹操曰同聞五者將知其變極即勝也索其情者勝負之情杜牧曰謂上五事將欲聞知校量計筭彼我之優劣然後搜索其情狀乃能必勝不爾則敗賈林曰書云非知之艱行之惟難王皙曰當盡知也言雖周知五事待七計以盡其情也張預曰上已陳五事自此而下方考校彼我之得失探索勝負之情狀也曰主孰有道曹操曰道德智能李筌曰孰實也有道之主必有智能之將范增辭楚陳平歸漢即其義也杜牧曰孰誰也言我與敵人之主誰能遠佞親賢任人不疑也杜佑曰主君也道道德也必先考校兩國之君誰知誰否也若荀息料虞公貪而好寳宫之奇懦而不能强諫是也梅堯臣曰誰能得人心也王皙曰若韓信言項王匹夫之勇婦人之仁名雖為霸實失天下心謂漢王入武關秋毫無所害除秦苛法秦民亡不欲大王王秦者是也何氏曰書曰撫我則后虐我則讎撫虐之政孰有之也張預曰先校二國之君誰有恩信之道即上所謂令民與上同意者之道也若淮陰料項王仁勇過高祖而不賞有功為婦人之仁亦是也將孰有能杜牧曰將孰有能者上所謂智信仁勇嚴若漢高祖料魏將柏直不能當韓信之類也天地孰得曹操李筌並曰天時地利杜牧曰天者上所謂陰陽寒暑時制也地者上所謂遠近險易廣狹死生也杜佑曰視兩軍所據知誰得天時地利梅堯臣曰稽合天時審察地利王皙同杜牧註張預曰觀兩軍所舉誰得天時地利若魏武帝盛冬伐吴慕容超不據大峴則失天時地利者也法令孰行曹操曰設而不犯犯而必誅杜牧曰縣法設禁貴賤如一魏絳戮僕曹公斷髮是也杜佑曰發號出令校孰下不敢犯梅堯臣曰齊衆以法一衆以令王皙曰孰能法明令便人聽而從張預曰魏絳戮揚干穰苴斬莊賈吕蒙誅鄉人卧龍刑馬謖兹所謂設而不犯犯而必誅誰為如此兵衆孰强杜牧曰上下和同勇於戰為强卒衆車多為强梅堯臣曰内和外附王皙曰强弱足以相刑而知張預曰車堅馬良士勇兵利聞鼓而喜聞金而怒誰者為然士卒孰練杜牧曰辨旌旗審金鼓明開合知進退閑馳逐便弓矢習擊刺也杜佑曰知誰兵器强利士卒簡練者故王子曰士不素習當陳惶惑將不素習臨陳闇變梅堯臣曰車騎閑習孰國精粗王皙曰孰訓之精何氏曰勇怯强弱豈能一槩張預曰離合聚散之法坐作進退之令誰素閑習賞罰孰明杜牧曰賞不僣刑不濫杜佑曰賞善罰惡知誰分明者故王子曰賞無度則費而無恩罰無度則戮而無威梅堯臣曰賞有功罰有罪王皙曰孰能賞必當功罰必稱情張預曰當賞者雖仇怨必録當罰者雖父子不舍又司馬法曰賞不逾時罰不遷列於誰為明吾以此知勝負矣曹操曰以七事計之知勝負矣賈林曰以上七事量校彼我之政則勝敗可見梅堯臣曰能索其情則知勝負張預曰七事俱優則未戰而先勝七事俱劣則未戰而先敗故勝負可預知也將聽吾計用之必勝留之將不聽吾計用之必敗去之曹操曰不能定計則退而去也杜牧曰若彼自備護不從我計形勢均等無以相加用戰必敗引而去之故春秋傳曰允當則歸也陳皥曰孫武以書千闔閭曰聽用吾計策必能勝敵我當留之不去不聽吾計策必當負敗我去之不留以此感動闔閭庶必見用故闔閭曰子之十三篇寡人盡觀之矣其時闔閭行軍用師多自為將故不言主而言將也孟氏曰將裨將也聽吾計畫而勝則留之違吾計畫而敗則除去之梅堯臣曰武以十三篇千吴王闔閭故首篇以此辭動之謂王將聽吾計而用戰必勝我當留此也王將不聽我計而用戰必敗我當去此也王皙曰將行也用謂用兵耳言行聽吾此計用兵則必勝我當留行不聽吾此計用兵則必敗我當去也張預曰將辭也孫子謂今將聽吾所陳之計而用兵則必勝我乃留此矣將不聽吾所陳之計而用兵則必敗我乃去之他國矣以此辭激吴王而求用計利以聽乃爲之勢以佐其外曹操曰常法之外也李筌曰計利既定乃乘形勢之勢也佐其外者常法之外也杜牧曰計筭利害是軍事根本利害已見聽用然後於常法之外更求兵勢以助佐其事也賈林曰計其利聽其謀得敵之情我乃設奇譎之勢以動之外者或傍攻或後躡以佐正陳梅堯臣曰定計於内為勢於外以助成勝王皙曰吾計之利已聽復當知應變以佐其外張預曰孫子又謂吾所計之利若已聽從則我當復為兵勢以佐助其事於外蓋兵之常法即可明言於人兵之利勢須因敵而為勢者因利而制權也曹操曰制由權也權因事制也李筌曰謀因事勢杜牧曰自此便言常法之外勢夫勢者不可先見或因敵之害見我之利或因敵之利見我之害然後始可制機權而取勝也梅堯臣曰因利行權以制之王皙曰勢者乘其變者也張預曰所謂勢者須因事之利制為權謀以勝敵耳故不能先言也自此而後略言權變兵者詭道也曹操曰兵無常形以詭詐為道李筌曰軍不厭詐梅堯臣曰非譎不可以行權非權不可以制敵王皙曰詭者所以求勝敵御衆必以信也張預曰用兵雖本於仁義然其取勝必在詭詐故曳柴揚塵欒枝之譎也萬弩齊發孫臏之奇也千牛俱奔田單之權也囊沙壅水淮陰之詐也此皆用詭道而制勝也故能而示之不能張預曰實强而示之弱實勇而示之怯李牧敗匈奴孫臏斬龐涓之類也用而示之不用李筌曰言已實用師外示之怯也漢將陳豨反連兵匈奴高祖遣使十輩視之皆言可擊復遣婁敬報曰匈奴不可擊上問其故對曰夫兩國相制宜矜誇其長今臣往徒見羸老此必能而示之不能臣以為不可擊也高祖怒曰齊虜以口舌得官今妄沮吾衆械婁敬于廣武以三十萬衆至白登高祖為匈奴所圍七日乏食此師外示之以怯之義也杜牧曰此乃詭詐藏形夫形也者不可使見於敵敵人見形必有應傳曰鷙鳥將擊必藏其形如匈奴示羸老於漢使之義也杜佑曰言已實能用外示之以不能不用使敵不我備也若孫臏減竈而制龐涓王皙曰强示弱勇示怯治示亂實示虚智示愚衆示寡進示退速示遲取示捨彼示此何氏曰能而示之不能者如單于羸師誘高祖圍于平城是也用而示之不用者如李牧按兵於雲中大敗匈奴是也張預曰欲戰而示之退欲速而示之緩班超擊莎車趙奢破秦軍之類也近而示之遠遠而示之近李筌曰令敵失備也漢將韓信虜魏王豹初陳舟欲渡臨晋乃潜師浮木甖從夏陽襲安邑而魏失備也耿弇之征張步亦先攻臨淄皆示遠勢也杜牧曰欲近襲敵必示以遠去之形欲遠襲敵必示以近進之形韓信盛兵臨晋而渡於夏陽此乃示以近形而遠襲敵也後漢末曹公袁紹相持官渡紹遣將郭圖淳于瓊顔良等攻東郡太守劉延於白馬紹引兵至黎陽將渡河曹公北救延津荀攸曰今兵少不敵分兵勢乃可公致兵延津將欲渡兵向其後紹必西應之然後輕兵襲白馬掩其不備顔良可擒也公從之紹聞兵渡即留分兵西應之公乃引軍行趨白馬未至十餘里良大驚來戰使張遼關羽前進擊破斬顔良解白馬圍此乃示以遠形而近襲敵也賈林曰去就在我敵何由知杜佑曰欲近而設其遠也欲遠而設其近也誑耀敵軍示之以遠本從其近若韓信之襲安邑梅堯臣曰使其不能賾王皙同上註何氏曰遠而示之近者韓信陳舟臨晋而渡夏陽是也近而示之遠者晋侯伐虢假道于虞是也張預曰欲近襲之反示以遠吴與越夾水相矩越為左右句卒相去各五里夜争鳴鼓而進吴人分以禦之越乃潜涉當吴中軍而襲之吴大敗是也欲遠攻之反示以近韓信陳兵臨晋而渡於夏陽是也利而誘之杜牧曰趙將李牧大縱畜牧人衆滿野匈奴小入徉北不勝以數千人委之單于聞之大喜率衆大至牧多為奇陳左右夾擊大破殺匈奴十餘萬騎也賈林曰以利動之動而有形我所以因形制勝也梅堯臣曰彼貪利則以貨誘之何氏曰利而誘之者如赤眉委輜重而餌鄧禹是也張預曰示以小利誘而克之若楚人伐絞莫敖曰絞小而輕請無扞采樵者以誘之於是絞人獲楚三十人明日絞人争出驅楚役徒於山中楚人設伏兵於山下而大敗之是也亂而取之李筌曰敵貪利必亂也秦王姚興征秃髮傉檀悉驅部内牛羊散放於野縱秦人虜掠秦人得利既無行列傉檀陰分十將掩而擊之大敗秦人斬首七千餘級亂而取之之義也杜牧曰敵有昏亂可以乗而取之傳曰兼弱攻昩取亂侮亡武之善經也賈林曰我令姦智亂之候亂而取之也梅堯臣曰彼亂則乗而取之王皙曰亂謂無節制取言易也張預曰詐為紛亂誘而取之若吴越相攻吴以罪人三千示不整以誘越罪人或奔或止越人争之為吴所敗是也言敵亂而後取者非也春秋之法凡書取者言易也魯師取邿是也實而備之曹操曰敵治實須備之也李筌曰備敵之實蜀將關羽欲圍魏之樊城懼吴將吕蒙襲其後乃多留備兵守荆州蒙陰知其旨遂詐之以疾羽乃撤去備兵遂為蒙所取而荆州没吴則其義也杜牧曰對壘相持不論虛實常須為備此言居常無事鄰封接境敵若脩政治實上下相愛賞罰明信士卒精練即須備之不待交兵然後為備也陳皥曰敵若不動完實我當謹備亦自實以備敵也梅堯臣曰彼實則不可不備王皙曰彼將有以擊吾之不備也何氏曰彼敵但見其實而未見其虚之形則當蓄力而備之也張預曰經曰角之而知有餘不足之處有餘則實也不足則虚也言敵人兵勢既實則我當為不可勝之計以待之勿輕舉也李靖軍鏡曰觀其虚則進見其實則止强而避之曹操曰避其所長也李筌曰量力也楚子伐隨隨之臣季梁曰楚人上左君必左無與王遇且攻其右右無良焉必敗偏敗衆乃攜矣少師曰不當王非敵也不從隨師敗績隨侯逸攻强之敗也杜牧曰逃避所長言敵人乘兵强氣銳則當須且回避之待其衰懈候其間隙而擊之晋末嶺南賊盧循徐道覆乘虚襲建鄴劉裕禦之曰賊若新亭直上且當避之回泊蔡洲乃成擒耳徐道覆欲焚舟直上循以為不可乃泊於蔡洲竟以敗滅賈林曰以弱制强理須待變杜佑曰彼府庫充實士卒銳盛則當退避以伺其虚懈觀變而應之梅堯臣曰彼强則我當避其銳王皙曰敵兵精銳我勢寡弱則須退避張預曰經曰無邀正正之旗無擊堂堂之陳言敵人行陳修整節制嚴明則我當避之不可輕肆也若秦晋相攻交綏而退蓋各防其失敗也怒而撓之曹操曰待其衰懈也李筌曰將之多怒者權必易亂性不堅也漢相陳平謀撓楚權以太牢具進楚使驚曰是亞父使邪乃項王使邪此怒撓之者也杜牧曰大將剛戾者可激之令怒則逞志快意志氣撓亂不顧本謀也孟氏曰敵人盛怒當屈擾之梅堯臣曰彼褊急易怒則撓之使憤激輕戰王皙曰敵持重則激怒以撓之何氏曰怒而撓之者漢兵擊曹咎於汜水是也張預曰彼性剛忿則辱之令怒志氣撓惑則不謀而輕進若晋人執宛春以怒楚是也尉繚子曰寬不可激而怒言性寬者則不可激怒而致之也卑而驕之李筌曰幣重而言廿其志不小後趙石勒稱臣於王浚左右欲擊之浚曰石公來欲奉我耳敢言擊者斬設饗禮以待之勒乃驅牛羊數萬頭聲言上禮實以填諸街巷使浚兵不得發乃入薊城擒浚於廳斬之而并燕卑而驕之則其義也杜牧曰秦末匈奴冐頓初立東胡强使使謂冐頓曰欲得頭曼時千里馬冐頓以問羣臣羣臣皆曰千里馬國之寳勿與冐頓曰奈何與人鄰國愛一馬乎遂與之居頃之東胡使使來曰願得單于一閼氏冐頓問羣臣皆怒曰東胡無道乃求閼氏請擊之冐頓曰與人鄰國愛一女子乎與之居頃之東胡復曰匈奴有棄地千里吾欲有之冐頓問羣臣羣臣皆曰與之亦可不與亦可冐頓大怒曰地者國之本也本何可與諸言與者皆斬之冐頓上馬令國中有後者斬東襲東胡東胡輕冐頓不為之備冐頓擊滅之冐頓遂西擊月氏南并樓煩白羊河南北侵燕代悉復收秦所使蒙恬所奪匈奴地也陳皥曰所欲必無所顧恡子女以惑其心玉帛以驕其志范蠡鄭武之謀也杜佑曰彼其舉國興師怒而欲進則當外示屈撓以高其志俟惰歸要而擊之故王子曰善用法者如狸之與鼠力之與智示之猶卑静而下之梅堯臣曰示以卑弱以驕其心王皙曰示卑弱以驕之彼不虞我而擊其間張預曰或卑辭厚賂或羸師佯北皆所以令其驕怠吴子伐齊越子率衆而朝王及列士皆有賂吴人皆喜惟子胥懼曰是豢吴也後果為越所滅楚伐庸七遇皆北庸人曰楚不足與戰矣遂不設備楚子乃為二隊以伐之遂滅庸皆其義也佚而勞之一本作引而勞之曹操曰以利勞之李筌曰敵佚而我勞之者善功也吴伐楚公子光問計於伍子胥子胥曰可為三師以肄焉我一師至彼必盡衆而出彼出我歸亟肄以疲之多方以誤之然後三師以繼之必大克從之楚於是乎始病吴矣杜牧曰吴公子光問伐楚於伍員員曰可為三軍以肄焉我一師至彼必盡出彼出則歸亟肄以疲之多方以誤之然後三師以繼之必大克從之於是子重一歲七奔命於是乎始病吴終入郢後漢末曹公既破劉備備奔袁紹引兵欲與曹公戰别駕田豐曰操善用兵未可輕舉不如以久持之將軍據山河之固有四州之地外結英豪内修農戰然後揀其精銳分為奇兵乘虚迭出以擾河南救右則擊其左救左則擊其右使敵疲於奔命人不安業我未勞而彼已困矣不及三年可坐克也今釋廟勝之策而决成敗於一戰悔無及也紹不從故敗梅堯臣曰以我之佚待彼之勞王皙曰多奇兵也彼出則歸彼歸則出救左則右救右則左所以罷勞之也何氏曰孫子有治力之法以佚而待勞故論敵佚我宜多方以勞弊之然後可以制勝張預曰我則力全彼則道敝若晋楚争鄭久而不决晋知武子乃分四軍為三部晋各一動而楚三來於是三駕而楚不能與之争又申公巫臣教吴伐楚於是子重一歲七奔命是也親而離之曹操曰以間離之李筌曰破其行約間其君臣而後攻也昔秦伐趙秦相應侯間於趙王曰我惟懼趙用括耳廉頗易與也趙王然之乃用括代頗為秦所坑卒四十萬於長平則其義也杜牧曰言敵若上下相親則當以厚利㗖而離間之陳平言於漢王曰今項王骨鯁之臣不過亞父鍾離昩龍且周殷之屬不過數人大王誠能捐數萬斤金間其君臣彼必内相誅漢因舉兵而攻之滅楚必矣漢王然之出黄金四萬斤與平使之反間項王果疑亞父不急擊下滎陽漢王遁去陳皥曰彼恡爵禄此必捐之彼嗇財貨此必輕之彼好殺罰此必緩之因其上下相猜得行離間之說由余所以歸秦英布所以佐漢也杜佑曰以利誘之使五間並入辯士馳說親彼君臣分離其形勢若秦遣反間欺誑趙君使廢廉頗而任趙奢之子卒有長平之敗梅堯臣同杜牧註王皙曰敵相親當以計謀離間之張預曰或間其君臣或間其交援使相離貳然後圖之應侯間趙而退廉頗陳平間楚而逐范增是君臣相離也秦晋相合以伐鄭燭之武夜出說秦伯曰今得鄭則歸於晋無益於秦也不如捨鄭以為東道主秦伯悟而退師是交援相離也攻其無備出其不意曹操曰擊其懈怠出其空虚李筌曰擊懈怠襲空虚杜牧曰擊其空虚襲其懈怠孟氏曰擊其空虚襲其懈怠使敵不知所以備也故曰兵者無形為妙太公曰動莫神於不意謀莫善於不識梅堯臣王皙二註同上何氏曰攻其無備者魏太祖征烏桓郭嘉曰胡恃其遠必不設備因其無備卒然擊之可破滅也太祖行至易水嘉曰兵貴神速今千里襲人輜重多難以趨利不如輕兵兼道以出掩其不意乃密出盧龍塞直指單于庭合戰大破之唐李靖陳十筞以圖簫銑總管三軍之任一以委靖八月集兵夔州銑以時屬秋潦江水泛漲三峽路危必謂靖不能進遂不設備九月靖率兵而進曰兵貴神速機不可失今兵始集銑尚未知乘水漲之勢倏忽至城下所謂疾雷不及掩耳縱使知我倉卒無以應敵此必成擒也進兵至夷陵銑始懼召兵江南果不能至勒兵圍城銑遂降出其不意者魏末遺將鍾會鄧艾伐蜀蜀將姜維守劔閣鍾會攻維未克艾上言請從陰平由邪徑出劔閣西入成都奇兵衝其腹心劔閣之軍必還赴涪則會方軌而進劔閣之軍不還則應涪之兵寡矣軍志云攻其無備出其不意今掩其空虚破之必矣冬十月艾自陰平行無人之地七百餘里鑿山通道造作橋閣山高谷深至為艱險又糧運將匱瀕於危殆艾以氊自裹推轉而下將士皆攀木緣崖魚貫而進先登至江油蜀守將馬邈降諸葛瞻自涪還綿竹列陳相拒大敗之斬瞻及尚書張遵等進軍至成都蜀主劉禪降又齊神武為東魏將率兵伐西魏屯軍蒲坂造三道浮橋渡河又遣其將竇泰趣潼關高敖曹圍洛州西魏將周文帝出軍廣陽召諸將謂曰賊今掎吾三面又造橋於河示欲必渡欲綴吾軍使竇泰得西入耳久與相持其計得行非良策也且高歡用兵常以泰為先驅其下多銳卒屢勝而驕今出其不意襲之必克克泰則歡不戰而自走矣諸將咸曰賊在近捨而遠襲事若蹉跌悔無可及周文曰歡前再襲潼關吾軍不過霸上今者大來兵未出郊賊顧謂吾但自守耳無遠闘意又狃於得志有輕我心乗此擊之何徃不克賊雖造橋未能征渡比五日中吾取竇泰必矣公等勿疑周文遂率騎六千還長安聲言欲往隴右辛亥潜出軍癸丑晨至潼關竇泰卒聞軍至惶懼依山為陳未及成列周文擊破之斬泰傳首長安高敖曹適䧟洛州聞泰没燒輜重棄城而走張預曰攻無備者謂懈怠之處敵之所不虞者則擊之若燕人畏鄭三軍而不虞制人為制人所敗是也出不意者謂虚空之地敵不以為慮者則襲之若鄧艾伐蜀行無人之地七百餘里是也此兵家之勝不可先傳也曹操曰傳猶洩也兵無常勢水無常形臨敵變化不可先傳也故料敵在心察機在目也李筌曰無備不意攻之必勝此兵之要祕而不傳也杜牧曰傳言也此言上之所陳悉用兵取勝之策固非一定之制見敵之形始可施為不可旡事而言也梅堯臣曰臨敵應變制宜豈可預前言之王皙曰夫校計行兵是謂常法若乗機決勝則不可預傳述也張預曰言上所陳之事乃兵家之勝策須臨敵制宜不可以預先傳言也夫未戰而廟筭勝者得筭多也未戰而廟筭不勝者得筭少也多筭勝少筭不勝而況於無筭乎吾以此觀之勝負見矣曹操曰以吾道觀之矣李筌曰夫戰者決勝廟堂然後與人争利凡伐叛懷遠推亡固存兼弱攻昩皆物情之所出中外離心如商周之師者是為未戰而廟筭勝太一遁甲置筭之法因六十筭已上為多筭六十筭已下為少筭客多筭臨少筭主人敗客少筭臨多筭主人勝此皆勝敗易見矣杜牧曰廟筭者計筭於廟堂之上也梅堯臣曰多筭故未戰而廟謀先勝少筭故未戰而廟謀不勝是不可無筭矣王皙曰此懼學者惑不可先傳之說故復言計篇義也何氏曰計有巧拙成敗擊焉張預曰古者興師命將必致齋於廟授以成筭然後遣之故謂之廟筭籌策深遠則其計所得者多故未戰而先勝謀慮淺近則其計所得者少故未戰而先負多計勝少計其無計者安得無敗故曰勝兵先勝而後求戰敗兵先戰而後求勝有計無計勝負易見孫子註觧卷之一
