body:
  text: 軍爭篇曹操曰兩軍爭勝李筌曰爭者趨利也虛實定乃可與人爭利王皙曰爭者爭利得利則勝宜先審輕重計迂直不可使敵乘我勞也張預曰以軍爭為名者謂兩軍相對而爭利也先知彼我之虛實然後能與人爭勝故次虛實孫子曰凡用兵之法將受命於君李筌曰受君命也遵廟勝之算恭行天罰張預曰受君命伐叛逆合軍聚衆曹操曰聚國人結行伍選部曲起營為軍陳梅堯臣曰聚國之衆合以為軍王皙曰大國三軍總三萬七千五百人若悉舉其賦則總七萬五千人此所謂合軍聚衆張預曰合國人以為軍聚兵衆以為陳交和而舍曹操曰軍門為和門左右門為旗門以車為營曰轅門以人為營曰人門兩軍相對為交和李筌曰交間和雜也合軍之後強弱勇怯長短向背間雜而仵之力相兼後合諸營壘與敵爭之杜牧曰周禮以旌為左右和門鄭司農曰軍門曰和今謂之壘門立兩旌旗表之以敘和出入明次第也交者言與敵人對壘而舍和門相交對也賈林曰舍止也士衆交雜和合而止於軍中趨利而動梅堯臣曰軍門為和門兩軍交對而舍也何氏曰和門相望將合戰爭利兵家難事也張預曰軍門為和門言與敵對壘而舍其門相交對也或曰與上下交相和睦然後可以出兵為營舍故吳子曰不和於國不可以出軍不和於軍不可以出陳莫難於軍爭曹操曰從始受命至於交和軍爭難也杜牧曰於爭利害難也梅堯臣曰自受命至此為最難張預曰與人相對而爭利天下之至難也軍爭之難者以迂為直以患為利曹操曰示以遠速其道里先敵至也杜牧曰言欲爭奪先以迂遠為近以患為利誑紿敵人使其慢易然後急趨也陳皥曰言合軍聚衆交和而舍皆有舊制惟軍爭最難也苟不知以迂為直以患為利者即不能與敵爭也賈林曰全軍而行爭於便利之地而先據之若不得其地則輸敵之勝最其難也杜佑曰敵途本迂患在道遠則先處形勢之地故曰以患為利梅堯臣曰能變迂為近轉患為利難也王皙曰曹公曰示以遠速其道里先敵至皙謂示以遠者使其不虞而行或奇兵從間道出也何氏曰謂所征之國路由山險迂曲而遠將欲爭利則當分兵出奇隨逐鄉導由直路乘其不備急擊之雖有陷險之患得利亦速也如鍾會伐蜀而鄧艾出奇先至蜀蜀無備而降故下云不得鄉導不能得地利是也張預曰變迂曲為近直轉患害為便利此軍爭之難也故迂其途而誘之以利後人發先人至此知迂直之計者也曹操曰迂其途者示之遠也後人發先人至者明於度數先知遠近之計也李筌曰故迂其途示不速進後人發先人至也用兵若此以患為利者杜牧曰上解曰以迂為直是示敵人以迂遠敵意已怠復誘敵以利使敵心不專然後倍道兼行出其不意故能後發先至而得所爭之要害也秦伐韓軍於閼與趙王令趙奢往救之去邯鄲三十里而令軍中曰有以軍事諫者死秦軍武安西秦軍鼓譟勒兵武安屋瓦皆震軍中候有一人言急救武安奢立斬之堅壁留二十八日不行復益增壘秦間來奢善食而遣之間以報秦秦將大喜曰夫去國三十里而軍不行乃增壘閼與非趙地也奢既遣秦間乃卷甲而趨二日一夜至令善射者去閼與五十里而軍秦人聞之悉甲而至有一卒曰先據北山者勝奢使萬人據之秦人來爭不得奢因縱擊大破之閼與遂得解賈林曰敵途本近我能迂之者或以羸兵或以小利於他道誘之使不得以軍爭赴也梅堯臣曰遠其途誘以利款之也後其發先其至爭之也能知此者變迂轉害之謀也何氏曰迂途者當行之途也以分兵出奇則當行之途示以迂變設勢以誘敵令得小利縻之則出奇之兵雖後發亦先至也言爭利須料迂直之勢出奇故下云分合為變其疾如風是也張預曰形勢之地爭得則勝凡欲近爭便地先引兵遠去復以小利啖敵使彼不意我進又貪我利故我得以後發而先至此所謂以迂為直以患為利也趙奢據北山而敗秦軍郭淮屯北原而走諸葛是也能後發先至者明於度數知以迂為直之謀者也故軍爭為利軍爭為危曹操曰善者則以利不善者則以危李筌曰夫軍者將善則利不善則危杜牧曰善者計度審也賈林曰我軍先至得其便利之地則為利彼敵先據其地我三軍之衆馳往爭之則敵佚我勞危之道也梅堯臣曰軍爭之事有利也有危也又一本作軍爭為利衆爭為危何氏曰此又言出軍行師驅三軍之衆與敵人相角逐以爭一日之勝得之則為利失之則為危不可輕舉張預曰智者爭之則為利庸人爭之則為危明者知迂直愚者昧之故也舉軍而爭利則不及曹操曰遲不及也李筌曰輜重行遲賈林曰行軍用師必趨其利遠近之勢直以舉軍往爭其利難以速至可以潛設奇計迂敵途程敵不識我謀則我先而敵後也杜佑曰遲不及也舉軍悉行爭赴其利則道路悉不相逮梅堯臣曰舉軍中所有而行則遲緩王皙曰以輜重故張預曰竭軍而前則行緩而不能及利委軍而爭利則輜重捐曹操曰置輜重則恐捐棄也李筌曰委棄輜重則軍資闕也杜牧曰舉一軍之物行則重滯遲緩不及於利委棄輜重輕兵前追則恐輜重因此棄捐也賈林曰恐敵知而絶我後糧也杜佑曰委置庫藏輕師而行若敵乘虛而來抄絶其後則已輜重皆悉棄捐梅堯臣曰委軍中所有而行則輜重棄王皙同曹操注何氏同杜佑注張預曰委置重滯輕兵獨進則恐輜重為敵所掠故棄捐也是故卷甲而趨日夜不處曹操曰不得休息罷也倍道兼行百里而爭利則擒三將軍杜佑曰若不慮上二事欲從速疾卷甲束仗潛軍夜行若敵知其情邀而擊之則三軍之將為敵所擒也若秦伯襲鄭三帥皆獲是也徑者先疲者後其法十一而至曹操曰百里而爭利非也三將軍皆以為擒李筌曰一日行一百二十里則為倍道兼行行若如此則徑健者先到疲者後至軍健者少疲者多且十人可一人先到餘悉在後以此遇敵何三將軍不擒哉魏武逐劉備一日一夜行三百里諸葛亮以為強弩之末不能穿魯縞言無力也是以有赤壁之敗龐涓追孫臏死於馬陵亦其義也杜牧曰此説未盡也凡軍一日行三十里為一舍倍道兼行者再舍晝夜不息乃得百里為一舍倍道若如此爭利衆疲倦則三將軍皆須為敵所擒其法什一而至者不得已必須爭利凡十人中擇一人最徑者先往其餘者則令繼後而往萬人中先擇十人平旦先至其餘繼至有巳午時至者有申未時至者各得不竭其力相續而至與先往者足得聲響相接凡爭利必是爭奪要害雖千人守之亦足以拒抗敵人以待繼至者太宗以三千五百騎先據武牢竇建德十八萬衆而不能前此可知也陳皥曰杜説别是用兵一途非什一而至之義也蓋言百里爭利徑者先疲者後十中得一而至九皆疲困一則徑者也賈林曰路遠人疲奔馳力盡如此則我勞敵佚被擊何疑百里爭利慎勿為也杜佑曰百里爭利非也三將軍皆為擒也強弱不伏相待率十有一人至軍也罷音疲梅堯臣曰軍日行三十里而舍今乃晝夜不休行百里故三將軍為其擒也何則涉途既遠徑者少罷者多十中得一至耳三將軍者三軍之師也王皙曰罷羸也此言爭利之道宜近不宜遠耳夫衝風之衰不能起毛羽強弩之末不能穿魯縞苟日夜兼行百里趨利縱使一分徑者能至固已困乏矣即敵人以佚擊我之勞自當不戰而敗故司馬宣王曰吾倍道兼行此曉兵者之所忌也或曰趙奢亦卷甲而趨二日一夜卒勝秦者何也曰奢久并氣積力增壘遣間示怯以驕之使秦不意其至兵又堅奢又去閼與五十里而軍比秦聞之及發兵至非二三日不能也能來是彼有五十里趨敵之勞而我固已二三日休息士卒不勝其佚具又投之險難先據高陽奇正相因曷為不勝哉何氏曰言三將出奇求利委軍衆輜重卷甲務速若晝夜百里不息則徑者能十至其一我勞敵佚敵衆我寡擊之未必勝也敗則三將俱擒以此見武之深戒也張預曰卷甲猶悉甲也悉甲而進謂輕重俱行也凡軍日行三十里則止過六十里已上為倍道晝夜不息為兼行言百里之遠與人爭利輕兵在前輜重在後人罷馬倦渴者不得飲飢者不得食忽遇敵則以勞對佚以飢敵飽又復首尾不相及故三軍之帥必皆為敵所擒若晉人獲秦三帥是也輕兵之中十人得一人徑捷者先至下九人悉疲困而在後況重兵乎何以知輕重俱行下文云五十里而爭利則半至若止是輕兵則一日行五十里不為遠也焉有半至之理是必重兵偕行也五十里而爭利則蹶上將軍其法半至曹操曰蹶猶挫也李筌曰百里則十人一人至五十里十人五人至挫軍之威不至擒也言道近不至疲杜牧曰半至者凡十人中擇五人徑者先往也賈林曰上猶先也杜佑曰蹶猶挫也前軍之將已為敵所蹶敗梅堯臣曰十中得五猶遠不能勝王皙曰罷勞之患減於太半止挫敗而已張預曰路不甚遠十中五至猶挫軍威況百里乎蹶上將謂前軍先行也或問曰唐太宗征宋金剛一日一夜行二百餘里亦能克勝者何也答曰此形同而勢異也且金剛既敗衆心已沮迫而滅之則河東立平若其緩之賊必生計此太宗所以不計疲頓而力逐也孫子所陳爭利之法蓋與此異矣三十里而爭利則三分之二至曹操曰道近至者多故無死敗也李筌曰近不疲也故無死亡杜牧曰三十里內凡十人中可以六七人先往也不言其法者舉上文可知也杜佑曰道近則至者多故不言死敗勝負未可知也古者用師日行三十里步騎相須今徒而趨利三分之二至梅堯臣曰道近至多庶或有勝王皙曰計彼我之勢宜須爭者或亦當然雖三分二至蓋其精鋭者之力未至勞乏不可決以為敗故不云其法也張預曰路近不疲至者太半不失行列之政不絶人馬之力庶幾可以爭勝上三事皆謂舉軍而爭利也是故軍無輜重則亡無糧食則亡無委積則亡曹操曰無此三者亡之道也李筌曰無輜重者闕所供也袁紹有十萬之衆魏武用荀攸計焚燒紹輜重而敗紹於官渡無糧食者雖有金城不重於食也夫子曰足食足兵民信之矣故漢赤眉百萬衆無食而君臣面縳宜陽是以善用兵者先耕而後戰無委積者財乏闕也漢高祖無關中光武無河內魏武無兖州軍北身遁豈能復振也杜牧曰輜重者器械及軍士衣裝委積者財貨也陳皥曰此説委軍爭利之難也梅堯臣曰三者不可無是不可委軍而爭利也王皙曰委積謂薪鹽蔬材之屬軍恃此三者以濟不可輕離也張預曰無輜重則器用不供無糧食則軍餉不足無委積則財貨不充皆亡覆之道此三者謂委軍而爭利也故不知諸侯之謀者不能豫交曹操曰不知敵情謀者不能結交也李筌曰豫備也知敵之情必備其交也杜牧曰非也豫先也交交兵也言諸侯之謀先須知之然後可交兵合戰若不知其謀固不可與交兵也陳皥曰曹説以為不先知敵人之作謀即不能預結外援二説並通梅堯臣曰不知敵國之謀則不能預交鄰國以為援助也張預曰先知諸侯之實情然後可與結交不知其謀則恐翻覆為患其鄰國為援亦軍爭之事故下文云先至而得天下之衆者為衢地是也不知山林險阻沮澤之形者不能行軍曹操曰高而崇者為山衆樹所聚者為林坑塹者為險一高一下者為阻水草漸洳者為沮衆水所歸而不流者為澤不先知軍之所據及山川之形者則不能行師也梅堯臣曰山林險阻之形沮澤濘淖之所必先審知張預曰高而崇者為山衆木聚者為林坑坎者為險一高一下者為阻水草漸洳者為沮衆水所歸而不流者為澤凡此地形悉能知之然後可與人爭利而行軍不用鄉導者不能得地利李筌曰入敵境恐山川隘狹地土泥濘井泉不利使人導之以得地利易曰即鹿無虞則其義也杜牧曰管子曰凡兵主者必先審知地圖轘轅之險濫車之水名山通谷經川陵陸丘阜之所在苴草林木蒲葦之所茂道里之遠近城郭之大小名邑廢邑園殖之地必盡知之地形出入之相錯者盡藏之然後不失地利衛公李靖曰凡是賊徒好相掩襲須擇勇敢之夫選明察之士兼使鄉導潛歷山林密其聲晦其迹或刻為獸足而却履於中途或上冠微禽而幽伏於藂薄然後傾耳以遠聽竦目而深視專智以度事機注心而視氣色覩水痕則知敵濟之早晚觀樹動則可辨來寇之驅馳故烽火莫若謹而審旌旗莫若齊而一賞罰必重而不欺刑戮必嚴而不捨敵之動靜而我有備也敵之機謀而我先知也陳皥曰凡此地利非用鄉人為導引則不能知地利也杜佑曰不任彼鄉人而導軍者則不能得道路之便利也梅堯臣曰凡丘陵原衍之向背城邑道路之迂直非人引導不能得也何氏曰鄉導略曰從禽者若無山虞之官度其形勢之可否則徒入於林中終不能獲鹿矣出征者若無彼鄉之人導其道路之迂直則雖至于境外終不能獲寇矣夫以奉辭致討趨未歷之地聲教未通音驛所絶深入其阻不亦艱哉我孤軍以往彼密嚴而待客主之勢已相遠矣況其專任詭譎多方以誤我苟不計而直進冒危而長驅躋險則有壅決之害晝行則有暴來之鬭夜止則有虛驚之憂倉卒無備落其彀中是乃擁熊虎之師自投於死地又安能摩逆壘蕩狡穴乎故敵國之山川陵陸丘阜之可以設險者林木蒲葦茂草之可以隱藏者道里之遠近城郭之大小邑落之寬狹田壤之肥瘠溝渠之深淺蓄積之豐約卒乘之衆寡器械之堅脆必能盡知之則虜在目中不足擒也昔張騫嘗使大夏留胸奴中久導軍知利善水草處其軍得以無飢渴兹亦能獲其便利也凡用鄉導或軍行虜獲其人須防賊謀陰持姦計為其誘誤必在鑒其色察其情參驗數人之言始終如一乃可為準厚其頒賞使之懷恩豐其室家使之係心即為吾人當無翻覆然不如素畜堪用者但能諳練行途不必土人亦可任也仍選腹心智勇之士挾而偕往則巨細必審指蹤無失矣張預曰山川之夷險道路之迂直必用鄉人引而導之乃可知其所利而爭勝吳伐魯鄫人導之以克武城是也故兵以詐立杜牧曰詐敵人使不知我本情然後能立勝也梅堯臣曰非詭道不能立事王皙曰謂以迂為直以患為利也何氏曰張形勢以誤敵也張預曰以變詐為本使敵不知吾奇正所在則我可為立以利動杜牧曰利者見利始動也梅堯臣曰非利不可動王皙曰誘之也何氏曰量敵可擊則擊張預曰見利乃動不妄發也傳曰三軍以利動以分合為變者也曹操曰兵一分一合以敵為變也李筌曰以詭詐乘其利動或合或分以為變化之形杜牧曰分合者或分或合以惑敵人觀其應我之形然後能變化以取勝也陳皥曰乍合乍分隨而更變之也孟氏曰兵法詭詐以利動敵心或合或離為變化之術梅堯臣王皙同曹操注張預曰或分散其形或合聚其勢皆因敵動靜而為變化也或曰變謂奇正相變使敵莫測故衛公兵法云兵散則以合為奇兵合則以散為奇三令五申三散三合復歸於正焉故其疾如風曹操曰擊空虛也李筌曰進退也其來無迹其退至疾也梅堯臣曰來無形迹王皙曰速乘虛也何氏同梅堯臣注張預曰其來疾暴所向皆靡其徐如林曹操曰不見利也李筌曰整陳而行杜牧曰徐緩也言緩行之時須有行列如林木也恐為敵人之掩襲也孟氏曰言緩行須有行列如林以防其掩襲杜佑曰不見利不前如風吹林小動而其大不移梅堯臣曰如林之森然不亂也王皙曰齊肅也張預曰徐舒也舒緩而行若林木之森森然謂未見利也尉繚子曰重者如山如林輕者如炮如燔也侵掠如火曹操曰疾也李筌曰如火燎原無遺草杜牧曰猛烈不可嚮也賈林曰侵掠敵國若火燎原不可往復張預曰詩云如火烈烈莫我敢遏言勢如猛火之熾誰敢禦我不動如山曹操曰守也李筌曰駐車也杜牧曰間壁屹然不可搖動也賈林曰未見便利敵誘誑我我因不動如山之安梅堯臣曰峻不可犯王皙曰堅守也何氏曰止如山之鎮靜張預曰所以持重也荀子議兵篇云圓居而方正則若盤石然觸之者角摧言不動之時若山石之不可移犯之者其角立毁難知如陰李筌曰其勢不測如陰不能覩萬象杜牧曰如玄雲蔽天不見三辰梅堯臣曰幽隱莫測王皙曰形藏也何氏曰暗祕而不可料張預曰如陰雲蔽天莫覩辰象動如雷震李筌曰盛怒也杜牧曰如空中擊下不知所避也賈林曰其動也疾不及應太公曰疾雷不及掩耳梅堯臣曰迅不及避王皙曰不虞而至何氏曰藏謀以奮如此張預曰如迅雷忽擊不知所避故太公曰疾雷不及掩耳迅電不及瞬目掠鄉分衆曹操曰因敵而制勝也李筌曰抄掠必分兵為數道懼不虞也杜牧曰敵之鄉邑聚落無有守兵六畜財穀易於剽掠則須分番次第使衆人皆得往也不可獨有所往如此則大小強弱皆欲與敵爭利也陳皥曰夫鄉邑村落因非一處察其無備分兵掠之掠鄉一作指向賈林曰三軍不可言遣故以旌旗指向隊伍不可語傳故以麾幟分衆故因敵陳形可為勢此尤順訓練分明師徒服習也梅堯臣曰以饗士卒王皙曰指所鄉以分其衆鄉音向何氏曰得掠物則與衆分張預曰用兵之道大率務因糧於敵然而鄉邑之民所積不多必分兵隨處掠之乃可足用廓地分利曹操曰分敵利也李筌曰得敵地必分守利害杜牧曰廓開也開土拓境則分割與有功者韓信言於漢王曰項王使人有功當封爵者刻印刓忍不能與今大王誠能反其道以天下城邑封功臣天下不足取也三略曰獲地裂之陳皥曰言獲其土地則屯兵種薛以分敵之利也賈林曰廓度也度敵所據地利分其利也梅堯臣曰與有功也王皙曰廓視地形以據便利勿使敵專也張預曰開廓平易之地必分兵守利不使敵人得之或云得地則分賞有功者今觀上下之文恐非謂此也懸權而動曹操曰量敵而動也李筌曰權量稱也敵輕重與吾有銖鎰之别則動夫先動為客後動為主客難而主易太一遁甲定計之算明動易也杜牧曰如衡懸權稱量已定然後動也何氏同杜牧注張預曰如懸權於𢖍量知輕重然後動也尉繚子曰權敵審將而後舉言權量敵之輕重審察將之賢愚然後舉也先知迂直之計者勝此軍爭之法也李筌曰迂直道路勞佚餒寒生於道路杜牧曰言軍爭者先須計遠近迂直然後可以為勝其計量之審如懸權於衡不失錙銖然後可以動而取勝此乃軍爭勝之法也梅堯臣曰稱量利害而動在預知遠近之方則勝王皙曰量敵審輕重而動又知迂直必勝之道也張預曰凡與人爭利必先量道路之迂直審察而後動則無勞頓寒餒之患而且進退遲速不失其機故勝也軍政曰梅堯臣曰軍之舊典王皙曰古軍書言不相聞故為金鼓杜佑曰金鉦鐸也聽其音聲以為耳候梅堯臣曰以威耳也耳威於聲不可不清王皙曰鼓鼙鉦鐸之屬坐作進退疾徐疏數皆有其節視不相見故為旌旗杜佑曰瞻其指麾以為目候梅堯臣曰以威目也目威於色不得不明王皙曰表部曲行列齊整也夫金鼓旌旗者所以一人之耳目也李筌曰鼓進鐸退旌賞而旗罰耳聽金鼓目視旌旗故不亂也勇怯不能進退者由旗鼓正也張預曰夫用兵既衆占地必廣首尾相遼耳目不接故設金鼓之聲使之相聞立旌旗之形使之相見視聽均齊則雖百萬之衆進退如一矣故曰鬭衆如鬭寡形名是也人既專一則勇者不得獨進怯者不得獨退此用衆之法也杜牧曰旌以出令旗以應號蓋旗者即今之信旗也軍法曰當進不進當退不退者斬之吳起與秦人戰戰未合有一夫不勝其勇前獲雙首而返吳起斬之軍吏進練曰此材士也不可斬吳起曰信材士非令也乃斬之梅堯臣曰一人之耳目者謂使人之視聽齊一而不亂也鼓之則進金之則止麾右則右麾左則左不可以勇怯而獨先也王皙曰使三軍之衆勇怯進退齊一者鼓鐸旌旗之為也張預曰士卒專心一意惟在於金鼓旌旗之號令當進則進當退則退一有違者必戮故曰令不進而進與令不退而退厥罪惟均尉繚子曰鼓鳴旗麾先登者未嘗非多力國士也將者之過也言不可賞先登獲雋者恐進退不一耳故夜戰多火鼓晝戰多旌旗所以變人之耳目也李筌曰火鼓夜之所視聽旌旗晝之所指揮杜牧曰令軍士耳目皆隨旌旗火鼓而變也或曰夜戰多火鼓其旨如何夜黑之後必無原野列陳與敵刻期而戰也軍襲敵營鳴鼓然火適足以警敵人之耳明敵人之目於我返害其義安在答曰富哉問乎此乃孫武之微旨也凡夜戰者蓋敵人來襲我壘不得已而與之戰其法在於立營之法與陳小同故志曰止則為營行則為陳蓋大陳之中必包小陳大營之內亦包小營蓋前後左右之軍各自有營環繞大將之營居於中央諸營環之隅落鈎聯曲折相對象天之壁壘星其營相去上不過百步下不過五十步道徑通達足以出隊列部壁壘相望足以弓弩相救每於十字路口必立小堡上致柴薪穴為暗道胡梯上之令人看守夜黑之後聲鼓四起即以燔燎是以賊夜襲我雖入營門四顧屹然復有小營各自堅守東西南北未知所攻大將營或諸小營中先知有賊至者放令盡入然後擊鼓諸營齊應衆堡燎火眀如晝日諸營兵士於是閉門登壘下瞰敵人徑弩強弓四向俱發敵人雖有韓白之將鬼神之兵亦無能計也唯恐夜不襲我來則必敗若敵人或能潛入一營即諸營舉火出兵四面繞之號令營中不得輒動須臾之際善惡自分賊若出走皆在羅綱矣故司馬宣王入諸葛亮營壘見其曲折曰此兵下之奇才也今之立營通洞豁達雜以居之若有賊夜來斫營萬人一時驚擾雖多致斥候嚴為備守晦黑之後彼我不分雖有衆力亦不能用陳皥曰杜言夜黑之後必無原野列陳與敵人刻期而戰非也天寶末李光弼以五百騎趨河陽多列火炬首尾不息史思明數萬之衆不敢逼之豈止待賊斫營而已賈林曰火鼓旌旗可以聽望故晝夜異用之梅堯臣曰多者欲以變惑敵人耳目王皙曰多者所以震駭視聽使慹我之威武聲氣也傳曰多鼓鈞聲以夜軍之張預曰凡與敵戰夜則火鼓不息晝則旌旗相續所以變亂敵人之耳目使不知其所以備我之計越伐吳夾水而陳越為左右句卒使夜或左或右鼓譟而進吳師分以禦之遂為越所敗是惑以火鼓也晉伐齊使司馬斥山澤之險雖所不至必斾而踈陳之齊侯畏而脫歸是惑以旌旗也三軍可奪氣曹操曰左氏言一鼓作氣再而衰三而竭李筌曰奪氣奪其鋭勇齊伐魯戰於長勺齊人一鼓公將戰曹劌曰未可齊人三鼓劌曰可矣乃戰齊師敗續公問其故劌曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之奪三軍之氣也杜牧曰司馬法戰以力久以氣勝齊伐魯莊公將戰於長勺公將鼓之曹劌曰未可齊人三鼓劌曰可矣齊師敗績公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之晉將毋丘儉文欽反諸軍屯樂嘉司馬景王御枚徑造之欽子鴦年十八勇冠三軍曰及其未定請登城鼓噪擊之可破既而三噪之欽不能應鴦退相與引而東景王謂諸將曰欽走矣發鋭軍以追之諸將曰欽舊將鴦小而鋭引軍內入未有失利必不走也王曰一鼓作氣再而衰三而竭鴦鼓而欽不應其勢已屈不走何待欽果引去王皙曰震慹衰惰則軍氣奪矣何氏曰淮南子曰將充勇而輕敵卒果敢而樂戰三軍之衆百萬之師志厲青雲氣如飄風聲如雷霆誠積踰而威加敵人此謂氣勢吳子曰三軍之衆百萬之師張設輕重在於一人是謂氣機故奪氣者有所待有所乘則可矣張預曰氣者戰之所恃也夫舍生稟血鼓作鬭爭雖死不省者氣使然也故用兵之法若激其士卒令上下同怒則其鋒不可當故敵人新來而氣鋭則且以不戰挫之伺其衰倦而後擊故彼之鋭氣可以奪也尉繚子謂氣實則鬭氣奪則走者此之謂也曹劌言一鼓作氣者謂初來之氣盛也再而衰三而竭者謂陳久而人倦也又李靖曰守者不止完其壁堅其陳而已必也守吾氣而有待焉所謂守其氣者常養吾之氣使鋭盛而不衰然後彼之氣可得而奪也將軍可奪心李筌曰心之令憤撓之令亂間之令踈卑之令驕則彼之心可奪也杜牧曰心者將軍心中所倚賴以為軍者也後漢寇恂征隗囂囂將高峻守高平第一峻遣軍將皇甫文出謁恂辭禮不屈恂怒斬之遣其副峻惶恐即日開城門降諸將曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者今來辭氣不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳後燕慕容垂遣子寶率衆伐後魏始寶之來垂已有疾自到五原道武帝斷其來路父子問絶道武乃詭其行人之辭令臨河告之曰父已死何不遽還寶兄弟聞之憂懼以為信然因夜遁去道武襲之大破於參合陂梅堯臣曰以鼓旗之變惑奪其氣軍既奪氣將亦奪心王皙曰紛亂喧譁則將心奪矣何氏曰先須己心能固然後可以奪敵將之心故傳曰先人有奪人之心司馬法曰本心固新氣勝者是也張預曰心者將之所主也夫治亂勇怯皆主於心故善制敵者撓之而使亂激之而使惑迫之而使懼故彼之心謀可以奪也傳曰先人有奪人之心謂奪其本心之計也又李靖曰攻者不止攻其城擊其陳而已必有攻其心之術焉所謂攻其心者常養吾之心使安間而不亂然後彼之心可得而奪也是故朝氣鋭陳皥曰初來之氣氣方盛鋭勿與之爭也孟氏曰司馬法曰新氣勝舊氣新氣即朝氣也王皙曰士衆凡初舉氣鋭也晝氣惰王皙曰漸久少怠暮氣歸孟氏曰朝氣初氣也晝氣再作之氣也暮氣衰竭之氣也梅堯臣曰朝言其始也晝言其中也暮言其終也謂兵始而鋭久則惰而思歸故可擊王皙曰怠久意歸無復戰理故善用兵者避其鋭氣擊其惰歸此治氣者也李筌曰氣者軍之氣勇杜牧曰陽氣生於子成於寅衰於午伏於申凡晨朝陽氣初盛其來必鋭故須避之候其衰伏擊之必勝武德中太宗與竇建德戰於汜水東建德列陳彌亘數里太宗將數騎登高觀之謂諸將曰賊度險而囂是軍無政令逼城而陳有輕我心按兵不出待敵氣衰陳久卒飢必將自退退而擊之何往不克建德列陳自卯至午兵士飢倦悉列坐石又爭飲水太宗曰可擊矣遂戰生擒建德陳皥曰有辰巳列陳至午未未勝者午未列陳至申酉未勝者不必事須晨旦而為陽氣申午而為衰氣也太宗之攻建德也登高而望之謂諸將曰賊盡鋭來攻我當少避之退則可以騎留之以明不須晨旦也凡彼有鋭則如此避之不然則否杜佑曰避其精鋭之氣擊其懈惰欲歸此理氣者也曹劌之説是也梅堯臣曰氣盛勿擊衰懈易敗何氏曰夫人情莫不樂安而惡危好生而懼死無故驅之就卧尸之地樂趨於兵戰之場其心之所畜非有忿怒欲鬭之氣一旦乘而激之冒難而不顧犯危而不畏則未嘗不悔而怯矣今夫天下懦夫心有所激則率爾爭鬭不啻諸劌至于操刃而求鬭者氣之所乘也氣衰則息惻然而悔矣故三軍之視強寇如視處女者乘其忿怒而有所激也是以即墨之圍五千人擊却燕師者乘燕劓降掘冢之怒也秦之鬭士倍我者因三施無報之怒所以我怠而秦奮也二者治氣有道而所用乘其機也張預曰朝喻始晝喻中暮喻末非以早晚為辭也凡人之氣初來新至則勇鋭陳久人倦則衰故善用兵者當其鋭盛則堅守以避之待其惰歸則出兵以擊之此所謂善治己之氣以奪人之氣者也前趙將遊子遠之敗伊餘羌唐武德中太宗之破竇建德皆用此術以治待亂以靜待譁此治心者也李筌曰伺敵之變因而乘之杜牧曰司馬法曰本心固言料敵制勝本心已定但當調治之使安靜堅固不為事撓不為利惑候敵之亂伺敵之譁則出兵攻之矣陳皥曰政令不一賞罰不明謂之亂旌旗錯雜行伍輕囂謂之譁審敵如是則出攻之賈林曰以我之整治待敵之撓亂以我之清淨待敵之喧譁此治心者也故太公曰事莫大於必克用莫大於玄默也梅堯臣曰鎮靜待敵衆心則寧王皙同陳皥注何氏曰夫將以一身之寡一心之微連百萬之衆對虎狼之敵利害之相雜勝負之紛揉權智萬變而措置於胸臆之中非其中廓然方寸不亂豈能應變而不窮處事而不迷卒然遇大難而不驚案然接萬物而不惑吾之治足以待亂吾之靜足以待譁前有百萬之敵而吾視之則如遇小寇亞夫之禦寇也堅卧而不起欒針之臨敵也好以整又好以暇夫審此二人者藴以何術哉蓋其心治之有定養之有餘也張預曰治以待亂靜以待譁安以待躁忍以待忿嚴以待懈此所謂善治己之心以奪人之心者也以近待遠以佚待勞以飽待飢此治力者也李筌曰客主之勢杜牧曰上文云致人而不致於人是也杜佑曰以我之近待彼之遠以我之間佚待彼之疲勞以我之充飽待彼之飢虛此理人力者也梅堯臣曰無困竭人力以自弊王皙曰以餘制不足善治力也張預曰近以待遠佚以待勞飽以待飢誘以待來重以待輕此所謂善治已之力以困人之力者也無邀正正之旗勿擊堂堂之陳此治變者也曹操曰正正齊也堂堂大也李筌曰正正者齊整也堂堂者部分也杜牧曰堂堂者無懼也兵者隨敵而變敵有如此則勿擊之是能治變也後漢曹公圍鄴袁尚來救公曰尚若從大道來當避之若循西山來此成擒耳尚果循西山來逆擊大破之也梅堯臣曰正正而來堂堂而陳示無懼也必有奇變王皙曰本可要擊以視整齊盛大故變何氏曰所謂強則避之張預曰正正謂形名齊整也堂堂謂行陳廣大也敵人如此豈可輕戰軍政曰見可而進知難而退又曰強而避之言須識變通此所謂善治變化之道以應敵人者也故用兵之法高陵勿向背丘勿逆李筌曰地勢也杜牧曰向者仰也背者倚也逆者迎也言敵在高處不可仰攻敵倚丘山下來求戰不可逆之此言自下趨高者力乏自高趨下者勢順也故不可向迎孟氏曰敵背丘陵為陳無有後患則當引軍平地勿迎擊之杜佑曰敵若依據丘陵險阻陳兵待敵勿輕攻趨也既地勢不便及有殞石之衝也梅堯臣曰高陵勿向者敵處其高不可仰擊背丘勿逆者敵自高而來不可逆戰勢不便也王皙曰如此不便則當嚴陳以待變也何氏曰秦伐韓趙王令趙奢救之秦人聞之悉甲而至軍士許歷請以軍事諫曰秦人不意趙師至此其來氣盛將軍必厚集其陳以待之不然必敗今先據北山上者勝後至者敗奢從之即發萬人趨之秦兵後至爭山不得上奢縱兵擊之大破秦軍後周遣將伐高齊圍洛陽齊將段韶禦之登邙坂聊欲觀周軍形勢至太和谷便值周軍即遣馳告諸營與諸將結陳以待之周軍以步人在前上山逆戰韶以彼步我騎且却且引得其力弊乃遣下馬擊之短兵始交周人大潰並即奔遁張預曰敵處高為陳不可仰攻人馬之馳逐弧矢之施發皆不便也故諸葛亮曰山陵之戰不仰其高敵從高而來不可迎之勢不順也引至平地然後合戰佯北勿從李筌杜牧曰恐有伏兵也賈林曰敵未衰忽然奔北必有奇伏要擊我兵謹勒將士勿令逐追杜佑曰北奔走也敵方戰氣勢未衰便奔走而陳兵者必有奇伏勿深入從之故太公曰夫出甲陳兵縱卒亂行者欲以為變也梅堯臣同杜牧注王皙曰勢不至北必有詐也則勿逐何氏曰如戰國秦師伐趙趙奢之子括代廉頗將拒秦於長平秦陰使白起為上將軍趙出兵擊秦秦軍佯敗而走張二奇兵以劫之趙軍逐勝追造秦壁壁堅不得入而秦奇兵二萬五千人絶趙軍後又一軍五千騎絶趙壁間趙軍分而為二糧道絶而秦出輕兵擊之趙戰不利因築壁堅守以待救至秦聞趙食道絶王自之河內發卒遮絶趙救及糧食趙卒不得食四十六日陰相殺食括中射而死蜀劉表遣劉備北侵至鄴曹公遣夏侯惇李典拒之一朝備燒屯去惇遣諸將追擊之典曰賊無故退疑必有伏南道窄狹草木深不可追也不聽惇等果入賊伏裏典往救備見救至乃退西魏末遣將史寧與突厥同伐吐谷渾遂至樹敦即吐谷渾之舊都多諸珍藏而其主先已奔賀真城留其征南王及數千人固守寧攻之偽退吐谷渾人果關門逐之因回兵奪門門未及闔寧兵遂得入生獲其征南王俘獲男女財寶盡歸諸突厥北齊高澄立侯景叛歸梁而圍彭城澄遣慕容紹宗討之將戰紹宗以梁人剽悍恐其衆之撓也召將帥而語之曰我當佯退誘梁人使前汝可擊其背申明誡之景又命梁人曰逐北勿過二里會戰紹宗走梁人不用景言乘敗深入魏人以紹宗之言為信爭掩擊遂大敗之唐安祿山反郭子儀圍衛州偽鄭王慶緒率兵來援分為三軍子儀陳以待之預選射者三千人伏於壁內誡之曰俟吾小却賊必爭進則登城鼓譟弓弩齊發以逼之既戰子儀偽退而賊果乘之乃開壘門遽聞鼓譟矢注如雨賊徒震駭整衆追之遂虜慶緒張預曰敵人奔北必審真偽若旗鼓齊應號令如一紛紛紜紜雖退走非敗也必有奇也不可從之若旗靡輒亂人囂馬駭此真敗却也鋭卒勿攻李筌曰避強氣也杜牧曰避實也楚子伐隋隋臣季良曰楚人尚左君必左無與王遇且攻其右右無良焉必敗偏敗衆乃攜矣隋少師曰不當王非敵也不從隋師敗績陳皥曰此説是避敵所長非鋭卒勿攻之旨也蓋言士卒輕鋭且勿攻之待其懈惰然後擊之所謂千里遠鬭其鋒莫當蓋近之爾梅堯臣曰伺其氣挫何氏曰如蜀先主率大衆東伐吳吳將陸遜拒之蜀主從建平連圍至夷陵界立數十屯以金帛爵賞誘動諸夷先遣將吳班以數千人於平地立營欲以挑戰諸將皆欲擊之遜曰備舉軍東至鋭氣始盛且乘高守險難可卒攻攻之縱下猶難盡克若有不利損我必大今但且奬勵將士廣施方略以觀其變備知其計不行乃引伏兵八千人從谷中出遜曰所以不聽諸軍擊班者揣之必有巧故也諸將並曰攻備當在初今乃令人五六百里相御持經七八月其諸要害賊已固守擊之必無利矣遜曰備是猾虜其軍始集思慮精專未可干也今住已久不得我便兵疲意沮計不復生掎角此寇正在今日乃先攻一營不利遜曰吾已曉破之之術乃令各持一把茅以火攻拔之備因夜遁魏末吳將諸葛恪圍新城司馬景王使毋丘儉文欽等拒之儉欽請戰景王曰恪卷甲深入投兵死地其鋒未易當且新城小而固攻之未可拔遂令諸將高壘以弊之相持數日恪攻城力屈死傷太半景王乃令欽督鋭卒趣合榆斷其歸路恪懼而遁前趙劉曜遣將討羌大酋權渠率衆保險阻曜將遊子遠頻敗之權渠欲降其子伊餘大言於衆中曰往年劉曜自來猶無若我何晨壓子遠壘門左右勸出戰子遠曰吾聞伊餘有專諸之勇慶忌之捷其父新敗怒氣甚盛且西戎徑悍其鋒不可擬也不如緩之使氣竭而擊之乃堅壁不戰伊餘有驕色子遠候其無備夜分誓衆秣馬蓐食先晨具甲掃壘而出遲明設覆而戰生擒伊餘于陳唐武德中太宗率師往河東討劉武周江夏王道宗從軍太宗登玉壁城覩賊顧謂道宗曰賊恃其衆來邀我戰汝謂如何對曰羣賊鋒不可當易以計屈難與力爭令衆深壁高壘以挫其鋒烏合之徒莫能持久糧運致竭自當離散可不戰而擒太宗曰汝意見暗與我合後賊食盡夜遁一戰敗之又太宗征薛仁杲於折墌城賊十有餘萬兵鋒甚鋭數來挑戰諸將請戰太宗曰我卒新經挫衄鋭氣猶少賊驟勝必輕進好鬭我且閉壁以折之待其氣衰而後擊可一戰而破此萬全計也因令軍中曰敢言戰者斬相持久之賊糧盡軍中頗攜二其將相繼來降太宗知仁杲必腹內離謂諸將曰可以戰矣令總管梁實營於淺水原以誘之賊大將宗羅睺自恃驕悍求戰不得氣憤者久之及是盡鋭攻梁實冀逞其志梁實固險不出以挫其鋒羅睺攻之愈急太宗度賊已疲復謂諸將曰彼氣將衰吾當取之必矣申令諸將遲明合戰令將軍龐玉陳於淺水原南出賊之右先餌之羅睺併軍共戰玉軍幾敗太宗親禦大軍奄自原北出其不意羅睺回師相拒我師表裏齊奮呼聲動天羅睺氣奪於是大潰又李靖從河間王孝恭討蕭銑兵至夷陵銑將文士弘率精卒數萬屯清江孝恭欲擊之靖曰士弘銑之健將士卒驍勇今新出荆門盡兵出戰此是救敗之師恐不可當也宜且泊南岸勿與爭鋒待其氣衰然後奮擊破之必矣孝恭不從留靖守營與賊戰孝恭果敗奔于南岸張預曰敵若乘鋭而來其鋒不可當宜少避之以伺疲挫晉楚相持楚晨壓晉軍而陳軍吏患之欒書曰楚師輕窕固壘以待之三日必退退而擊之必獲勝焉又唐太宗征薛仁果賊兵鋒甚鋭數來挑戰諸將咸請戰太宗曰當且閉壘以折之待其氣衰可一戰而破也果然餌兵勿食李筌曰秦人毒涇上流杜牧曰敵忽棄飲食而去先須嘗試不可便食慮毒也後魏文帝時庫莫奚侵擾詔濟陰王新成率衆討之王乃多為毒酒賊既漸逼使棄營而去賊至喜競飲酒酣毒作王簡輕騎縱擊俘獲萬計陳皥曰此之獲勝蓋非偶然固非為將之道垂後世法也孫子豈以他人不能致毒於人腹中哉此言喻魚若見餌不可食也敵若懸利不可貪也曹公與袁紹將文醜等戰諸將以為敵騎多不如還營荀攸曰此所以餌敵也安可去之即知餌兵非止謂置毒也食字疑或為貪字也梅堯臣曰魚貪餌而亡兵貪餌而敗敵以兵來釣我我不可從王皙曰餌我以利必有奇伏何氏曰如春秋時楚伐絞軍其南門莫敖屈瑕曰絞小而輕輕則寡謀請無扞采樵者以誘之從之絞人獲三十人明日絞人爭出驅楚役徒於山中楚人坐其北門而覆諸山下大敗之為城下之盟而還又如赤眉佯敗棄輜重走車載土以豆覆其上鄧弘取之為赤眉所敗曹公未得濟而放牛馬馬超取之而公得渡又如曹公棄輜重文醜劉備分取之而為公所破又如後魏廣陽王元深以乜列河誘拔陵竟來抄掠拔陵為于謹伏兵所破此皆餌之之術也張預曰三略曰香餌之下必有懸魚言魚貪餌則為釣者所得兵貪利則為敵人所敗夫餌兵非止謂置毒於飲食但以利留敵皆為餌也若曹公以畜産餌馬超以輜重餌袁紹李矩以牛馬餌石勒之類皆是也歸師勿遏李筌曰士卒思歸志不可遏也杜牧曰曹公自征張繡於穰劉表遣兵救繡以絶軍後公將引還繡兵來追公軍不得進表與繡復合兵守險公軍前後受敵公乃夜鑿險為地道悉過輜重設奇兵步騎來攻大破之公謂荀文若曰虜遏吾歸師而與吾死地吾是以知勝矣孟氏曰人懷歸心必能死戰則不可止而擊也杜佑曰人人有室家鄉國之往不可遏截之徐觀其變而制之梅堯臣曰敵必死戰王皙曰人自為戰也勿遏塞之若猶有他慮則可要而擊曹公攻鄴袁尚來救諸將以為歸師不如避之公曰尚從大道來則避之若循西山來者此成擒耳蓋大道來則歸意全循山來則顧負險且有懼心也何氏曰如魏初曹操圍張繡於穰劉表遣兵救繡以絶軍後公將引還繡兵來追公軍不得進連營稍前到安衆繡與表合兵守險公軍前後受敵公乃夜鑿險為地道悉過輜重設奇兵會明賊謂公為遁也悉軍來追乃縱奇兵步騎夾攻大破之公謂荀彧曰虜遏吾歸師與吾死地是以知勝齊建武二年魏圍鍾離張欣泰為軍主隨崔慧景救援及魏軍退而邵陽洲上餘兵萬人求輸馬五百匹假道慧景欲斷路攻之欣泰説慧景曰歸師勿遏古人畏之兵在死地不可輕也慧景乃聽過也前秦符堅征晉至壽春兵敗還長安慕容泓起兵于華澤堅將符睿竇衝姚萇討之符睿勇果輕敵不恤士衆泓聞其至也懼率衆將奔關東睿馳兵邀之姚萇諫曰鮮卑有思歸之心宜驅令出關不可遏也睿弗從戰于華澤睿敗績被殺後涼吕弘攻段業於張掖不勝將東走業議欲擊之其將沮渠蒙遜諫曰歸師勿遏窮寇勿追此兵家之戒不如縱之以為後圖業曰一日縱敵悔將無及遂率衆追之為弘所敗張預曰兵之在外人人思歸當路邀之必致死戰韓信曰從思東歸之士何所不克曹公既破劉表謂荀彧曰虜遏吾歸師吾是以知勝又吕弘攻段業不勝將東走業欲擊之或諫曰歸師勿遏兵家之戒不如縱之以為後圖業不從率衆追之為弘所敗古人似此者多不可悉陳圍師必闕曹操曰司馬法曰圍其三面闕其一面所以示生路也李筌曰夫圍敵必空其一面示不固也若四面圍之敵必堅守不拔也項羽坑外黃魏武圍壼關即其義也杜牧曰示以生路令無必死之心因而擊之後漢妖巫維汜弟子單臣傅鎮等相聚入原武城劫掠吏人自稱將軍光武遣臧宫將北軍數千人圍之賊食多數攻不下士卒死傷帝召公卿諸侯王問方略明帝時為東海王對曰妖巫相劫勢無久立其中必有悔者但外圍急不得走耳小挺緩令得逃亡則一亭長足以擒矣帝即敕令開圍緩守賊衆分散遂斬臣鎮等大唐天寶末李光弼領朔方軍與史思明戰于土門賊衆退散四面圍合光弼令開東南角以縱之賊見開圍棄甲急走因追擊之盡殲其衆是開一面也杜佑曰若圍敵平陸之地必空一面以示其虛欲使戰守不固而有去留之心若敵臨危據險強救在表當堅固守之未必闕也此用兵之法梅堯臣同曹操注何氏曰如後漢初張步據齊地漢將耿弇總兵討之步使其大將費邑軍歷下又分守祝阿鍾城弇先擊祝阿自晨攻城未日中而拔故開圍一角令其衆得奔歸鍾城鍾城人聞祝阿已潰大恐懼遂空壁亡去又朱俊與徐璆共討黃巾餘賊韓忠據宛乞降不許因急攻之連城不克俊登山睹之顧謂張超曰吾知之矣賊今外圍周固內營急逼乞降不受欲出不得所以死戰也萬人一心猶不可當況十萬乎其害甚矣今不如徹圍并兵入城忠見圍解則勢必自出出則意散易破之道也既而解圍忠果出戰俊因破之又魏太祖圍壼關下令曰城拔皆坑之連月不下曹仁曰圍城必示之活門所以開其生路也今公告之必死將人自為守且城固而糧多攻之則士卒傷守之則日久今頓兵堅城之下攻必死之虜非良計也太祖從之開城遂降又後魏末齊神武起義兵於河北爾朱兆天光度律仲遠等四將同會鄴南士馬精強號二十萬圍神武於南陵山是時神武馬二千步卒不滿三萬人兆等設圍不合神武連繫牛驢自塞歸道於是將士死戰四面奮擊大破兆等張預曰圍其三面開其一角示以生路使不堅戰後漢朱雋討賊師韓忠於宛急攻不克因謂軍吏曰賊今外圍周固所以死戰若我解圍勢必自出出則意散易破之道也果如其言又曹公圍壼關謂之曰城破皆坑之連攻不下曹仁謂公曰夫圍城必示之活門所以開其生路也今公許之必死令人自守非計也公從之遂拔其城是也窮寇勿迫杜牧曰春秋時吳伐楚楚師敗走及清發闔閭復將擊之夫槩王曰困獸猶鬭況人乎若知不免而致死必敗我若使半濟而後可擊也從之又敗之漢宣帝時趙充國討先零羌羌覩大軍棄輜重欲渡湟水道厄狹充國徐行驅之或曰逐利行遲充國曰窮寇也不可迫緩之則走不顧急之則還致死諸將曰善虜果赴水溺死者數萬於是大破之也陳皥曰鳥窮則搏獸窮則噬也梅堯臣曰困獸猶鬭物理然也何氏曰前燕吕護據野王陰通晉事覺燕將慕容恪等率衆討之將軍傅顔言之恪曰護窮寇假合王師既臨則上下喪氣殿下前以廣固天險守易攻難故為長久之策今賊形不與往同宜急攻之以省千金之費恪曰護老賊經變多矣觀其為備之道則未易卒圖也今圍之於窮城樵採路絶內無蓄積外無強援不過於十旬弊之必矣何必殘士卒之命而趨一時之利哉此謂兵不血刃而坐以制勝也遂列長圍守之凡經六月而野王潰護南奔于晉悉降其衆五代晉將符彥卿杜重威經恪北鄙遇虜於陽城戎人十萬圍晉師於中野乏水軍人鑿井取泥衣絞而吮之人馬渴死甚衆彥卿曰與其束手就擒曷若以身徇國我今窮蹙乃率徑騎出擊之會大風揚塵乘勢決戰戎人大潰此彥卿為虜十萬所圍乃窮蹙之寇遂致死力以求生戎人不悟之致敗也張預曰敵若焚舟破釜來決一戰則不可逼迫蓋獸窮則搏也晉師敗齊于鞍齊侯請盟晉人不許齊侯曰請收合餘燼背城借一晉人懼而與之盟吳夫槩王謂困獸猶鬭漢趙充國言緩之則走不顧急之則還致死蓋亦近之此用兵之法也孫子注解卷之七
