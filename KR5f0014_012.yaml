body:
  text: 火攻篇曹操曰以火攻人當擇時日也王皙曰助兵取勝戒虛發也張預曰以火攻敵當使姦細潛行地里之遠近途徑之險易先熟知之乃可往故次九地孫子曰凡火攻有五一曰火人李筌曰焚其營殺其士卒也杜牧曰焚其營柵因燒兵士吳起曰凡軍居荒澤草木幽穢可焚而滅蜀先主伐吳吳將陸遜拒之於夷陵先攻一營不利諸將曰空殺兵耳遜曰吾已曉破敵之術矣乃勑各持一把茅以火攻拔之一爾勢成通率諸軍同時俱攻斬張南馮習及胡王沙摩柯等破四十餘營死者萬數備因夜遁軍資器械略盡遂驅血而殂梅堯臣曰焚營柵荒穢以助攻戰也何氏曰魯桓公世焚邾婁之咸丘始以火攻也後世兵家者流故有五火之攻以佐取勝之道也如後漢班超使西域到鄯善初夜將吏士奔虜營會天大風超令十人持鼓藏虜舍後約曰見火燃皆當鳴鼓大呼餘人悉持兵弩夾門而伏超順風縱火前後鼓譟虜衆驚亂超手格殺三人餘衆悉燒死又皇甫嵩率兵討黃巾賊張角嵩保長社賊來圍城嵩兵少軍中皆恐召軍吏謂曰兵有奇變不在衆寡今賊依草結營易為風火若因夜縱火必大驚亂吾出兵擊之其功可成其夕遂大風嵩乃約勒軍士皆束苣乘城使鋭士間出圍外縱火大呼城上舉燎應之嵩因鼓而奔其陳賊驚亂奔走大破之又五代梁太祖乾寧中親領大軍由鄆州東路北次於魚山朱宣覘知即以兵徑至且圖速戰帝整軍出寨時宣瑾已陳於前須臾東南風大起帝軍旌旗失次甚有懼色帝即令騎士揚鞭呼嘯俄而西北風驟發時兩軍皆在草莽中帝因令縱火既而煙焰亘天乘勢以攻賊陳宣瑾大破餘衆擁入清河因築京觀於魚山之下又後唐伐蜀工部任圜以大軍至漢州康延孝來逆戰圜命董璋以東川懦卒當其鋒伏精兵於其後延孝擊退東川之軍急追之遇伏兵延孝敗馳入漢州閉壁不出西川孟知祥以兵二萬與圜合勢攻之漢州四面樹竹木為柵三月圜陳于金鴈橋即率諸軍鼓譟而進四面縱火風欿亘空延孝危急引騎出陳于金鴈橋又大敗之張預曰焚彼營舍以殺其士火攻之先也班超燒胸奴使者是也二曰火積李筌曰焚積聚也杜牧曰積者積蓄也糧食薪芻是也高祖與項羽相持成臯為羽所敗北渡河得張耳韓信軍軍修武深溝高壘使劉賈將二萬人騎數百渡白馬津入楚地燒其積聚以破其業楚軍乏食隋文帝時高熲獻取陳之策曰江南土薄舍多茅竹所有儲積皆非地窖可密遣行人因風縱火待彼修葺復更燒之不出數年自可財力俱盡帝行其策由是陳人益弊梅堯臣曰焚其委積以困芻糧張預曰焚其積聚使芻糧不足故曰軍無委積則亡劉賈燒楚積聚是也三曰火輜四曰火庫李筌曰燒其輜重焚其庫室杜牧曰器械財貨及軍士衣裝在車中上道未止曰輜在城營壘已有止舍曰庫其所藏二者皆同後漢末袁紹相許攸降曹公曰今袁氏輜重有萬餘兩車屯軍不嚴今以輕兵襲之不意而至焚其積聚不過三日袁氏自敗公大喜選精騎五千皆用袁氏旗幟銜枚縛馬口從間道出入抱束薪所歷道有問者語之曰袁公恐曹操抄略後軍遣兵以益備聞者信以為然皆自若既至圍屯大放火營中驚亂因大破之輜重悉焚之矣陳皥曰夫敵有愛惜之物亦可以攻之彼若出救是我以火分其勢也更遇其心神撓惑自可破軍殺將也梅堯臣曰焚其輜重以窘貨財焚其庫室以空蓄聚何氏曰如前秦符堅遣將王猛伐前燕慕容暐師至潞川燕將慕容評率兵四十萬禦之以持久制之猛遣將郭慶率步騎五千夜從間道起火於晉山燒評輜重火見鄴中因而滅之張預曰焚其輜重使器用不供故曰軍無輜重則亡曹操燒袁紹輜重是也焚其府庫使財貨不充故曰軍無財則士不來五曰火隊李筌曰焚其隊仗兵器杜牧曰焚其行伍因亂而擊之梅堯臣曰焚其隊仗以奪兵具隊一作隧賈林曰隧道也燒絶糧道及轉運也何氏同賈林注張預曰焚其隊仗使兵無戰具故曰器械不利則難以應敵也行火必有因曹操曰因姦人李筌曰因姦人而內應也陳皥曰須得其便不獨姦人賈林曰因風燥而焚之張預曰凡火攻皆因天時燥旱營舍茅竹積芻聚糧居近草莽因風而焚之煙火必素具曹操曰煙火燒具也李筌曰薪芻蒿艾糧糞之屬杜牧曰艾蒿荻葦薪芻膏油之屬先須修事以備用兵法有火箭火簾火杏火兵火獸火禽火盜火弩凡此者皆可用也梅堯臣曰潛姦伺隙必有便也秉秆持燧必先備也傳曰惟事事有備乃無患也張預曰貯火之器燃火之物常須預備伺便而發發火有時起火有日梅堯臣曰不妄發也張預曰不可偶然當伺時日時者天之燥也曹操曰燥者旱也梅堯臣曰旱熯易燎張預曰天時旱燥則火易燃日者月在箕壁翼軫也凡此四宿者風起之日也李筌曰天文志月宿此者多風玉經云常以月加日從營室順數十五至翼月在宿於此也杜牧曰宿者月之所宿也四宿者風之使也梅堯臣曰箕龍尾也壁東壁也翼軫鶉尾也宿在者謂月之所次也四宿好風月離必起張預曰四星好風月宿則起當推步躔次知所宿之日則行火一説春丙丁夏戊己秋壬癸冬甲乙此日有疾風猛雨又占風法取雞羽重八兩挂於五丈竿上以候風所從來四宿即箕壁翼軫也凡火攻必因五火之變而應之梅堯臣曰因火為變以兵應之張預曰因其火變以兵應之五火即人積輜庫隊也火發於內則早應之於外曹操曰以兵應之也李筌曰乘火勢而應之也杜牧曰凡火乃使敵人驚亂因而擊之非謂空以火敗敵人也聞火初作即攻之若火闌衆定而攻之當無益故曰早也杜佑曰使間人縱火於敵營內當速進以攻其外也梅堯臣曰內若驚亂外以兵擊張預曰火才發於內則兵急擊於外表裹齊攻敵易驚亂火發兵靜者待而勿攻杜牧曰火作不驚敵素有備不可遽攻須待其變者也梅堯臣曰不驚撓者必有備也王皙曰以不變也何氏曰火作而敵不驚呼者有備也我往攻則返或受害張預曰火雖發而兵不亂者敵有備也復防其變故不可攻極其火力可從而從之不可從而止曹操曰見可而進知難而退李筌曰夫火發兵不亂不可攻杜牧曰俟火盡已來若敵人擾亂則攻之若敵終靜不擾則收兵而退也杜佑曰見利則進知難則退極盡也盡火力可則應不可則止無使敵知其所為梅堯臣曰極其火勢待其變則攻不變則勿攻王皙曰伺其變亂則乘之終不變亂則自治而蓄力何氏曰如魏滿寵征吳勑諸將曰今夕風甚猛賊必來燒我營宜為之備諸軍皆警夜半果來燒營寵掩擊破之者是也張預曰盡其火勢變亂則攻安靜則退火可發於外無待於內以時發之李筌曰魏武破袁紹於官渡用許攸計燒輜重萬餘則其義也杜牧曰上文云五火變須發於內若敵居荒澤草穢或營柵可焚之地即須及時發火不必更待內發作然後應之恐敵人自燒野草我起火無益漢時李陵征胸奴戰敗為單于所逐及於大澤胸奴於上風縱火陵亦先放火燒斷蒹葭用絶火勢陳皥曰以時發之所謂天之燥月之宿在四星也賈林曰火可發於外不必待內應得時即應發不可拘於常勢也梅堯臣同杜牧注張預曰火亦可發於外不必須待作於內但有便則應時而發黃巾賊張角圍漢將皇甫嵩於長社賊依草結營嵩使鋭士間出圍外縱火大呼城上舉燎應之嵩因鼓而奔其陳賊驚亂遂敗走火發上風無攻下風曹操曰不便也李筌曰隋江東賊劉元進攻王世充於延陵令把草東方因風縱火俄而回風悉燒元進營軍人多死者杜牧曰若是東則焚敵之東我亦隨以攻其東若火發東面攻其西則與敵人同受也故無攻下風則順風也若舉東可知其他也梅堯臣曰逆火勢非便也敵必死戰王皙曰或擊其左右可也張預曰燒之必退退而逆擊之必死戰則不便也晝風久夜風止曹操曰數當然也李筌曰不知始也杜牧曰老子曰飄風不終朝梅堯臣曰凡晝風必夜止夜風必晝止數當然也王皙同梅堯臣注張預曰晝起則夜息數當然也故老子曰飄風不終朝凡軍必知有五火之變以數守之杜牧曰須算星躔之數守風起日乃可發火不可偶然而為之杜佑曰既知起五火五變當復以數消息其可否梅堯臣曰數星之躔以候風起之日然而發火亦當自防其變張預曰不可止知以火攻人亦當防人攻已推四星之度數知風起之日則嚴備守之故以火佐攻者眀梅堯臣曰明白易勝張預曰用火助攻灼然可以取勝以水佐攻者強杜佑曰水以為衝故強梅堯臣曰勢之強也張預曰水能分敵之軍彼勢分則我勢強水可以絶不可以奪曹操曰火佐者取勝明也水佐者但可以絶敵道分敵軍不可以奪敵蓄積李筌曰軍者必守術數而佐之水火所以明強也光武之敗王莽魏武之擒吕布皆其義也以水絶敵人之軍分為二則可難以奪敵人之蓄積杜牧曰水可絶敵糧道絶敵救援絶敵奔逸絶敵衝擊不可以水奪險要蓄積也王皙曰強者取其決注之暴張預曰水止能隔絶敵軍使前後不相及取其一時之勝然不若火能焚奪敵之積聚使之滅亡若韓信決水斬楚將龍且是一時之勝也曹公焚袁紹輜重紹因以敗是使之滅亡也水不若火故詳於火而略於水夫戰勝攻取而不修其功者凶命曰費留曹操曰若水之留不復還也或曰賞不以時但費留也賞善不踰日也李筌曰賞不踰日罰不踰時若功立而不賞有罪而不罰則士卒疑惑日有費也杜牧曰修者舉也夫戰勝攻取若不藉有功舉而賞之則三軍之士必不用命也則有凶咎徒留滯費耗終不成事也賈林曰費留惜費也梅堯臣曰欲戰必勝攻必取者在因利乘便能作為功也作為功者修火攻水攻之類不可坐守其利也坐守其利者凶也是謂費留矣王皙曰戰勝攻取而不修功賞之差則人不勸不勸則費財老師凶害也已張預曰戰攻所以能必勝必取者水火之助也水火所以能破軍敗敵者士卒之用命也不修舉有功而賞之凶咎之道也財竭師老而不得歸費留之謂也故曰明主慮之良將修之杜牧曰黃石公曰夫霸者制士以權結士以信使士以賞信衰則士疏賞虧則士不為用賈林曰明主慮其事良將修其功梅堯臣曰始則君發其慮終則將修其功張預曰君當謀慮攻戰之事將當修舉剋捷之功非利不動李筌曰明主賢將非見利不起兵杜牧曰先見起兵之利然後兵起梅堯臣曰凡兵非利於民不興也一作非利不起也非得不用杜牧曰先見敵人可得然後用兵賈林曰非得其利不用也非危不戰曹操曰不得已而用兵李筌曰非至危不戰梅堯臣曰凡用兵非危急不戰也所以重凶器也張預曰兵凶器戰危事須防禍敗不可輕舉不得已而後用主不可以怒而興師王皙曰不可但以怒也若息侯伐鄭張預曰因怒興師不亡者鮮若息侯與鄭伯有違言而伐鄭君子是以知息之將亡將不可以愠而致戰王皙曰不可但以愠也若晉趙穿張預曰因忿而戰罕有不敗若姚襄怒符堅黃眉壓壘而陳因出戰為黃眉所敗是也怒大於愠故以主言之愠小於怒故以將言之君則可以興兵將則止可言戰合於利而動不合於利而止曹操曰不得以己之喜怒而用兵也賈林曰愠怒內作不顧安危固不可也杜佑曰人主聚衆興軍以道理勝負之計不可以已之私怒將舉兵則以策不可以愠恚之故而合戰也梅堯臣曰兵以義動無以怒興戰以利勝無以愠敗張預曰不可因已之喜怒而用兵當顧利害所在尉繚子曰兵起非可以忿也見勝則興不見勝則止怒可以復喜愠可以復悅張預曰見於色者謂之喜得於心者謂之悅亡國不可以復存死者不可以復生杜牧曰亡國者非能亡人之國也言不度德不量力因怒興師因愠合戰則其兵自死其國自亡者也杜佑曰凡主怒興軍伐人無素謀明計則破亡矣將愠怒而鬭倉卒而合戰所傷殺必多怒愠復可以説喜言亡國不可復存死者不可復生者言當慎之梅堯臣曰一時之怒可返而喜也一時之愠可返而説也國亡軍死不可復已王皙曰喜怒無常則威信去矣張預曰君因怒而興兵則國必亡將因愠而輕戰則士必死故眀君慎之良將警之此安國全軍之道也杜牧曰警言戒之也梅堯臣曰主當慎重將當警懼張預曰君常慎於用兵則可以安國將常戒於輕戰則可以全軍孫子注解卷之十二
