body:
  text: 勢篇曹操曰用兵任勢也李筌曰陳以形成如決建瓴之勢故以是篇次之王皙曰勢者積勢之變也善戰者能任勢以取勝不勞力也張預曰兵勢已成然後任勢以取勝故次形孫子曰凡治衆如治寡分數是也曹操曰部曲為分什伍為數李筌曰善用兵者將鳴一金舉一旌而三軍盡應號令既定如寡焉杜牧曰分者分别也數者人數也言部曲行伍皆分别其人數多少各任偏裨長伍訓練升降皆責成之故我所治者寡也韓信曰多多益辦是也陳皥曰若聚兵既衆即須多為部伍部伍之內各有小吏以主之故分其人數使之訓齊決斷遇敵臨陳授以方略則我統之雖衆治之益寡孟氏曰分隊伍也數兵之大數也分數多少制置先定梅堯臣曰部伍奇正之分數各有所統王皙曰分數謂部曲也偏裨各有部分與其人數若師旅卒兩之屬張預曰統衆既多必先分偏裨之任定行伍之數使不相亂然後可用故治兵之法一人曰獨二人曰比三人曰參比參為伍五人為列二列為火五火為隊二隊為官二官為曲二曲為部二部為校二校為裨二裨為軍遞相統屬各加訓練雖治百萬之衆如治寡也鬪衆如鬪寡形名是也曹操曰旌旗曰形金鼓曰名杜牧曰旌旗鍾鼓敵亦有之我安得獨為形名鬪衆如鬪寡也夫形者陳形也名者旌旗也戰法曰陳間容陳足曵白刃故大陳之中復有小陳各占地分皆有陳形旗者各依方色或認以鳥獸某將某陳自有名號形名已定志專勢孤人自為戰敗則自敗勝則自勝戰百萬之兵如戰一夫此之是也陳皥曰夫軍士既衆分布必廣臨陳對敵遞不相知故設旌旗之形使各認之進退遲速又不相聞故設金鼓以節之所以令之曰聞鼓則進聞金則止曹説是也梅堯臣曰形以旌旗名以采章指麾應速無有後先王皙曰曹公曰旌旗曰形金鼓曰名皙謂形者旌旗金鼓之制度名者各有其名號也張預曰軍政曰言不相聞故為鼓鐸視不相見故為旌旗今用兵既衆相去必遠耳目之力所不聞見故令士卒望旌旗之形而前却聽金鼓之號而行止則勇者不得獨進怯者不得獨退故曰此用衆之法也三軍之衆可使必受敵而無敗者奇正是也曹操曰先出合戰為正後出為奇李筌曰當敵為正傍出為奇將三軍無奇兵未可與人爭利漢吳王濞擁兵入大梁吳將田伯祿説吳王曰兵屯聚而西無他奇道難以立功臣願得五萬人别循江淮而上收淮南長沙入武關與大王會此亦一奇也不從遂為周亞夫所敗此則有正無奇杜牧曰解在下文賈林曰當敵以正陳取勝以奇兵前後左右俱能相應則常勝而不敗也梅堯臣曰動為奇靜為正靜以待之動以勝之王皙曰必當作畢字誤也奇正還相生故畢受敵而無敗也何氏曰兵體萬變紛紜混沌無不是正無不是奇若兵以義舉者正也臨敵合變者奇也我之正使敵視之為奇我之奇使敵視之為正正亦為奇奇亦為正大抵用兵皆有奇正無奇正而勝者幸勝也浪戰也如韓信背水而陳以兵循山而拔趙幟以破其國則背水正也循山奇也信又盛兵臨晉而以木罌從夏陽襲安邑而虜魏王豹則臨晉正也夏陽奇也由是觀之受敵無敗者奇正之謂也尉繚子曰今以鏌鎁之利犀兕之堅三軍之衆有所奇正則天下莫當其戰矣張預曰三軍雖衆使人人皆受敵而不敗者在乎奇正也奇正之説諸家不同尉繚子則曰正兵貴先奇兵貴後曹公則曰先出合戰為正後出為奇李衛公則曰兵以前向為正後却為奇此皆以正為正以奇為奇曾不説相變循環之義唯唐太宗曰以奇為正使敵視以為正則吾以奇擊之以正為奇使敵視以為奇則吾以正擊之混為一法使敵莫測兹最詳矣兵之所加如以碬投卵者虛實是也曹操曰以至實擊至虛李筌曰碬實卵虛以實擊虛其勢易也孟氏曰碬石也兵若訓練至整部領分明更能審料敵情委知虛實後以兵而加之實同以碬石投卵也梅堯臣曰碬石也音遐以實擊虛猶以堅破脆也王皙曰煆治鐵也何氏曰用兵識虛實之勢則無不勝張預曰下篇曰善戰者致人而不致於人此虛實彼我之法也引致敵來則彼勢常虛不往赴彼則我勢常實以實擊虛如舉石投卵其破之必矣夫合軍聚衆先定分數分數明然後習形名形名正然後分奇正奇正審然後虛實可見矣四事所以次序也凡戰者以正合以奇勝曹操曰正者當敵奇兵從傍擊不備也李筌曰戰無其詐難以勝敵杜佑曰正者當敵奇者從傍擊不備以正道合戰以奇變取勝也梅堯臣曰用正合戰用奇勝敵何氏曰如戰國廉頗為趙將秦使間曰秦獨畏趙括耳廉頗易與且降矣會頗軍多亡失數敗堅壁不戰又聞秦反間之言使括代頗至則出軍擊秦秦軍佯敗而走張二奇兵以劫之趙軍逐勝追造秦壁壁堅拒不得入而秦奇兵二萬五千絶趙軍後又五千騎絶趙壁間趙兵分為二糧道絶括卒敗又唐突厥犯塞煬帝令唐高祖與馬邑太守王仁恭率衆備邊會虜寇馬邑仁恭以衆寡不敵有懼色高祖曰今主上遐遠孤城絶援若不死戰難以圖全於是親選精騎四千出為遊軍居處飲食隨逐水草一同於突厥見虜候騎但馳騁獵耳若輕之及與虜相遇則掎角置陳選善射者為别隊持滿以待之虜莫能測不敢決戰因縱奇兵擊走之獲其特勒所乘駿馬斬首千餘級又太宗選精鋭千餘騎為奇兵皆黑衣玄甲分為左右隊建大旗令騎將秦叔寶程咬金等分統之每臨寇太宗躬被玄甲先鋒率之候機而進所向摧殄常以少擊衆賊徒氣懾又五代漢高祖在晉陽郭進往依之漢祖壯其材會北虜屠安陽城因遣進攻拔之戎人遁去授坊州刺史虜主道斃高祖出奇兵井陘進以間道先入沼北因定河北此皆以奇勝之迹也張預曰兩軍相臨先以正兵與之合戰徐發奇兵或搗其旁或擊其後以勝之若鄭伯禦燕師以三軍軍其前以潛軍軍其後是也故善出奇者無窮如天地李筌曰動靜也不竭如江河李筌曰通流不絶杜佑曰言應變出奇無窮竭張預曰言應變出奇無有窮竭終而復始日月是也死而復生四時是也李筌曰奇變如日月四時虧盈寒暑不停杜佑曰日月運行入而復出四時更王興而復廢言奇正變化或若日月之進退四時之盛衰也張預曰日月運行入而復出四時更互盛而復衰喻奇正相變紛紜渾沌終始無窮也聲不過五李筌曰宫商角徵羽也五聲之變不可勝聽也李筌曰變入八音奏樂之曲不可盡聽色不過五李筌曰青黃赤白黑也五色之變不可勝觀也味不過五李筌曰酸辛醎甘苦也五味之變不可勝嘗也曹操曰自無窮如天地已下皆以喻奇正之無窮也李筌曰五味之變庖宰鼎飪也杜牧曰自無窮如天地已下皆喻八陳奇正也張預曰引五聲五色五味之變以喻奇正相生之無窮戰勢不過奇正奇正之變不可勝窮也李筌曰邀截掩襲萬途之勢不可窮盡也梅堯臣曰奇正之變猶五聲五色五味之變無盡也王皙曰奇正者用兵之鈴鍵制勝之樞機也臨敵運變循環不窮窮則敗也孟氏曰六韜云奇正發於無窮之源張預曰戰陳之勢止於奇正一事而已及其變而用之則萬途千轍烏可窮盡也奇正相生如循環之無端孰能窮之李筌曰奇正相依而生如環團圓不可窮端倪也梅堯臣曰變動周旋之不極王皙曰敵不能窮我也何氏曰奇正生而轉相為變如循歷其環求首尾之莫窮也張預曰奇亦為正正亦為奇變化相生若循環之無本末誰能窮詰激水之疾至於漂石者勢也孟氏曰勢峻則巨石雖重不能止杜佑曰言水性柔弱石性剛重至於漂轉大石投之汙下皆由急疾之流激得其勢張預曰水性柔弱險徑要路激之疾流則其勢可以轉巨石也鷙鳥之疾至於毁折者節也曹操曰發起擊敵李筌曰柔勢可以轉剛況於兵者乎彈射之所以中飛鳥者善於疾而有節制杜牧曰勢者自高注下得險疾之勢故能漂石也節者節量遠近則攫之故能毁折物也杜佑曰發起討敵如鷹鸇之攫撮也必能挫折禽獸者皆由伺候之明邀得屈折之節也王子曰鷹隼一擊百鳥無以爭其勢猛虎一奮萬獸無以爭其威梅堯臣曰水雖柔勢迅則漂石鷙雖微節徑則折物王皙曰鷙鳥之疾亦勢也由勢然後有搏擊之節下要云險故先取漂石以喻也何氏曰水能動石高下之勢也鷙能搏物能節其遠近也張預曰鷹鸇之擒鳥雀必節量遠近伺候審而後擊故能折物尉繚子曰便吾器用養吾武勇發之如鳥擊李靖曰鷙鳥將擊卑飛斂翼皆言待之而後發也是故善戰者其勢險曹操李筌曰險猶疾也杜牧曰險者言戰爭之勢發則殺人故下文喻如彍弩王皙曰險者折以致其疾也如水得險隘而成勢其節短曹操李筌曰短近也杜牧曰言以近節也如鷙鳥之發近則搏之力全志專則必獲也杜佑曰短近也節斷也短近言能因危取勝以卒擊近也梅堯臣曰險則迅短則徑故戰之勢當險疾而短近也王皙曰鷙之能搏者發必中來勢遠而所搏之節至短也兵之乘機當如是耳曹公曰短者近也孟氏同杜牧注張預曰險疾短近也言善戰者先度地之遠近形之廣狹然後立陳使部伍行列相去不遠其進擊則以五十步為節不可過遠故勢迅則難禦節近則易勝勢如彍弩節如發機曹操曰在度不遠發則中也李筌曰弩不疾則不遠矢不近則不中勢尚疾節務速杜牧曰彍張也如弩已張發則殺人故上文云其勢險也機者固須以近節量之然後必能中故上文云其節短短乃近也此言戰陳不可遠逐敵人恐有隊伍離散斷絶反為敵所乘也故牧野誓曰六步七步四伐五伐是以近也陳皥曰弩之發機近則易中戰之遇敵疾則易捷若趨馳不速奮擊不近則不能克敵而全勝賈林曰戰之勢如弩之張兵之勢如機之發梅堯臣曰彍音霍彍張也如弩之張勢不逡巡如機之發節近易中也王皙曰戰勢如弩之張者所以有待也待其有可乘之勢如發其機何氏曰險疾也短近也此言擊戰得形便如張弩發機勢宜疾速仍利於便近不得追擊過差也故太公曰擊如發機者所以破精微也張預曰如弩之張勢不可緩如機之發節不可遠言趨利尚疾奮擊貴近也故太公曰擊如發機者所以破精微也紛紛紜紜鬪亂而不可亂也渾渾沌沌形圓而不可敗也曹操曰旌旗亂也示敵若亂以金鼓齊之卒騎轉而形圓者出入有道齊整也李筌曰紛紜而鬪示如可亂建旌有部鳴金有節是以不可亂也渾沌合雜也形圓無向背也示敵可敗而不可敗者號令齊整也杜牧曰此言陳法也風后握奇文曰四為正四為奇餘奇為握奇音機或總稱之先出遊軍定兩端此之是也奇者零也陳數有九中心有零者大將握之不動以制四面八陳而取準則焉其人之列面面相向背背相承也周禮搜苗獮狩車驟徒趨及表乃止進退疾徐疏密之節一如戰陳表乃旗也旗者蓋與民期於下也握奇文曰先出遊軍定兩端蓋遊軍執本方旗先定地界然後軍士赴之兵於旗下乃出奇正變為陳也周禮搜苗獮狩車驟徒趨及表乃止此則八陳遺制握奇之文止此而已其餘之詞乃後之作者增加之以重難其事耳夫五兵之利無如弧矢之利以威天下五兵同致天獨有弧矢星聖人獨言弧矢能威天下不言他兵何也蓋戰法利於弧矢者非得陳不見其利故黃帝勝於蚩尤以中夏車徒制夷虜騎士此乃弧矢之利也在於近代可以驗之者晉武時羌陷涼州司馬督馬隆請募勇士三千平之募腰引弩三十六鈞弓四鈞立標簡試軍西渡溫水虜樹機能以衆萬計遏隆隆依八陳法且戰且前弓矢所人皆應弦而倒誅殺萬計涼州遂平隋時突厥入寇楊素擊之先是諸將與虜戰每虞胡騎奔突皆戎車徒步相參舁鹿角為方陳騎在其內素至悉除舊法令諸軍各為步騎突厥聞之以手加額仰天曰天賜我也大率精騎十餘萬而至素一戰大破之此乃以徒步制騎士若非有陳法知開闔首尾之道安能致勝也曲禮曰行前朱雀而後玄武左青龍而右白虎招搖在上急繕其怒鄭司農云以四獸為軍陳象天也孔疏曰此言軍行象天文而作陳法但不知作之何如耳何徹云畫此四獸於旌旗上以標前後左右之陳也急繕其怒言其卒之徑利威怒如天之怒也招搖北斗杓第七星也舉此則六星可知也陳象天文即北斗也復曰進退有度鄭司農注曰度謂伐與步數也孔疏曰如牧野誓云六步七步四伐五伐是也復曰左右有局鄭司農注曰局是步分孔疏曰言軍之左右各有部分進則就敵退則就列不相差濫也下文復曰父之讎弗與共戴天兄弟之讎不返兵交遊之讎不同國四郊多壘此卿大夫之辱也此言讎辱至於戰爭期在必勝固不可不知陳法也其文故相次而言乃聖賢之深旨矣軍志曰陳間容陳足曳白刃隊間容隊可與敵對前禦其前後當其後左防其左右防其右行必魚貫立必鴈行長以參短短以參長回軍轉陳以前為後以後為前進無奔迸退無違走四頭八尾觸處為首敵衝其中兩頭俱救此亦與曲禮之説同數起於五而終於八今夔州州前諸葛武侯以石縱橫八行布為方陳奇正之出皆生於此奇亦為正之正正亦為奇之奇彼此相用循環無窮也諸葛出斜谷以兵少但能正用六數今盩厔司竹園仍有舊壘司馬懿以十萬步騎不敢決戰蓋知其能也杜佑曰旌旗亂也示敵若亂以金鼓齊之紛紛旌旗像紜紜士卒貌言旌旗翻轉一合一離士卒進退或往或來視之若散擾之若亂然其法令素定度職分明各有分數擾而不亂者也車騎齊轉形圓者出入有道齊整也渾渾車輪轉行沌沌步驟奔馳視其行陳縱橫圓而不方然而指趨各有所應故王子曰將欲內明而外暗內治而外混所以示敵之輕已者也梅堯臣曰分數已定形名已立離合散聚似亂而不能亂形無首尾應無前後陽旋陰轉欲敗而不能敗王皙曰曹公曰旌旗亂也示敵若亂以金鼓齊之矣皙謂紛紜鬪亂之貌也不可亂者節制嚴明耳又曹公曰車騎轉而形圓者出入有道齊整也皙謂渾沌形圓不測之貌也不可敗者無所隙缺又不測故也何氏曰此言鬪勢也善將兵者進退紛紛似亂然士馬素習旌旗有節非亂也渾沌形勢乍離乍合人以為敗而號令素明離合有勢非可敗也形圓無行列也張預曰此八陳法也昔黃帝始立丘井之法因以制兵故井分四道八家處之井字之形開方九焉五為陳法四為間地所謂數起於五也虛其中大將居之環其四面諸部連繞所謂終於八也及乎變化制敵則紛紜聚散鬪雖亂而法不亂渾沌交錯形雖圓而勢不散所謂分而成八復而為一也後世武侯之方陳李靖之六花唐太宗之破陳樂舞皆其遺制也亂生於治怯生於勇弱生於強曹操曰皆毁形匿情也李筌曰恃治之整不撫其下而多怨其亂必生秦并天下銷兵焚書以列國為郡縣而秦自稱始皇都關中以為至萬代有之至胡亥矜驕陳勝吳廣乘弊而起所謂亂生於治也以勇陵人為敵所敗秦王符堅鼓行伐晉勇也及其敗聞風聲鶴唳以為晉軍是其怯也所謂怯生於勇也吳王夫差兵無敵於天下陵齊於黃池陵越於會稽是其強也為越所敗城門不守兵圍王宫殺夫差而并其國所謂弱生於強也杜牧曰言欲偽為亂形以誘敵人先須至治然後能為偽亂也欲偽為怯形以伺敵人先須至勇然後能為偽怯也欲偽為弱形以驕敵人先須至強然後能為偽弱也賈林曰恃治則亂生恃勇強則怯弱生梅堯臣曰治則能偽為亂勇則能偽為怯強則能偽為弱王皙同梅堯臣注何氏曰言戰時為奇正形勢以破敵也我兵素治矣我士素勇矣我勢素強矣若不匿治勇強之勢何以致敵須張似亂似怯似弱之形以誘敵人彼惑我誘之之狀破之必矣張預曰能示敵以紛亂必已之治也能示敵以懦怯必已之勇也能示敵以羸弱必已之強也皆匿形以誤敵人治亂數也曹操曰以部曲分名數為之故不亂也李筌曰歷數也百六之災陰陽之數不由人興時所會也杜牧曰言行伍各有分畫部曲皆有名數故能為治然後能為偽亂也夫為偽亂者出入不時樵採縱橫刁斗不嚴是也賈林曰治亂之分各有度數梅堯臣曰以治為亂存之乎分數王皙曰治亂者數之變數謂法制張預曰實治而偽示以亂明其部曲行伍之數也上文所謂治衆如治寡分數是也勇怯勢也李筌曰夫兵得其勢則怯者勇失其勢則勇者怯兵法無定惟因勢而成也杜牧曰言以勇為怯者也見有利之勢而不動敵人以我為實怯也陳皥曰勇者奮速也怯者淹緩也敵人見我欲進不進即以我為怯也必有輕易之心我因其懈惰假勢以攻之龍且輕韓信鄭人誘我師是也孟氏注同陳皥梅堯臣曰以勇為怯示之以不取王皙曰勇怯者勢之變張預曰實勇而偽示以怯因其勢也魏將龐涓攻韓齊將田忌救之孫臏謂忌曰彼三晉之兵素悍勇而輕齊齊號為怯善戰者因其勢而利導之使齊軍入魏地日減其竈涓聞之大喜曰吾素知齊怯乃倍日并行逐之遂敗於馬陵強弱形也曹操曰形勢所宜杜牧曰以強為弱須示其形胸奴冒頓示婁敬以羸老是也陳皥曰楚王毁中軍以張隨人用為後圖此類也梅堯臣曰以強為弱形之以羸懦王皙曰強弱者形之變何氏曰形勢暫變以誘敵戰非怯非弱也示亂不亂隊伍本整也張預曰實強而偽示以弱見其形也漢高祖欲擊胸奴遣使覘之胸奴匿其壯士肥馬見其弱兵羸畜使者十輩皆言可擊惟婁敬曰兩國相攻宜矜誇所長今徒見老弱必有奇兵不可擊也帝不從果有白登之圍故善動敵者形之敵必從之曹操曰見羸形也李筌曰善誘敵者軍或強能進退其敵也晉人伐齊斥山澤之險雖所不至必斾而疏陳之輿曳柴從之齊人登山而望晉師見旌旗揚塵謂其衆而夜遁則晉弱齊為強也齊伐魏將田忌用孫臏謀減竈而趨大梁魏將龐涓逐之曰齊魯何其怯也入吾境亡者半矣及馬陵為齊人所敗殺龐涓虜魏太子而旋形以弱而敵從之也杜牧曰非止於羸弱也言我強敵弱則示以羸形動之使來我弱敵強則示之以強形動之使去敵之動作皆須從我孫臏曰齊國號怯三晉輕之令入魏境為十萬竈明日為五萬竈魏龐涓逐之曰齊虜何怯也入吾境土亡者大半因急追之至馬陵道狹臏乃斫木書之曰龐涓死此樹下伏弩於側令曰見火始發涓至鑽燧讀之萬弩齊發龐涓死此乃示以羸形能動龐涓遂來從我而殺之也隋煬帝於鴈門為突厥始畢可汗所圍太宗應募救援隸將軍雲定興營將行謂定興曰必多齎旗鼓以設疑兵且始畢可汗敢圍天子必以我倉卒無援我張吾軍容今數十里晝則旌旗相續夜則鉦鼓相應虜必以為救兵雲集覩塵而遁不然彼衆我寡不能久矣定興從之師次崞縣始畢遁去此乃我弱敵強示之以強動之令去故敵之來去一皆從我之形也梅堯臣曰形亂弱而必從王皙曰誘敵使必從何氏曰移形變勢誘動敵人敵昧於戰必落我計中而來力足制之張預曰形之以羸弱敵必來從晉楚相攻苗賁皇謂晉侯曰若欒范易行以誘之中行二郤必克二穆果敗楚師又楚伐隋羸師以張之季良曰楚之羸誘我也皆此二義也豫之敵必取之曹操曰以利誘敵敵遠離其壘而以便勢擊其空虛孤特也杜牧曰曹公與袁紹相持官渡曹公循河而西紹於是渡河追公公營南阪下馬解鞍時白馬輜重就道諸將以為敵騎多不如還營荀攸曰此所以餌敵也安可去之紹將文醜與劉備將五六千騎前後繼至或分趨輜重公曰可矣乃皆上馬時騎不滿六百人遂大破之斬文醜梅堯臣曰示畏怯而必取王皙曰餌敵使必取子與同張預曰誘之以小利敵必來取吳以囚徒誘越楚以樵者誘絞是也以利動之以卒待之曹操曰以利動敵也李筌曰後漢大司馬鄧禹之攻赤眉也赤眉佯北棄輜重而遁車皆載土覆之以豆禹軍乏食競趨之不為行列赤眉伏兵奄至擊之禹大敗則其義也杜牧曰以利動敵敵既從我則嚴兵以待之上文所解是也梅堯臣曰以上數事動誘敵而從我則以精卒待之王皙曰或使之從或使之取必先嚴兵以待之也何氏曰敵貪我利則失行列利既能動則以所待之卒擊之無不勝也如曹公西征馬超與超夾關為軍公急持之而潛遣徐晃朱靈等夜渡蒲坂津據河西為營公自潼關北渡未濟超赴船急戰公放牛馬以餌賊賊亂取牛馬公得渡循河為甬道而南賊退距渭口公乃多設疑兵潛以舟載兵入渭為浮橋夜分兵結營於渭南賊夜攻營伏兵奮擊破之十六國南梁秃髮傉檀守姑臧後秦姚興遣將姚弼等至於城下傉擅驅牛羊於野弼衆採掠傉檀分兵擊大破之後魏末大將廣陽王元深伐北狄使于謹單騎入賊中示以恩信於是西部鐵勒酋長乜列河等三萬餘户並款附相率南遷廣陽欲與謹至折敷嶺迎接之謹曰破六汗拔陵兵衆不少聞乜列河等歸附必來邀擊彼若先據險要則難與爭鋒今以乜列河等餌之當競來抄掠然後設伏而待必指掌破之廣陽然其計拔陵果來邀擊破乜列河於嶺上部衆皆沒謹伏兵發賊遂大敗悉收得乜列河之衆張預曰形之既從子之又取是能以利動之而來也則以徑卒待之李靖以卒為本以本待之者謂正兵節制之師故善戰者求之於勢不責於人杜佑曰言勝負之道自圖於中不求之下責怒師衆強使力進也若秦穆悔過不替孟明也故能擇人而任勢一作故能擇人而任之諸家作任勢者多矣曹操曰求之於勢者專任權也不責於人者權變明也李筌曰得勢而戰人怯者能勇故能擇其所能任之夫勇者可戰謹慎者可守智者可説無棄物也杜牧曰言善戰者先料兵勢然後量人之材隨短長以任之不責成於不材者也曹公征張魯於漢中張遼李典樂進將一千餘人守合淝教與護軍薛悌署函邊曰賊至乃發俄而吳孫權十萬人衆圍合淝乃共發教曰若孫權至者張李將軍出戰樂將軍守護軍勿得與戰諸將皆疑遼曰公征在外比救至彼破我必矣是以教及其未合逆擊之折其威勢以安衆心然後可守成敗之機在此一舉典與遼同出果大破孫權吳人奪氣還修守備衆心乃安權攻城十日不拔乃退孫盛論曰夫兵詭道也至於合淝之守懸弱無援專任勇者則好戰生患專任怯者則懼心難保且彼衆我寡衆者必懷貪惰我以致命之師擊貪惰之卒其勢必勝勝而後守則必固矣是以魏武雜選武力參以異同為之密教節宣其用事至而應若合符契也賈林曰讀為擇人而任勢言示以必勝之勢使人從之豈更外責於人求其勝敗擇勇怯之人任進退之勢陳皥曰善戰者專求於勢見利速進不為敵先專任機權不責成於人苟不獲已而用人即須擇而任之杜佑曰權變之明能簡置於人任已之形勢也梅堯臣曰用人以勢則易責人以力則難能者當在擇人而任勢何氏曰得勢自勝不專責人以力也王皙曰謂將能擇人任勢以戰則自然勝矣人者謂偏裨與張預曰任人之法使貪使愚使智使勇各任自然之勢不責人之所不能故隨材大小擇而任之尉繚子曰因其所長而用之言三軍之中有長於步者有長於騎者因能而用則人盡其材又晉侯類能而使之是也任勢者其戰人也如轉木石木石之性安則靜危則動方則止圓則行曹操曰任自然勢也李筌曰任勢御衆當如此也杜佑曰言投之安地則安投之危地則危不知有所回避也任勢自然也方圓之形猶兵勝負之形梅堯臣曰木石重物也易以勢動難以力移三軍至衆也可以勢戰不可以力使自然之道也何氏同梅堯臣注張預曰木石之性置之安地則靜置之危地則動方正則止圓斜則行自然之勢也三軍之衆甚陷則不懼無所往則固不得已則鬪亦自然之道故善戰人之勢如轉圓石於千仞之山者勢也李筌曰蒯通以為坂上走丸言其易也杜牧曰轉石於千仞之山不可止遏者在山不在石也戰人有百勝之勇強弱一貫者在勢不在人也杜公元凱曰昔樂毅藉濟西一戰能并強齊今兵威已成如破竹數節之後迎刃自解無復著手此勢也勢不可失乃東下建鄴終滅吳此篇大抵言兵貴任勢以險迅疾速為本故能用力少而得功多也梅堯臣曰圓石在山屹然其勢一人推之千人莫制也王皙曰石不能自轉因山之勢而不可遏也戰不能妄勝因兵之勢而不可支也張預曰石轉於山而不可止遏者由勢使之也兵在於險而不可制禦者亦勢使之也李靖曰兵有三勢將輕敵士欒戰志勵青雲氣等飄風謂之氣勢關山狹路羊腸狗門一夫守之千人不過謂之地勢因敵怠慢勞役飢渴前營未舍後軍半濟謂之因勢故用兵任勢如峻坂走丸用力至微而成功甚博也孫子注解卷之五
