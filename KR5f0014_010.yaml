body:
  text: 地形篇曹操曰欲戰審地形以立勝也李筌曰軍出之後必有地形變動王皙曰地利當周知險隘支挂之形也張預曰凡軍有所行先五十里内山川形勢使軍士伺其伏兵將乃自行視地之勢因而圖之知其險易故行師越境審地形而立勝故次行軍孫子曰地形有通者梅堯臣曰道路交達有挂者梅堯臣曰網羅之地往必掛綴有支者梅堯臣曰相持之地有隘者梅堯臣曰兩山通谷之間有險者梅堯臣曰山川丘陵也有遠者曹操曰此六者地之形也梅堯臣曰平陸也杜佑曰此六地之名教民居之得便利則勝也張預曰地形有此六者之别也我可以往彼可以來曰通杜佑曰謂俱在平陸往來通利也張預曰俱在平陸往來通達通形者先居高陽利糧道以戰則利曹操曰寧致人無致於人李筌曰先之以待敵杜牧曰通者四戰之地須先據高陽之處勿使敵人先得而我後至也利糧道者每於津阨或敵人要衝則築壘或作甬道以護之賈林曰通利者無有岡坂亦無要害故兩通往來處高易于望候向陽視生通糧道便易轉運於此利於戰也杜佑曰寧致人無致於人己先據高地分為屯守於歸來之路無使敵絶己糧道也梅堯臣曰先據高陽利糧道阨敵人來至我戰則利王皙註同曹操何氏同杜佑註張預曰先處戰地以待敵則致人而不致於人我雖居高面陽坐以致敵亦慮敵人不來赴戰故須使糧餉不絶然後為利可以往難以返曰挂杜佑曰掛者牽掛也挂形者敵無備出而勝之敵若有備出而不勝難以返不利李筌曰往難以返曰挂杜牧曰挂者險阻之地與敵共有犬牙相錯動有挂礙也往攻敵敵若無備攻之必勝則雖與險阻相錯敵人已敗不得復邀我歸路矣若往攻敵人敵人有備不能勝之則為敵人守險阻邀我歸路難以返也陳皥曰不得已陷在此則須為持久之計掠取敵人之糧以伺利便而擊之杜佑曰敵無備出攻之勝可也有備不得勝之則難還返也梅堯臣曰出其不意往則獲利若其有備往必受制張預曰察知敵情果為無備一舉而勝之則可矣若其有備出而弗克欲戰則不可留欲歸則不得返非所利也我出而不利彼出而不利曰支杜佑曰支久也俱不便久相持也張預曰各守險固以相支持支形者敵雖利我我無出也引而去之令敵半出而擊之利李筌曰支者兩俱不利如挂之形故各分其勢杜牧曰支者我與敵人各守高險對壘而軍中有平地狹而且長出軍則不能成陳遇敵則自下禦上彼我之勢俱不利便如此則堂堂引去伏卒待之敵若躡我候其半出發兵擊之則利若敵人先去以誘我我不可出也陳皥曰此說理繁而語倒但彼此出軍地形不便敵若設利誘我而去我慎勿追之我若引去敵止則已若來襲我候其半出則急擊之賈林曰支者隔險阻可以相要截足得相支持故不利先出也杜佑曰利利我也佯背我去我無出逐待其引而擊之可敗也梅堯臣曰各居所險先出必敗利而誘我我不可愛僞去引敵半出而擊王皙曰敵不肯至則設奇伏而退且詭之令必出張預曰利我謂佯背我去也不可出攻我捨險則反為所乘當自引去敵若來追伺其半出行列未定銳卒攻之必獲利焉李靖兵法曰彼此不利之地引而佯去待其半出而邀擊之隘形者我先居之必盈之以待敵杜佑曰盈滿也以兵陳滿隘形欲使敵不得進退也若敵先居之盈而勿從不盈而從之曹操曰隘形者兩山間通谷也敵勢不得撓我也我先居之必前齊隘口陳而守之以出奇也敵若先居此地齊口陳勿從也即半隘陳者從之而與敵共此利也李筌曰盈平也敵先守隘我去之趙不守井陘之口韓信下之陳豨不守漳水高祖下之是也杜牧曰盈者滿也言遇兩山之間中有通谷則須當山口為營與兩山口齊如水之在器而盈滿也杜佑曰謂齊口亦滿也如水之滿器與口齊也若我居之平易險阻皆制在我然後出奇以制敵若敵人據隘之半不知齊口滿盈之道我則入隘以從之蓋敵亦在隘我亦在隘俱得地形勝敗在我不在地形也夫齊口盈滿之術非惟隘形獨解有口譬如平坡迴澤車馬不通舟楫不勝中有一逕亦須據其路口使敵不得進也諸可知矣陳皥曰隘口言陳是也言營非也賈林曰從逐也盈實也敵若實而滿之則不可逐討若虚而無備則入而討之梅堯臣同杜牧註王皙同曹操註張預曰左右高山中有平谷我先至之必齊滿山口以為陳使敵不得進也我可以出奇兵彼不能以撓我敵若先居此地盈塞隘口而陳者不可從也若雖守隘口俱不齊滿者入而從之與敵共此險阻之利吴起曰無當天竈天竈者大谷之口言不可迎隘口而居之也險形者我先居之必居高陽以待敵杜佑曰居高陽之地以待敵人敵人從其下陰而來擊之則勝若敵先居之引而去之勿從也曹操曰地形險隘尤不可致於人李筌曰若險阻之地不可後於人杜牧曰險者山峻谷深非人力所能作為必居高陽以待敵若敵人先據之必不可以争則當引去陽者南面之地恐敵人持久我居陰而生疾也今若於崤澠遇敵則先據北山此乃是面陰而背陽也高陽二者止可捨陽而就高不可捨高而就陽孫子乃統而言之也杜佑曰地險先據則不致於人也梅堯臣曰先得險固居高就陽待敵則强敵苟先之就戰則殆引去勿疑王皙曰此亦争地若唐太宗先據武牢以待竇建德是也張預曰平陸之地尚宜先據況險阨之所豈可以致於人故先處高陽以佚待勞則勝矣若敵已據此地宜速引退不可與戰裴行儉討突厥嘗際晩下營塹壘方周忽令移就崇岡將士不悅以謂不可勞衆行儉不從速令徙之是夜風雨暴至前設營所水深丈餘將吏驚服以此觀之居高陽不惟戰便亦無水澇之患也遠形者勢均難以挑戰戰而不利曹操曰挑戰者延敵也李筌曰力敵而挑則利未可知也杜牧曰譬如我與敵壘相去三十里若我來就敵壘而延敵欲戰者是我困敵銳故戰者不利若敵來就我壘延我欲戰者是我佚敵勞敵亦不利故言勢均然則如何曰欲必戰者則移相近也陳皥曰夫與敵營壘相遠兵力又均難以挑戰戰則不利故下文云勢均以一擊十曰走是也夫挑戰先須料我兵衆强弱可以加敵則為之不然則不可輕進自取敗也孟氏曰兵勢既均我遠入挑則不利也杜佑曰挑迎敵也遠形去國遠也地勢均等無獨便利先挑之戰不利也梅堯臣曰勢既均一挑戰則勞致敵則佚王皙曰以遠致我勞也張預曰營壘相遠勢力又均止可坐以致敵不宜挑人而求戰也凡此六者地之道也將之至任不可不察也李筌曰此地形之勢也將不知者以敗賈林曰天生地形可以目察梅堯臣曰夫地形者助兵立勝之本豈得不度也張預曰六地之形將不可不知故兵有走者有弛者有陷者有崩者有亂者有北者凡此六者非天之灾將之過也賈林曰走弛陷崩亂北皆敗壞大小變易之名也張預曰凡此六敗咎在人事夫勢均以一擊十曰走曹操曰不料力李筌曰不量力也若得形便之地用奇伏之計則可矣杜牧曰夫以一擊十之道先須敵人與我將之智謀兵之勇怯天時地利飢飽勞佚十倍相懸然後可以奮一擊十若勢均力敵不能自料以我之一擊敵之十則須奔走不能返舍復為駐止矣梅堯臣曰勢雖均而兵甚寡以寡擊衆必走之道也王皙曰不待鬭而走也張預曰勢均謂將之智勇兵之利鈍一切相敵也夫體敵勢等自不可輕戰況奮寡以擊衆能無走乎卒强吏弱曰弛曹操曰吏不能統故弛壞杜牧曰言卒伍豪强將帥懦弱不能驅率故弛坼壞散也國家長慶初命田布帥魏以伐王廷凑布長在魏魏人輕易之數萬人皆乘驢行營布不能禁居數月欲合戰兵士潰散布自剄身死賈林曰令之不從威之不服見敵則亂不壞何為梅堯臣曰吏無統率者則軍政弛壞王皙同曹操註何氏曰言卒伍豪强將師懦弱不能驅領故弛坼壞散也張預曰士卒豪悍將吏懦弱不能統轄約束故軍政弛壞也吴楚相攻吴公子光曰楚軍多寵政令不一帥賤而不能整無大威命楚可敗果大敗楚師也吏强卒弱曰陷曹操曰吏强欲進卒弱輙陷敗也李筌曰陷敗也卒弱不一則難以為戰是以强陷也杜牧曰言欲為攻取士卒怯弱不量其力强進之則陷没於死地也陳皥曰夫人皆有血氣誰無鬭敵之心若將乏刑德士乏訓練則人皆懦怯不可用也賈林曰士卒皆羸鼓之不進吏强獨戰徒陷其身也梅堯臣曰吏雖强進不能激之以勇故陷於死王皙曰為下所陷張預曰將吏剛勇欲戰而士卒素乏訓練不能齊勇同奮苟用之必陷於亡敗大吏怒而不服遇敵懟而自戰將不知其能曰崩曹操曰大吏小將也大將怒之而不猒服忿而赴敵不量輕重則心崩壞李筌曰將為敵所怒不料强弱驅士卒如命者必崩壞杜牧曰春秋時楚子伐鄭晋師救之伍參言於楚子曰晋之從政者新未能行令其佐先縠剛愎不仁未肯用命其三帥者專行不獲聽而無上衆無適從此行也晋師必敗晋魏錡求公族未得而怒欲敗晋師請致師不許請使許之遂往請戰而還趙旃求卿未得請挑戰不許召盟許之與魏錡皆命而往却克曰二憾往矣弗備必敗隨會曰若二子怒楚楚人乘我喪師無日矣不如備之先縠曰不可隨會使鞏朔韓穿師七覆於敖前故上軍不敗而中軍下軍果敗七覆七處伏兵也敖山名也陳皥曰此大將無理而怒小將使之心内懷不服因緣怨怒遇敵便戰不顧能否所以大敗也賈林曰自上墮下曰崩大吏小將不相壓伏崩壞之道將又不量已之能否不知卒之勇怯强與敵鬭自取賊害豈非自上而崩乎梅堯臣曰小將心怒而不服遇敵怨懟而不顧自取崩敗者蓋將不知其能也王皙曰謂將怒不以理且不知禆佐之才激致其兇懟如山之崩壞也何氏曰三軍同力上下一心則勝也張預曰大凡百將一心三軍同力則能勝敵今小將恚怒而不服於大將之令意欲俱敗逢敵便戰不量能否故必崩覆晋伐秦荀偃行令是也曰雞鳴而駕唯余馬首是瞻欒書怒曰晋國之命未是有也遂棄之歸又趙穿惡臾駢而逐秦魏錡怒晋師而乘楚將弱不嚴教道不明吏卒無常陳兵縱横曰亂曹操曰為將若此亂之道也李筌曰將或有一於此亂之道也杜牧曰言吏卒皆不拘常度故引兵出陳或縱或横皆自亂之也賈林曰威令既不嚴明士卒則無常禀如此軍幕不亂何為謂將無嚴令賞罰不行之故梅堯臣曰懦而不嚴則士無常檢教而不明則出陳縱横不整亂之道也王皙曰亂者不勝其敗張預曰將弱不嚴謂將帥無威德也教道不明謂教閲無古法也吏卒無常謂將臣無久任也陳兵縱横謂士卒無節制也為將若此自亂之道將不能料敵以少合衆以弱擊强兵無選鋒曰北曹操曰其勢若此必走之兵也李筌曰軍敗曰北不料敵也杜牧曰衛公李靖兵法有戰鋒隊言揀擇敢勇之士每戰皆為先鋒司馬法曰選良次兵益人之强註曰勇猛勁捷戰不得功後戰必選於前當以激致其銳氣也東晋大將軍謝玄北鎮廣陵時符堅强盛玄多募勇勁劉牢之何謙諸葛侃高衡劉軌田洛孫無終等以驍猛應募玄以牢之領精銳為前鋒百戰百勝號為北府兵敵人畏之所向必克也賈林曰兵鋒不選利鈍士卒不知勇怯如此用兵自取背道也梅堯臣曰不能量敵情以少當衆不能選精銳以弱擊强皆奔北之理也何氏曰夫士卒疲勇不可混同為一一則勇士不勸疲兵因有所容出而不戰自敗也故兵法曰兵無選鋒曰北昔齊以伎擊强魏以武卒奮秦以銳士勝漢有三河俠士劔客奇材吴謂之解煩齊謂之决命唐謂之跳盪是皆選鋒之别名也兵之勝術無先於此凡軍衆既具則大將勒諸營各選精銳之士須趫健出衆武藝軼格者部為别隊大約十人選一人萬人選千人所選務寡要在必當擇腹心健將統率自大將親兵前鋒奇伏之類皆品量配之也張預曰設若奮寡以擊衆驅弱以敵强又不選驍勇之士使為先鋒兵必敗北也凡戰必用精銳為前鋒者一則壯吾志一則挫敵威也故尉繚子曰武士不選則衆不强曹公以張遼為先鋒而敗鮮卑謝玄以劉牢之領精銳而拒符堅是也凡此六者敗之道也陳皥曰一曰不量寡衆二曰本乏刑德三曰失於訓練四曰非理興怒五曰法令不行六曰不擇驍果此名六敗也將之至任不可不察也張預曰已上六事必敗之道夫地形者兵之助也杜牧曰夫兵之主在於仁義節制而已若得地形可以為兵之助所以取勝也助一作易陳皥曰天時不如地利孟氏曰地利待人而險賈林曰戰雖在兵得地易勝故曰兵之易也山可障水可灌高勝卑險勝平也王皙曰兵道則在人張預曰能審地形者兵之助耳乃末也料敵制勝者兵之本也料敵制勝計險阨遠近上將之道也杜牧曰饋用之費人馬之力攻守之便皆在險阨遠近也言若能料此以制敵乃為將臻極之道王皙曰料敵窮極之情險阨遠近之利害此兵道也何氏曰知敵知地將軍之職張預曰既能料敵虚實强弱之情又能度地險阨遠近之形本末皆知為將之道畢矣知此而用戰者必勝不知此而用戰者必敗杜牧曰謂知險阨遠近也梅堯臣曰將知地形又知軍政則勝不知則敗張預曰既知敵情又知地利以戰則勝俱不知之以戰即敗故戰道必勝主曰無戰必戰可也戰道不勝主曰必戰無戰可也李筌曰得戰勝之道必可戰也失戰勝之道必無戰可也立主人者發其行也杜牧曰主者君也黄石公曰出軍行師將在自專進退内御則功難成故聖主明王跪而推轂曰閫外之事將軍裁之孟氏曰寧違於君不逆士衆梅堯臣曰將在軍君命有所不受張預曰苟有必勝之道雖君命不戰可必戰也苟無必戰之道雖君命必戰可不戰也與其從令而敗事不若違制而成功故曰軍中不聞天子之詔故進不求名退不避罪王皙曰皆忠以為國也何氏曰進豈求名也見利於國家士民則進也退豈避罪也見其蹙國殘民之害雖君命使進而不進罪及其身不悔也唯人是保而利合於主國之寳也李筌曰進退皆保人非為身也杜牧曰進不求戰勝之名退不避違命之罪也如此之將國家之珍寳言其少得也陳皥曰合猶歸也梅堯臣曰寧違命而取勝勿順命而致敗王皙曰戰與不戰皆在保民利主而已矣張預曰進退違命非為己也皆所以保民命而合主利此忠臣國家之寳也視卒如嬰兒故可與之赴深谿視卒如愛子故可與之俱死李筌曰若撫之如此得其死力也故楚子一言三軍之士皆如挾纊也杜牧曰戰國時吴起為將與士卒最下者同衣食卧不設席行不乘騎親裹贏糧與士卒分勞苦卒有病疽吴起吮之其卒母聞而哭之或問曰子卒也而將軍自吮疽何為而哭母曰往年吴公吮其父其父不旋踵而死於敵今復吮此子妾不知其死所矣梅堯臣曰撫而育之則親而不離愛而勗之則信而不疑故雖死與死雖危與危王皙曰以仁恩結人心也何氏曰如後漢段熲為破羌將軍以征西羌行軍仁愛士卒傷者親自瞻省手為裹瘡在邊十餘年未嘗一日蓐寢與將士同苦故皆樂為死戰也晋王濬為巴郡太守郡邊吴境兵士苦役生男多不舉濬乃嚴其科條寬其徭課其産育者皆與休復所全活者數千人及後伐吴先在巴郡之所全活者皆堪徭役供軍其父母戒之曰王府君生爾爾必勉之無愛死也故吴子有父子之兵張預曰將視卒如子則卒視將如父未有父在危難而子不致死故荀卿曰臣之於君也下之於上也如子弟之事父兄手足之捍頭目也夫美酒泛流三軍皆醉温言一撫士同挾纊信乎以恩遇下古人所重也故兵法曰勤勞之師將必先己暑不張蓋寒不重衣險必下步軍井成而後飲軍食熟而後飯軍壘成而後舍厚而不能使愛而不能令亂而不能治譬若驕子不可用也曹操曰恩不可專用罰不可獨任若驕子之喜怒對目還害而不可用也李筌曰雖厚愛人不令如驕子者有勃逆之心不可用也杜牧曰黄石公曰士卒可下而不可驕夫恩以養士謙以接之故曰可下制之以法故曰不可驕陰符曰害生於恩吴起曰夫鼓鼙金鐸所以威耳旌旗麾章所以威目禁令刑罰所以威心耳威於聲不得不清目威於色不得不明心威於刑不得不嚴三者不立必敗於敵故曰將之所撝莫不從移將之所指莫不前死衛公李靖曰古之善為將者必能十卒而殺其三次者十殺其一十殺其三威振於敵國十殺其一令行於三軍是知畏我者不畏敵畏敵者不畏我善無細而不賞惡無微而不貶馬謖軍敗葛亮對泣而行誅鄉人盗笠吕蒙垂涕而後斬馬逸犯禾曹公割髮而自刑兩掾辭屈黄蓋詰問而俱斬故能威克其愛雖少必濟愛加其威雖多必敗孟氏曰唯務行恩恩勢已成刑之必怨唯務行刑刑怨已深恩之不附必使恩威相參賞罰並用然後可以為將可以統衆也梅堯臣曰厚養而不使愛寵而不教亂法而不治猶如驕子安得而用也王皙曰恩不以嚴未可濟也何氏曰言恩不可純任純任則還為己害張預曰恩不可以專用罰不可以獨行專用恩則卒如驕子而不能使此曹公所以割髮而自刑卧龍所以垂泣而行戮楊素所以流血盈前而言笑自若李靖所以十殺其三使畏我而不畏敵也獨行罰則士不親附而不可用此古將所以投酒楚子所以挾纊吴起所以分衣食闔閭所以同勞佚也在易之師初六曰師出以律謂齊衆以法也九二曰師中承天寵謂勸士以賞也以此觀之王者之兵亦德刑參任而恩威並行矣尉繚子曰不愛悅其心者不我用也不嚴畏其心者不我舉也故善將者愛與畏而已知吾卒之可以擊而不知敵之不可擊勝之半也梅堯臣曰知己而不知彼或有勝耳知敵之可擊而不知吾卒之不可以擊勝之半也杜牧曰可擊者勇敢輕死也不可擊者頓弊怯弱也陳皥曰此説非也可擊不可擊者所謂兵衆孰强士卒敦練賞罰敦明也梅堯臣曰知彼而不知己或有勝耳王皙曰知己不知彼知彼不知己皆未可以决勝也張預曰或知己而不知彼或知彼而不知己則有勝有負也唐太宗曰吾嘗臨陳先料敵心與己之心敦審然後彼可得而知焉察敵氣與己之氣敦治然後我可得而知焉言料心審治亂察氣見强弱形也可戰與不可戰也知敵之可擊知吾卒之可以擊而不知地形之不可以戰勝之半也曹操李筌曰勝之半者未可知也杜牧曰地形者險易遠近出入迂直也梅堯臣曰知彼知己而不知地形亦或不勝王皙曰雖知彼已可以戰然不可虧地利也張預曰既知己而又知彼但不得地形之助亦不可全勝故知兵者動而不迷舉而不窮杜牧曰未動未舉勝負已定故動則不迷舉則不窮也一云動而不困舉而不頓陳皥曰窮者困也我若識彼此之動否量地形之得失則進而不迷戰而不困者也梅堯臣曰無所不知則動不迷闇舉不困窮也王皙曰善計者不迷善軍者不窮張預曰不妄動故動則不誤不輕舉故舉則不困識彼我之虚實得地形之便利而後戰也故曰知彼知己勝乃不殆張預曰曉攻守之術則有勝而無危知天知地勝乃不窮李筌曰人事天時地利三者同知則百戰百勝杜佑曰知地之便知天之時地之便依險阻向高陽也天之時順寒暑法刑德也既能知彼知己又按地形法天道勝乃可全又何難也梅堯臣曰知彼利知此利故不危知天時知地形故不極王皙同梅堯臣註張預曰順天時得地利取勝無極孫子註解卷之十
