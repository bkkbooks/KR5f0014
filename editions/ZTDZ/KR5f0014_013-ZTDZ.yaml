  text: 孫子註解卷之十三靜五
  hash: sha256:22e2b5b0a027bbc0f5c57d40256d01ce0adfa6b8639d64a8a7e92419267c57d9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0014_SJB_013-270566c, image: sjb/27/270566c.png}
body:
  text: 用間篇曹操李筌曰戰者必用間諜以知敵之情實也張預曰欲素知敵情者非間不可也然用間之道尤須微密故次火攻也孫子曰凡興師十萬出征千里百姓之費公家之奉日費千金内外騷動怠於道路不得操事者七十萬家曹操曰古者八家為鄰一家從軍七家奉之言十萬之師舉不事耕稼者七十萬家李筌曰古者發一家之兵則鄰里三族共資之是以不得耕作者七十萬家而資十萬之衆矣杜牧曰古者一夫田一頃夫九頃之地中心一頃鑿井樹廬八家居之是為井田怠疲也言七十萬家奉十萬之師轉輸疲於道路也梅堯臣曰輸糧供用公私煩役疲於道路廢於耒耜也曹説是也張預曰井田之法八家為鄰一家從軍七家奉之興兵十萬則輟耕作者七十萬家也或問曰重地則掠疲於道路而轉輸何也曰非止運糧亦供器用也且兵貴掠敵者謂深踐敵境則當備其乏故須掠以繼食非專館穀於敵也亦有磧鹵之地無糧可因得不餉乎相守數年以争一日之勝而愛爵禄百金不知敵之情者不仁之至也李筌曰惜爵賞不與間諜令窺敵之動静是為不仁之至也杜牧曰言不能以厚利使間也梅堯臣曰相守數年則七十萬家所費多矣而乃惜爵禄百金之微不以遺間釣情取勝是不仁之極也王皙曰恡財賞不用間也張預曰相持且久七十萬家財力一困不知恤此而反靳惜爵賞之細不以啗間求索知敵情者不仁之甚也非人之將也梅堯臣曰非將人成功者也非主之佐也一本作非仁之佐也梅堯臣曰非以仁佐國者也非勝之主也梅堯臣曰非致勝主利者也張預曰不可以將人不可以佐主不可以主勝勤勤而言者嘆惜之也故明君賢將所以動而勝人成功出於衆者先知也李筌曰為間也杜牧曰知敵情也梅堯臣曰主不妄動動必勝人將不苟功功必出衆所以者何也在預知敵情也王皙曰先知敵情制勝如神也何氏曰周官士師掌邦諜蓋異國間伺之謂也故兵家之有四機二權曰事機曰智權皆善用間諜者也故能敵人動静我預知矣韋孝寬為驃騎大將軍鎮玉壁孝寬善於撫御能得人心所遣間諜入齊者皆為盡力亦有齊人得孝寬金貨遥通書疏故齊之動静朝廷皆先知之時有主帥許盆孝寬委以心膂令守一戍盆乃以城東入孝寬怒遣諜取之俄而斬首而還其能致物情如此又李達為都督義州弘農等二十一防諸軍事每厚撫境外之人使為間諜敵中動静必先知之至有事泄被誅戮者亦不以為悔其得人心也如此張預曰先知敵情故動則勝人功業卓然超絶羣衆先知者不可取於鬼神張預曰視之不見聽之不聞不可以禱祀而取不可象於事曹操曰不可以禱祀而求亦不可以事類而求也李筌曰不可取於鬼神象類唯間者能知敵之情杜牧曰象者類也言不可以他事此類而求梅堯臣曰不可以卜筮知也不可以象類求也張預曰不可以事之相類者擬象而求不可驗於度曹操曰不可以事數度也李筌曰度數也夫長短闊狹遠近小大即可驗之於度數人之情僞度不能知也梅堯臣曰不可以度數驗也言先知之難也張預曰不可以度數推驗而知必取於人知敵之情者也曹操曰因人也李筌曰因間人也梅堯臣曰鬼神之情可以卜筮知形氣之物可以象類求天地之理可以度數驗唯敵之情必由間者而後知也張預曰鬼神象類度數皆不可以求先知必因人而後知敵情也故用間有五有因間有内間有反間有死間有生間梅堯臣曰五間之名也張預曰此五間之名因間當為鄉間故下文云鄉間可得而使五間俱起莫知其道是謂神紀人君之寳也曹操曰同時任用五間也李筌曰五間者因五人用之杜牧曰五間俱起者敵人不知其情泄形露之道乃神鬼之綱紀人君之重寳也梅堯臣曰五間俱起以間敵而莫知我用之之道是曰神妙之綱紀人君之所貴也王皙曰五間俱起人不之測是用兵神妙之大紀人主之重寳也賈林曰紀理也言敵人但莫知我以何道如通神理也張預曰五間循環而用人莫能測其理兹乃神妙之綱紀人君之重寳也因間者因其鄉人而用之杜牧曰因敵鄉國之人而厚撫之使為間也晋豫州刺史祖逖之鎮雍丘愛人下士雖疏交賤𨽻皆恩禮而遇之河上堡因先有任子在胡者皆聽兩屬時遣游軍僞抄之明其未附諸塢王感戴胡有異圖輒密以聞前後尅獲蓋由於此西魏韋孝寬使齊人斬許盆而來猶其義也賈林曰讀因間為鄉間杜佑曰因敵鄉人知敵表裏虚實之情故就而用之可使伺候也梅堯臣曰因其國人利而使之何氏曰如春秋時楚師伐宋九月不服將去宋楚大夫申叔時曰築室反耕者宋必聽命楚子從之宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告曰弊邑易子而食析骸而爨雖然城下之盟有以國斃不能從也去我三十里唯命是聽子反懼與之盟而告楚子退三十里宋及楚平張預曰因敵國人知其底裏就而用之可使伺候也韋孝寬以金帛啗齊人而齊人遥通書䟽是也内間者因其官人而用之李筌曰因敵人失職之官魏用許攸也杜牧曰敵之官人有賢而失職者有過而被刑者亦有寵嬖而貪財者有屈在下位者有不得任使者有欲因敗喪以求展已之材能者有翻覆變詐常持兩端之心者如此之官皆可以潜通問遭厚貺金帛而結之因求其國中之情察其謀我之事復間其君臣使不和同也杜佑曰因在其官失職者若刑戮之子孫與受罰之家也因其有隙就而用之梅堯臣曰因其官屬結而用之何氏曰如益州牧羅尚遣將隗伯攻蜀賊李雄於郫城互有勝負雄乃募武都人朴泰鞭之見血使譎羅尚欲為内應以火為期尚信之悉出精兵遣隗伯等率兵從泰擊雄雄將李驤於道設伏泰以長梯倚城而舉火伯軍見火起而争緣梯泰又以繩汲上尚軍百餘人皆斬之雄因放兵内外擊之大破尚軍此用内間之勢也又隋陰壽為幽州總管高寶寧舉兵反壽討之寶寧奔于磧北壽班師留開府成道昂鎮之寶寧遣其子僧伽率輕騎掠城下而去尋引契丹靺鞨之衆來攻道昂苦戰連月乃退壽患之於是重賄寶寧又遣人陰間其所親任者趙世模王威等月餘世模率其衆降寳寧復走契丹為其麾下趙修羅所殺北邊遂安又唐太宗討竇建德入武牢進薄其營多所傷殺凌敬進說曰宜悉兵濟河攻取懷州河陽使重將居守更率衆鳴鼓建旗踰太行入上黨先聲後實傳檄而定漸趨壼口稍駭蒲津收河東之地此策之上也行必有三利一則入無人之境師有萬全二則拓土得兵三則鄭圍自解建德將從之王世充之使長孫安世陰齎金玉啗其諸將以亂其謀衆咸進諫曰凌敬書生耳豈可與言戰乎建德從之退而謝敬曰今衆心甚銳此天賛我矣因此决戰必然大捷已依衆議不得從公言也敬固争建德怒杖出焉於是悉衆進逼武牢太宗按甲挫其銳建德中槍竄於牛口渚車騎將軍白士讓楊武威生獲之又王翦為秦將攻趙趙使李牧司馬商禦之李牧數破走秦軍殺秦將桓齮翦惡之乃多與趙王寵臣郭開等金使為反間曰李牧司馬商欲與秦廢趙以多取封於秦趙王疑之使趙葱及顔聚代將斬李牧廢司馬商後三月翦因急擊趙大破殺趙葱虜趙王遷及其將顔聚也張預曰因其失意之官或刑戮之子弟凡有隙者厚利使之晋任析公吴納子胥皆近之反間者因其敵間而用之李筌曰敵有間來窺我得失我厚賂之而令反為我間也杜牧曰敵有間來窺我我必先知之或厚賂誘之反為我用或佯為不覺示以偽情而縱之則敵人之間反為我用也陳平初為漢王護軍尉項羽圍於榮陽城漢王患之請割榮陽以西和項王弗聽平曰顧楚有可亂者彼項王骨鯁之臣亞父鍾離昩龍且周殷之屬不過數人耳大王能出捐數萬斤金行反間間其君臣以疑其心項王為人意忌信讒必内相誅漢因舉兵而攻之破楚必矣漢王以為然乃出黄金四萬斤與平恣所為不問出入平既多以金縱反間於楚軍宣言諸將鍾離昩等為項王將功多矣然終不得列地而王欲與漢為一以滅項氏分王其地項王果疑之使使至漢漢為太牢之具舉進見楚使即陽驚曰吾以為亞父使乃項王使也復持去以惡草具進楚使使歸具以報項王果大疑亞父亞父欲急擊下榮陽城項王不信不肯聽亞父亞父聞項王疑之乃大怒疽發而死卒用陳平之計滅楚也梅堯臣曰或以僞事紿之或以厚利啗之王皙曰反間反為我間也或留之使言其情又或示以詭形而遣之何氏曰如燕昭王以樂毅為將破齊七十餘城及惠王立與樂毅有隙齊將田單乃縱反間於燕宣言曰齊王已死城之不拔者二耳樂毅畏誅而不敢歸以伐齊為名實欲連兵南面而王齊齊人未附故且緩即墨以待其事齊人所懼唯恐他將之來即墨殘矣燕王以為然使騎劫伐樂毅燕人士卒離心單又縱反間曰吾懼燕人掘吾城外冢墓戮辱先人燕軍從之即墨人激怒請戰大破燕師所亡七十餘城悉復之又秦師圍趙閼與趙將趙奢救之去趙國都三十里不進秦間來奢善食遣之間以報秦將以為奢師怯弱而止不行奢墮而卷甲趨秦師擊破之又范睢為秦昭王相使左庶長王齕攻韓取上黨上黨民走趙趙軍長平齕因攻趙趙使廉頗將廉頗堅壁以待秦秦數挑戰趙兵不出趙王數以為讓而睢使人行千金於趙為反間曰秦之所惡獨畏趙括耳廉頗軍易與且降矣趙王既怒廉頗軍多亡失數敗又反堅壁不戰又聞秦反間之言因使括代頗秦聞括將以白起為上將軍射殺括及坑降卒四十萬張預曰敵有間來或重賂厚禮以結之告以偽辭或佯為不知踈而慢之示以虚事使之歸報則反為我利也趙奢善食秦間漢軍佯驚楚使是也死間者爲誑事於外令吾間知之而傳於敵李筌曰情詐為不足信吾知之今吾動此間而待之此筌以待字為非傳也杜牧曰誑者詐也言吾間在敵未知事情我則詐立事跡令吾間憑其詐迹以輸誠於敵而得敵信也若吾進取與詐跡不同間者不能脫則為敵所殺故曰死間也漢王使酈生說齊下之齊罷守備韓信因而襲之田横怒烹酈生此事相近杜佑曰作誑詐之事於外佯漏泄之使吾間知之吾間至敵中為敵所得必以誑事諭敵敵從而備之吾所行不然間則死矣又云敵間來聞我誑事以持歸然皆非所圖也二間皆不能知幽隱深密故曰死間也蕭世誠曰所獲敵人及已叛亡軍士有重罪繫者故為貸免相勑勿泄佯不祕密令敵間竊聞之吾因縱之使亡亡必歸敵必信焉往必死故曰死間梅堯臣曰以誑告敵事乖必殺王皙曰詐而聞使敵得之間以吾詐告敵事决必殺之也何氏曰如戰國鄭武公欲伐胡先以其子妻胡因問羣臣曰吾欲用兵誰可伐者大夫關思期曰胡可武公怒而戮之曰胡兄弟之國子言伐之何也胡君聞之以鄭為親已不備鄭襲而取之此用死間之勢也又班超發于闐諸國兵擊莎車龜兹二國揚言兵少不敵罷散乃陰緩生口歸以告龜兹王喜而不虞超即潜勒兵馳赴莎車大破降之斯亦同死間之勢又李靖伐突厥頡利可汗以唐儉先在突厥結和親突厥不備靖因掩擊破之張預曰欲使敵人殺其賢能乃令死士持虚僞以赴之吾間至敵為彼所得彼以誑事為實必俱殺之我朝曹太尉嘗貸人死使偽為僧吞蠟彈入西夏至則為其所囚僧以彈告即下之開讀乃所遺彼謀臣書也戎主怒誅其臣并殺間僧此其義也然死間之事非一或使吾間詣敵約和我反伐之則間者立死酈生烹於齊王唐儉殺於突厥是也生間者反報也李筌曰往來之使杜牧曰往來相通報也生間者必取内明外愚形劣心壯趫揵勁勇閑於鄙事能忍飢寒垢耻者為之賈林曰身則公行心乃私覘往反報復常無所害故曰生間杜佑曰擇己有賢材智謀能自開通於敵之親貴察其動静知其事計所為已知其實還以報我故曰生間梅堯臣曰使智辨者徃覘其情而以歸報也何氏曰如華元登子反之牀而歸又如隋達奚武為東秦刺史時齊神武趣沙苑太祖遣武覘之武從三騎皆衣敵人衣服至日暮去營數百步下馬潜聽得其軍號因上馬歷營若警夜者有不如法者往往撻之具知敵之情狀以告太祖太祖深嘉焉遂破之張預曰選智能之士往視敵情歸以報我若婁敬知匈奴之强以告高祖之類然生間之事亦衆或己欲退告敵以戰或己欲戰告敵以退若秦行人夜戒晋師曰來日請相見臾駢曰使者目動而言肆懼我也秦果夜遁又吕延攻乞伏乾歸大敗之乾歸乃遣間稱東奔成紀延信而追之耿稚曰告者視高而色動必有姦計延不從遂為所敗是也故三軍之事莫親於間杜牧曰受辭指蹤在於卧内杜佑曰若不親撫重以禄賞則反為敵用洩我情實梅堯臣曰入幄受詞最為親近王皙曰以腹心親結之張預曰三軍之士然皆親撫獨於間者以腹心相委是最為親密也賞莫厚於間杜佑曰以重賞賞之而賴其用梅堯臣曰爵禄金帛我無愛焉王皙曰軍功之賞莫厚於此張預曰非高爵厚利不能使間陳平曰願出黄金四十萬斤間楚君臣事莫密於間杜牧曰出口入耳也密一作審杜佑曰間事不密則為已害梅堯臣曰幾事不密則害成王皙曰獨將與謀張預曰惟將與間得聞其事非密與非聖智不能用間杜牧曰先量間者之性誠實多智然後可用之厚貌深情險於山川非聖人莫能知梅堯臣曰知其情僞辨其邪正則能用王皙曰聖通而先識智明於事張預曰聖則事無不通智則洞照幾先然後能為間事或曰聖智則能知人非仁義不能使間陳皥曰仁者有恩以及人義者得宜而制事主將者既能仁結而義使則間者盡心而覘察樂為我用也孟氏曰太公曰仁義者則賢者歸之賢者歸之則其間可用也梅堯臣曰撫之以仁示之以義則能使王皙曰仁結其心義激其節仁義使人有何不可張預曰仁則不愛爵賞義則果決無疑既啗以厚利又待以至誠則間者竭力非微妙不能得間之實杜牧曰間亦有利於財寶不得敵之實情但將虚辭以赴我約此須用心淵妙乃能酌其情僞虚實也杜佑曰用意密而不漏梅堯臣曰防間反為敵所使思慮故宜幾微臻妙王皙曰謂間者必性識微妙乃能得所間之事實張預曰間以利害來告須用心淵微精妙乃能察其真僞微哉微哉無所不用間也杜牧曰言每事皆須先知也梅堯臣曰微之又微則何所不知王皙曰丁寜之當事事知敵之情也張預曰密之又密則事無巨細皆先知也間事未發而先聞者間與所告者皆死杜牧曰告者非誘間者則不得知間者之情殺之可也陳皥曰間者未發其事有人來告其聞者所告者亦與間者俱殺以滅口無令敵人知之梅堯臣曰殺間者惡其泄殺告者滅其言何氏曰兵謀大事泄者當誅告人亦殺恐傳諸衆張預曰間敵之事謀定而未發忽有聞者來告必與間俱殺之一惡其泄一滅其口秦已間趙不用廉頗秦乃以白起為將令軍中曰有泄武安君將者斬此是已發其事尚不欲泄況未發乎凡軍之所欲擊城之所欲攻人之所欲殺必先知其守將左右謁者門者舍人之姓名令吾間必索知之李筌曰知其姓名則易取也杜牧曰凡欲攻戰先須知敵所用之人賢愚巧拙則量材以應之漢王遣韓信曹參灌嬰擊魏豹問曰魏大將誰也對曰柏直漢王曰是口尚乳臭不能當韓信騎將誰也曰馮敬曰是秦將馬無擇子也雖賢不能當灌嬰步卒將誰也曰項它曰是不能當曹參吾無患矣陳皥曰此言敵人左右姓名必須我先知之或敵使間來我當使間去若不知其左右姓名則不能成間者之説漢高伐秦至曉關張良曰吾聞其將賈堅爾可以利啗之又曰其將雖曰欲和其軍士未肯不如因其懈擊之乃進兵擊破之又宋華元夜登子反之床以告宋病若非素知門人舍人左右姓名先使間導之又何由得登其床也杜佑曰守謂官守職任者謁告也主告事者也門者守門者也舍人守舍之人也必先知之為親舊有急則呼之則不可不知亦因此知敵之情梅堯臣曰凡敵之左右前後之姓名皆須審省而令吾間先知則吾間可行矣王皙曰不可臨事求也張預曰守將守官任職之將也謁者典賓客之官也門者閽吏也舍人守舍之人也凡欲擊其軍欲攻其城欲殺其人必先知此左右之姓名則可也欲潜入其軍則呼其姓名而往若華元夜登子反之床以告宋病杜元凱註引此文謂元用此術得以自通是也又漢高祖入韓信卧内取其印亦近之必索敵人之間來間我者因而利之導而舍之杜佑曰舍居止也令吾人遺以重利復遇而舍之則可令詭其辭故反間可得而用也曹操曰舍居止也杜牧曰敵間之來必誘以厚利而止舍之使為我反間也杜佑曰故能取敵之間而用之梅堯臣曰必探索知敵之來間者因而利誘之引而舍止之然後可為我反間也王皙曰此留敵間以詢其情者也必謹舍之曲為辯說深致情愛然後啗以大利威以大刑自非至忠於其君王者皆為我用矣張預曰索求也求敵間之來窺我者因以厚利誘導而館舍之使反為我間也言舍之者謂稽留其使也淹延既久論事必多我因得察敵之情下文言四間皆因反間而知非久留其人極論其事則何以悉知因是而知之故鄉間内間可得而使也杜牧曰若敵間以利導之尚可使為我反間因此乃知厚利亦可使鄉間内間也此言使間非利不可故上文云相守數年争一日之勝而愛爵禄百金不知敵情者不仁之至也下文皆同其義也陳皥曰此說踈也言敵使間來以利啗之誘令止舍因得敵之情因間内間可使反間誘而使之杜佑曰因反敵間而知敵情鄉間者皆可得使梅堯臣曰其國人之可使者其官人之可用者皆因反間而知之張預曰因是反間知彼鄉人之貪利者官人之有隙者誘而使之因是而知之故死間爲誑事可使告敵張預曰因是反間知彼可誑之事使死間往告之因是而知之故生間可使如期杜牧曰可使往來如期陳皥曰言五間皆循環相因惟生間可使如期杜佑曰因誑事而知敵情生間往返可使知其敵之腹心所在梅堯臣曰令吾間以誑告敵者須因反間而知敵之可誑也生間以利害覘敵情須因反間而知其疏密則可往得實而歸如期也張預曰因是反間知彼之情故生間可往復如期也五間之事主必知之李筌曰孫子殷勤於五間主切知之知之必在於反間故反間不可不厚也杜牧曰鄉間内間死間生間四間者皆因反間知敵情而能用之故反間最切不可不厚也杜佑曰人主當知五間之用厚其禄豐其財而反間者又五間之本事之要也故當在厚待梅堯臣曰五間之始皆因緣於反間故當厚遇之張預曰人主當用五間以知敵情然五間皆因反間而用則是反間者豈可不厚待之耶昔殷之興也伊摯在夏曹操曰伊摯伊尹也周之興也吕牙在殷曹操曰吕牙大公也梅堯臣曰伊尹吕牙非叛於國也夏不能任而殷任之殷不能用而周用之其成大功者為民也何氏曰伊吕聖人之耦豈為人間哉今孫子引之者言五間之用須上智之人如伊吕之才智者可以用間蓋重之之辭耳張預曰伊尹夏臣也後歸于殷吕望殷臣也後歸于周伊吕相湯武以兵定天下者順乎天而應乎人也非同伯州犁之奔楚苗賁皇之適晋狐庸之在吴士會之居秦也故惟明君賢將能以上智爲間者必成大功此兵之要三軍之所恃而動也李筌曰孫子論兵始于計而終於間者蓋不以攻為主為將者可不慎之哉杜牧曰不知敵情軍不可動知敵之情非間不可故曰三軍所恃而動李靖曰夫戰之取勝此豈求於天地在乎因人以成之歷觀古人之用間其妙非一即有間其君者有間其親者有間其賢者有間其能者有間其助者有間其鄰好者有間其左右者有間其縱横者故子貢史廖陳軫蘇秦張儀范睢等皆憑此而成功也且間之道有五焉有因其邑人使潜伺察而致辭焉有因其仕子故洩虚假令告示焉有因敵之使矯其事而返之焉有審擇賢能使覘彼向背虚實而歸說之焉有佯緩罪戾微漏我偽情浮計使亡報之焉凡此五間皆須隱祕重之以賞密之又密始可行焉若敵有寵嬖任以腹心者我當使間遺其珍玩恣其所欲順而旁誘之敵有重臣失勢不滿其志者我則啗以厚利詭相親附採其情實而致之敵有親貴左右多辭誇誕好論利害者我則使間曲情尊奉厚遭珍寳揣其所間而反間之敵若使聘於我我則稽留其使今人與之共處矯致慇懃僞相親暱朝夕慰諭倍供珍味觀其辭色而察之仍朝夕令使獨與已伴居我遣聦耳者潜於複壁中聽之使既遲違恐彼怪責必是竊論心事我知事計遣使用之且夫用間間人人亦用間以間已已以密往人以密來理須獨察於心參會於事則不失矣若敵人來欲候我虚實察我動静覘知事計而行其間者我當佯為不覺舍止而善飯之微以我偽言誑事示以前却期會則我之所須為彼之所失者因其有間而反間之彼若將我虚以為實我即乘之而得志矣夫水所以能濟舟亦有因水而覆没者間所以能成功亦有憑間而傾敗者若束髮事主當朝正色忠以盡節信以竭誠不詭伏以自容不權宜以為利雖有善間其可用乎陳皥曰晋伯州犁奔楚楚苗賁皇奔晋及晋楚合戰於鄢陵苗賁皇在晋侯之側伯州犁侍于楚王二人各言舊國長短之情然則晋所以勝楚者楚所以敗者其故何也二子則有優劣也是知用間之道間敵之情得不慎擇其人深究其説也故上文云非聖智莫能用間者夫聖智知人人即附之賢者受知則戮力為效非聖非智必猜必忌公道不啓仁義不施則義士賢人因而銜憤此將上天不祐幽有鬼神設無人事之變恐有陰誅之禍豈上智之士為其用哉故上文云非仁義莫能使間然則湯武之聖伊吕宜用伊吕獲用事宜必濟聖賢一會交泰時乘道合乾坤功格寰宇當其耕夫於畎畆釣叟於渭濱知我者誰能無念也賈林曰軍無五間如人之無耳目也王皙曰未知敵情者不可動也張預曰用師之本在知敵情故曰此兵之要也未知敵情則軍不可舉故曰三軍所恃而動也然處十三篇之末者蓋用非兵之常也若計戰攻形勢虚實之類兵動則用之至於火攻與間則有時而為耳孫子註解卷之十三
