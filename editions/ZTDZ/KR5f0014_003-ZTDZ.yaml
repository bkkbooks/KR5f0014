body:
  text: 謀攻篇曹操曰欲攻敵必先謀李筌曰合陳爲戰圍城曰攻以此篇次戰之下杜牧曰廟堂之上計算已定戰争之具糧食之費悉已用備可以謀攻故曰謀攻也王皙曰謀攻敵之利害當全策以取之不銳於伐兵攻城也張預曰計議已定戰具己集然後可以智謀攻故次作戰孫子曰凡用兵之法全國爲上破國次之曹操曰興師深入長驅距其城郭絶其内外敵舉國來服為上以兵擊破敗而得之其次也李筌曰不貴殺也韓信虜魏王豹擒夏說斬成安君此為破國者及用廣武君計北首燕路遣一介之使奉咫尺之書燕後風而靡則全國也賈林曰全得其國我國亦全乃為上杜佑曰敵國來服為上以擊破為次王皙曰若韓信舉燕是也何氏曰以方略氣勢令敵人以國降上策也張預曰尉繚子曰講武料敵使敵氣失而師散雖形全而不為之用此道勝也破軍殺將乘堙發機會衆奪地此力勝也然則所謂道勝力勝者即全國破國之謂也夫吊民伐罪全勝為上為不得已而至於破則其次也全軍爲上破軍次之曹操杜牧曰司馬法曰一萬五千五百人為軍何氏曰降其城邑不破我軍也全旅爲上破旅次之曹操曰五百人為旅全卒爲上破卒次之曹操曰一校已上至一百人也李筌曰百人已上為卒杜佑曰一校下至百人也全伍爲上破伍次之曹操曰百人已下至五人李筌曰百人已下為伍杜牧曰五人為伍梅堯臣曰謀之大者全得之王皙曰國軍卒伍不間小大全之則威德為優破之則威德為劣何氏曰自軍至伍皆次序上下言之此意以策略取之為妙不惟一軍至於一伍不可不全張預曰周制萬二千五百人為軍五百人為旅百人為卒五人為伍自軍至伍皆以不戰而勝之為上是故百戰百勝非善之善者也曹操曰未戰而戰自屈勝善也李筌曰以計勝敵也陳皥曰戰必殺人故也賈林曰兵威遠振全來降伏斯為上也詭詐為謀摧破敵衆殘人傷物然後得之又其次之杜佑曰未戰而敵自屈服梅堯臣曰惡乎殺傷殘害也張預曰戰而不後能勝必多殺傷故云非善不戰而屈人之兵善之善者也曹操曰未戰而敵自屈服杜牧曰以計勝敵陳皥曰韓信用李左車之計馳咫尺之書不戰而下燕城也孟氏曰重廟勝也王皙曰兵貴伐謀不務戰也何氏曰後漢王霸討周建蘇茂既戰歸營賊復聚挑戰霸堅卧不出方饗士作倡樂茂雨射營中中霸前酒樽霸安坐不動軍吏曰茂已破今易擊霸曰不然茂客兵遠來糧食不足故挑戰以徼一時之勝今閉營休士所謂不戰而屈人兵善之善也茂乃引退張預曰明賞罰信號令完器械練士卒暴其所長使敵從風而靡則為大善若吴王黄池之會晋人畏其有法而服之者是也故上兵伐謀曹操曰敵始有謀伐之易也李筌曰伐其始謀也後漢㓂恂圍高峻峻遣謀臣皇甫文謁恂詞禮不屈恂斬之報峻曰軍師無禮已斬之欲降急降不欲固守峻即日開壁而降諸將曰敢問殺其使而降其城何也恂曰皇甫文峻之心腹其取謀者留之則文得其計殺之則峻亡其膽所謂上兵伐謀諸將曰非所知也杜牧曰晋平公欲攻齊使范昭往觀之景公觴之酒酣范昭請君之樽酌公曰寡人之樽進客范昭已飲晏子徹樽更為酌范昭佯醉不悅而起舞謂太師曰能為我奏成周之樂乎吾為舞之太師曰瞑臣不習范昭趨出景公曰晋大國也來觀吾政今子怒大國之使者將奈何晏子曰觀范昭非陋於禮者且欲慙於國臣故不從也太師曰夫成周之樂天子之樂也惟人主舞之今范昭人臣而欲舞天子樂臣故不為也范昭歸報晋平公曰齊未可伐臣欲辱其君晏子知之臣欲犯其禮太師識之仲尼曰不越樽俎之間而折衝千里之外晏子之謂也春秋時秦伐晋晋將趙盾禦之上軍佐臾駢曰秦不能久請深壘固軍以待之秦人欲戰秦伯謂士會曰若何而戰對曰趙氏新出其屬曰臾駢必實為此謀將以老我師也趙有側室曰穿晋君之壻也有寵而弱不在軍事好勇而狂且惡臾駢之佐上軍若使輕者肆焉其可秦軍掩晋上軍趙穿追之不及返怒曰裹糧坐甲固敵是求敵至不擊將何俟焉軍吏曰將有待也穿曰我不知謀將獨出乃以其屬出趙盾曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏而退夫晏子之對是敵人將謀伐我我先伐其謀故敵人不得而伐我士會之對是我將謀伐敵敵人有謀拒我乃伐其謀敵人不得與我戰斯二者皆伐謀也故敵欲謀我伐其未形之謀我若伐敵敗其已成之計固非止於一也孟氏曰九攻九拒是其謀也杜佑曰敵方設謀欲舉衆師伐而抑之是其上故太公云善除患者理於未生善勝敵者勝於無形也梅堯臣曰以智勝王皙曰以智謀屈人最為上何氏曰敵始謀攻我我先攻之易也揣知敵人謀之趣向因而加兵攻其彼心之發也張預曰敵始發謀我從而攻之彼必喪計而屈服若晏子之沮范昭是也或曰伐謀者用謀以伐人也言以奇策祕筭取勝於不戰兵之上也其次伐交曹操曰交將合也李筌曰伐其始交也蘇秦約六國不事秦而秦閉關十五年不敢窺山東也杜牧曰非止將合而已合之者皆可伐也張儀願獻秦地六百里於楚懷王請絶齊交隨何於黥布坐上殺楚使者以絶項羽曹公與韓遂交馬語以疑馬超高洋以簫深明請和於梁以疑侯景終䧟臺城此皆伐交權道變化非一途也陳皥曰或云敵已興師交合伐而勝之是其次也若晋文公敵宋携離曹衛也孟氏曰交合强國敵不敢謀梅堯臣曰以威勝王皙曰謂未能全屈敵謀當且間其交使之解散彼交則事鉅敵堅彼不交則事小敵脆也何氏曰杜稱已上四事乃親而離之之義也伐交者兵欲交合設疑兵以懼之使進退不得因來屈服旁隣既為我援敵不得不孤弱也張預曰兵將交戰將合則伐之傳曰先人有奪人之心謂兩軍將合則先薄之孫叔敖之敗晋師厨人濮之破華氏是也或曰伐交者用交以伐人也言欲舉兵伐敵先結隣國為掎角之勢則我彊而敵弱其次伐兵曹操曰兵形已成也李筌曰臨敵對陳兵之下也賈林曰善於攻取舉無遺策又其次也故太公曰争勝於白刃之前者非良將也梅堯臣曰以戰勝王皙曰戰者危事張預曰不能敗其始謀破其將合則犀利兵器以勝之兵者器械之總名也太公曰必勝之道器械為寳其下攻城曹操曰敵國已收其外糧城守攻之為下攻也李筌曰夫王師出境敵則開壁送款舉櫬轅門百姓怡悅攻之上也若頓兵堅城之下師老卒惰攻守勢殊客主力倍以此攻之為下也杜佑曰言攻城屠邑攻之下者所害者多梅堯臣曰費財役為最下王皙曰士卒殺傷城或未克張預曰夫攻城屠邑不惟老師費財兼亦所害者多是為攻之下也攻城之法爲不得已張預曰攻城則力屈所以必攻者蓋不獲已耳修櫓轒輼具器械三月而後成距闉又三月而後已曹操曰修治也櫓大楯也轒輼者轒牀也轒牀其下四輪從中推之至城下也貝備也器械者機關攻守之總名飛樓雲梯之屬距闉者踴土積高而前以附其城也李筌曰櫓楯也以蒙首而趋城下轒輼者四輪車也其下藏兵數十人填隍推之直就其城木石所不能壞也器械飛樓雲梯板屋木幔之類也距闉者土木山乘城也東魏高歡之圍晋州侯景之攻臺城則其器也役約三月𢙢兵久而人疲也杜牧曰櫓即今之所謂彭排轒輼四輪車排大木為之上蒙以生牛皮下可容十人徃來運土填塹木石所不能傷今俗所謂木驢是也距闉者積土為之即今之所謂壘道也三月者一時也言修治器械更其距闉皆須經時精好成就恐傷人之甚也管子曰不能致器者困言無以應敵也太公曰必勝之道器械為寳漢書志曰兵之伎巧一十有三家習手足便器械機關以立攻守之勝者夫攻城者有撞車剗鈎車飛梯蝦蟇木解合車狐鹿車影車高障車馬頭車獨行車運土豚魚車陳皥曰杜稱櫓為彭排非也若是彭排即當用此樐字曹云大楯庶或近之蓋言候器械全具須三月距闉又三月已計六月將若不待此而生忿速必多殺士卒故下云將不勝其忿而蟻附之灾也杜佑曰轒韞上汾下温距闉者踊土積高而前以附於城也積土為山曰堙以距敵城觀其虚實春秋傳曰楚司馬子反乘堙而闚宋城也梅堯臣曰威智不足以屈人不獲已而攻城也治攻具須經時也曹公曰櫓大楯也轒韞者轒牀也其下四輪從中推至城下也器械機關攻守之總名蜚梯之屬也謂櫓為大楯非也兵之具甚衆何獨言修大楯耶今城上守禦樓曰櫓櫓是轒牀上革屋以蔽矢石者歟張預曰脩櫓大楯也傳曰晋侯登巢車以望楚軍註云巢車車上為櫓又晋師圍偪陽魯人建大車之輪蒙之以甲以為櫓左執之右拔㦸以成一隊註云櫓大楯也以此觀之修櫓為大楯明矣轒輼四輪車其下可覆數十人運土以實隍者器械攻城總名也三月者約經時成也或曰孫子戒心忿而亟攻之故權言以三月成器械三月起距堙其實不必三月也城尚不能下則又積土與城齊使士卒上之或觀其虚實或毁其樓櫓欲必取也土山曰堙楚子反乘堙而闚宋城是也器械言成者取其久而成就也距堙言已者以其經時而畢上也皆不得已之謂將不勝其忿而蟻附之殺士三分之一而城不拔者此攻之灾也曹操曰將忿不待攻城器而使士卒緣城而上如蟻之緣墻殺傷士卒也李筌曰將怒而不待攻城而使士卒肉薄登城如蟻之所附墻為木石所殺之者三有一焉而城不拔者此攻城灾也杜牧曰此言為敵所辱不勝忿怒也後魏太武帝率十萬衆㓂宋臧質于盱眙太武帝始就質求酒質封溲便與之太武大怒速攻城乃命肉薄登城分番相代墜而復昇莫有退者屍與城平復殺其高梁王如此三旬死者過半太武聞彭城斷其歸路見疾病甚衆乃解退傳曰一女乘城可敵十夫以此校之尚恐不啻賈林曰但使人心外附士卒内離城乃自拔杜佑曰守過二時敵人不服將不勝心之忿多使士卒蟻附其城殺傷我士民三分之一也言攻趣不拔還為已害故韓非曰夫一戰不勝則過暨矣何氏曰將心忿急使士卒如蟻緣而登死者過半城且不下斯害也已張預曰攻逾二時敵猶不服將心忿躁不能持久使戰士蟻緣而登城則其士卒為敵人所殺三中之一而堅城終不可拔兹攻城之害也已或曰將心忿速不俟六月之久而亟攻之則其害如此故善用兵者屈人之兵而非戰也李筌曰以計屈敵非戰之屈者晋將郭淮圍麴城蜀將姜維來救淮趨牛頭山斷維糧道及歸路維大震不戰而遁麴城遂降則不戰而屈之義也杜牧曰周亞夫敵七國引兵東北壁昌邑以梁委吴使輕兵絶吴餉道吴梁相弊而食竭吴遁去因追擊大破之蜀將姜維使將勾安李韶守麴城魏將陳泰圍之姜維來救出自牛頭山與泰相對泰曰兵法貴在不戰而屈人今絶牛頭維無返道則我之擒也諸軍各守勿戰絶其還路維懼遁走安等遂降梅堯臣曰戰則傷人王皙曰若李左車說成安君請以奇兵三萬人扼韓信於井陘之策是也何氏曰言伐謀伐交不至於戰故司馬法曰上謀不鬭其旨見矣張預曰前所陳者庸將之為耳善用兵者則不然或破其計或敗其交或絶其糧或斷其路則不可戰而服之若田穰苴明法令拊士卒燕晋聞之不戰而遁亦是也拔人之城而非攻也李筌曰以計取之後漢鄼侯臧宫圍妖賊於原武連月不拔士卒疾癘東海王謂宫曰今擁兵圍必死之虜非計也宜撤圍開其生路而示之彼必逃散一亭長足擒也從之而拔原武魏攻壼關亦其義也杜牧曰司馬文王圍諸葛誕於壽春議者多欲急攻之文王以誕城固衆多攻之力屈若有外救表裏受敵此至危之道也吾當以全策縻之可坐制也誕二年五月反三年二月破滅六軍按甲深溝高壘而誕自困十六國前燕將慕容恪率兵討段龕於廣固恪圍之諸將勸恪急攻之恪曰軍勢有緩而克敵有急而取之若彼我勢既均外有强援力足制之當羈縻守之以待其斃乃築室反耕嚴固圍壘終克廣固曾不血刃也孟氏曰言以威刑服敵不攻而取若鄭伯肉袒以迎楚莊王之類梅堯臣曰攻則傷財王皙曰若唐太宗降薛仁杲是也張預曰或攻其所必救使敵棄城而來援則設伏取之若耿弇攻臨淄而克西安脇巨里而斬費邑是也或外絶其强援以久持之坐俟其斃若楚師築室反耕以服宋是也兹皆不攻而拔城之義也毁人之國而非久也曹操曰毁滅人國不久露師也李筌曰以術毁人國不久而斃隋文問僕射高熲伐陳之策熲曰江外田收與中國不同伺彼農時我正暇豫徵兵掩襲彼釋農守禦候其聚兵我便解退再三若此彼農事疲矣又南方地卑舍悉茅竹倉庫儲積悉依其間密使行人因風縱火候其營立更為之行其謀陳始病也杜牧曰因敵有可乘之勢不失其機如摧枯朽沛公入關晋降孫皓隋取陳氏皆不久之賈林曰兵不可久久則生變但毁滅其國不傷殘於人若武王伐殷殷人稱為父母杜佑曰若誅理暴逆毁滅敵國不暴師衆也梅堯臣曰久則生變王皙同梅堯臣註何氏曰善攻者不以兵攻以計困之令其自拔令其自毁非勞久守而取之也張預曰以順討逆以智伐愚師不久暴而敵國滅何假六月之稽乎必以全争於天下故兵不頓而利可全此謀攻之法也曹操曰不與敵戰而必完全得之立勝於天下不頓兵血刃也李筌曰以全勝之計争天下是以不頓收利也梅堯臣曰全争者兵不戰城不攻毁不久皆以謀而屈敵是曰謀攻故不鈍兵利自完張預曰不戰則士不傷不攻則力不屈不久則財不費以完全立勝於天下故無頓兵血刃之害而有國富兵强之利斯良將計攻之術也故用兵之法十則圍之曹操曰以十敵一則圍之是將智勇等而兵利鈍均也若主弱客强操所以倍兵圍下邳生擒吕布也杜牧曰圍者謂四面壘合使敵不得逃逸凡圍四合必須去敵城稍速占地既廣守備須嚴若非兵多則有闕漏故用兵有十倍也吕布敗是上下相疑侯成執陳宫委布降所以能擒非曹公兵力而能取之若上下相疑政令不一設使不圍自當潰叛何況圍之固須破滅孫子所言十則圍之是將勇智等而兵利鈍均不言敵人自有離叛曹公稱倍兵降布蓋非圍之力窮也此不可以訓也李筌曰愚智勇怯等十倍於敵則圍之攻守殊勢也杜佑曰以十敵一則圍之是為將智勇等而兵利鈍均也若主弱客勁不用十也曹公操所以倍兵圍下邳生擒吕布若敵壘固守依附險阻彼一我十乃可圍也敵雖盛所據不便未必十倍然後圍之梅堯臣曰彼一我十可以圍何氏曰圍者四面合兵以圍城而校量彼我兵勢將才愚智勇怯等而我十倍勝於敵人是以十對一可以圍之無令越逸也張預曰吾之衆十倍於敵則四面圍合以取之是為將智勇等而兵利鈍均也若主弱客强不必十倍然後圍之尉繚子曰守法一而當十十而當百百而當千千而當萬言守者十人而當圍者百人與此法同五則攻之曹操曰以五敵一則三術為正一術為奇李筌曰五則攻之攻守勢殊也杜牧曰術猶道也言以五敵一則當取已三分為三道以攻敵之一面留已之二候其無備之處出奇而乘之西魏末梁州刺史宇文仲和據州不受伐魏將獨孤信率兵討之仲和嬰城固守信夜令諸將以衝梯攻其東北信親帥將士襲其西南遂克之也陳皥曰兵說五倍於敵自是我有餘力彼之勢分也豈止分為三道以攻敵此獨說攻城故下文云小敵之堅大敵之擒也杜佑曰若敵并兵自守不與我戰彼一我五乃可攻戰也或無敵人内外之應未必五倍然後攻梅堯臣同杜佑註王皙曰謂十圍而取五則攻者皆勢力有餘不待其虚懈也此以下亦謂智勇利鈍均耳何氏曰愚智勇恃等量我五倍多於敵人可以三分攻城二分出奇以取勝張預曰吾之衆五倍於敵則當驚前掩後聲東擊西無五倍之衆則不能為此計曹公謂三術為正二術為奇不其然乎若敵無外援我有内應則不須五倍然後攻之倍則分之曹操曰以二敵一則一術為正一術為奇李筌曰夫兵者倍於敵則分半為奇我衆彼寡動而難制符堅至淝水不分而敗王僧辯至張公洲分而勝也杜牧曰此言非也此言以二敵一則當取已之一或趣敵之要害或攻敵之必救使敵一分之中復須分減相救因以一分而擊之夫戰法非論衆寡每陳皆有奇正非待人衆然後能設奇項羽於烏江二十八騎尚不聚之猶設奇正循環相救況於其他哉陳皥曰直言我倍於敵分兵趨其所必救即我倍中更倍以擊敵之中分也杜雖得之未盡其說也杜佑曰已二敵一則一術為正一術為奇彼一我二不足為變故疑兵分離其軍也故太公曰不能分移不可以語奇梅堯臣曰彼一我二可分其勢王皙曰謂分者分為二軍使其腹背受敵則我得一倍之利也何氏曰兵倍於敵則分半為奇我衆彼寡足可分兵主客力均善戰者勝也張預曰吾之衆一倍於敵則當分為二部一以當其前一以衝其後彼應前則後擊之應後則前擊之兹所謂一術為正一術為奇也杜氏不曉兵分則為奇聚則為正而遽非曹公何誤也敵則能戰之曹操曰已與敵人衆等善者猶當設伏奇以勝之李筌曰主客力敵惟善者戰杜牧曰此說非也凡已與敵人兵衆多少智勇利鈍一旦相敵則可以戰夫伏兵之設或在敵前或在敵後或因深林叢薄或因暮夜昏晦或因隘阨山阪擊敵不備自名伏兵非奇兵也陳皥曰料己與敵人衆寡相等先為奇兵可勝之計則戰之故下文云不若則能避之杜說奇伏得之也梅堯臣曰勢力均則戰王皙曰謂能者能感士卒心得其死戰耳若設奇伏以取勝是謂智優不在兵敵也何氏曰敵言等敵也唯能者可以戰勝耳張預曰彼我相敵則以正為奇以奇為正變化紛紜使敵莫測以與之戰兹所謂設奇伏以勝之也杜氏不曉凡置陳皆有揚奇備伏而云伏兵當在山林非也少則能逃之曹操曰高壁堅壘勿與戰也李筌曰量力不如則堅壁不出挫其鋒待其氣懈而出奇擊之齊將田單守即墨燒牛尾即殺騎刼則其義也杜牧曰兵不敵且避其鋒尚俟隙便奮決求勝言能者謂能忍忿受恥敵人求挑不出也不似曹咎汜水之戰也陳皥曰此說非也但敵人兵倍於我則宜避之以驕其志用為後圖非謂忍忿受恥太宗辱宋老生以虜其衆豈是兵力不等也賈林曰彼衆我寡逃匿兵形不令敵知當設奇伏以待之設詐以疑之亦取勝之道又一云逃匿兵形敵不知所備懼其變詐全軍亦逃杜佑曰高壁壘勿與戰也彼之衆我之寡不可敵則當自逃守匿其形梅堯臣曰彼衆我寡女而勿戰王皙曰逃伏也謂能倚固逃伏以自守也傳曰師逃于夫人之宫或兵少而有以勝者蓋將優卒强耳何氏曰兵少固壁觀變潜形見可則進張預曰彼衆我寡宜逃去之勿與戰是亦為將智勇等而兵利鈍均也若我治彼亂我奮彼怠則敵雖衆亦可以合戰若吴起以五百乘破秦五十萬衆謝玄以八千卒敗符堅一百萬豈須逃之乎不若則能避之曹操曰引兵避之也杜牧曰言不若者勢力交援俱不如也則須速去之不可遷延也如敵人守我要害發我津梁合圍於我則欲去不復得也杜佑曰引兵備之强弱不敵勢不相若則引軍避待利而動梅堯臣曰勢力不如則引而避王皙曰將與兵俱不若遇敵攻必敗也張預曰兵力謀勇皆劣於敵則當引而避之以伺其隙故小敵之堅大敵之擒也曹操曰小不能當大也李筌曰小敵不量力而堅戰者必為大敵所擒也漢都尉李陵以步卒五千之衆對十萬之軍而見殁匈奴也杜牧曰言堅者將性堅忍不能逃不能避故為大者之所擒也孟氏曰小不能當大也言小國不量其力敢與大邦為讎雖權時堅城固守然後必見擒獲春秋傳曰既不能强又不能弱所以敗也梅堯臣曰不逃不避雖堅亦擒王皙註同梅堯臣何氏曰如右將軍蘇建前將軍趙信將兵三千餘人與大將軍衛青分行獨逢單于兵數萬力戰一日漢兵且盡前將軍信胡人降為翕侯匈奴誘之遂將其餘騎可八百餘奔降單于右將軍蘇建遂盡亡其軍獨以身得亡自歸大將軍問其正閎長史安議郎周霸等建為云何霸曰自大將軍出未嘗斬一裨將今建棄軍可斬以明威重閎安曰不然兵法小敵之堅大敵之擒也今建獨以數千當單于數萬力戰一日餘士盡不敢有二心自歸而斬之是示後人無歸意也張預曰小敵不度强弱而堅戰必為大敵之所擒息侯屈於鄭伯李陵降於匈奴是也孟子曰小固不可以敵大弱固不可以敵强寡固不可以敵衆夫將者國之輔也輔周則國必强曹操曰將周密謀不泄也李筌曰輔猶助也將才足則兵必强杜牧曰才周也賈林曰國之强弱必在於將將輔於君而才周其國則强不輔於君内懷其貳則弱擇人授任不可不慎何氏曰周謂才智具也得才智周備之將國乃安强也輔隙則國必弱曹操曰形見於外也李筌曰隙缺也將才不備兵必弱杜牧曰才不周也梅堯臣曰得賢則周備失士則隙缺王皙曰周謂將賢則忠才兼備隙謂有所缺也何氏曰言其才不可不周用事不可不周知也故將在軍必先知五事六行五權之用與夫九變四機之說然後可以内御士衆外料戰形苟昩於兹雖一日不可居三軍之上矣張預曰將謀周密則敵不能窺故其國强微缺則乘釁而入故其國弱太公曰得士者昌失士者亡故君之所以患於軍者三梅堯臣曰患君之所不知孟氏曰已下語是張預曰下三事也不知軍之不可以進而謂之進不知軍之不可以退而謂之退是謂縻軍曹操曰縻御也李筌曰縻絆也不知進退者軍必敗如絆驥足無馳騁也楚將龍且逐韓信而敗是不知其進秦將符融揮軍少却而敗是不知其退杜牧曰猶駕御縻絆使不自由也君國君也患於軍者為軍之患害也夫授𨱆凶門推轂閫外之事將軍裁之如趙充國欲為屯田漢宣必令决戰孫皓臨滅賈充尚請班師此不知進退之謂也賈林曰軍之進退將可臨時制變君命内御患莫大焉故太公曰國不可以從外治軍不可以從中御杜佑曰縻御也靡為反君不知軍之形勢而欲從中御也梅堯臣曰君不知進退之宜而專進退是縻繫其軍六韜所謂軍不可以從中御王皙曰縻繫也去此患則當託以不御之權故必忠才兼備之臣為之將也張預曰軍未可以進而必使之進軍未可以退而必使之退是謂縻絆其軍也故曰進退由内御則功難成不知三軍之事而同三軍之政者則軍士惑矣曹操曰軍容不入國國容不入軍禮不可以治兵也李筌曰任將不以其人也燕將慕容評出軍所在因山泉賣樵水貪鄙積貨為三軍帥不知其政也杜牧曰蓋謂禮度法令自有軍法從事若使同於尋常治國之道則軍士生惑矣至如周亞夫見天子不拜漢文知其勇不可犯魏尚守雲中上首級為有司所劾馮唐所以發憤也杜佑曰夫治國尚禮義兵貴於權詐形勢各異教化不同而君不知其變軍國一政以用治民則軍士疑惑不知所措故兵經曰在國以信在軍以詐也陳皥曰言不知三軍之事違衆沮議左傳稱晋彘季不從軍師之謀而以偏師先進終為楚之所敗也梅堯臣曰不知治軍之務而參其政則衆惑亂也曹公引司馬法曰軍容不入國國容不入軍是也何氏曰軍國異容所治各殊欲以治國之法以治軍旅則軍旅惑亂張預曰仁義可以治國而不可以治軍權變可以治軍而不可以治國理然也虢公不修慈愛而為晋所滅晋侯不守四德而為秦所克是不以仁義治國也齊侯不射君子而敗於晋宋公不擒二毛而衂於楚是不以權變治軍也故當仁義而用權譎則國必危晋虢是也當變詐而尚禮義則兵必敗齊宋是也然則治國之道固不可以治軍也不知三軍之權而同三軍之任則軍士疑矣曹操曰不得其人意也杜牧曰謂將無權智不能銓度軍士各任所長而雷同使之不盡其材則三軍生疑矣黄石公曰善任人者使智使勇使貪使愚智者樂立其功勇者好行其志貪者邀趨其利愚者不顧其死陳皥曰將在軍權不專制任不自由三軍之士自然疑也杜佑曰不得其人也君之任將當精擇焉將若不知權變不可付以勢位苟授非其人則舉措失所軍覆敗也若趙不用廣武君而用成安君梅堯臣曰不知權謀之道而參其任用其衆疑貳也王皙曰政也權也使不知者同之則動有違異必相牽制也是則軍衆疑惑矣裴度所以奏去監軍平蔡州也此皆由君上不能專任賢將則使同之故通謂之三患何氏曰不知用兵權謀之人用之為將則軍不治而士疑張預曰軍吏中有不知兵家權謀之人而使同居將帥之任則政令不一而軍疑矣若邲之戰中軍帥荀林父欲還裨將先縠不從為楚所敗是也近世以中官監軍其患正如此高崇文伐蜀因罷之遂能成功三軍既惑且疑則諸侯之難至矣是謂亂軍引勝曹操曰引奪也李筌曰引奪也兵權道也不可謬而使處趙上卿藺相如言趙括徒能讀其父書然未知合變王今以名使括如膠柱鼓瑟此則不知三軍之權而同三軍之任趙王不從果有長平之敗諸侯之難至也杜牧曰言我軍疑惑自致擾亂如引敵人使勝我也孟氏曰三軍之衆疑其所任惑其所為則鄰國諸侯因其乖錯作難而至也太公曰疑志不可以應敵梅堯臣曰君徒知制其將不能用其人而乃同其政任俾衆疑惑故諸侯之難作是自亂其軍自去其勝王皙曰引諸候勝已也何氏曰士疑惑而無畏則亂故敵國得以乘我隙釁而至矣張預曰軍士疑惑未肯用命則諸侯之兵乘隙而至是自潰其軍自奪其勝也故知勝有五李筌曰謂下五事也張預曰下五事也知可以戰與不可以戰者勝李筌曰料人事逆順然後以太一遁甲筭三門遇奇五將無關格迫愶主客之計者必勝也杜牧曰下文所謂知彼知己是也孟氏曰能料知敵情審其虚實者勝也梅堯臣曰知可不可之宜王皙曰可則進否則止保勝之道也何氏曰審己與敵張預曰可戰則進攻不可戰則退守能審攻守之宜則無不勝識衆寡之用者勝李筌曰量力也杜牧曰先知敵之衆寡然後起兵以應之如王翦伐荆曰非六十萬不可是也杜佑曰言兵之形有衆而不可擊寡或可以弱制强而能變之者勝也故春秋傳曰師克在和不在衆是也梅堯臣曰量力而動王皙曰謂我對敵兵之衆寡圍攻分戰是也張預曰用兵之法有以少而勝衆者有以多而勝寡者在乎度其所用而不失其宜則善如吴子所謂用衆者務易用少者務隘是也上下同欲者勝曹操曰君臣同欲李筌曰觀士卒心上下同欲如報私仇者勝陳皥曰言上下共同其利欲則三軍無怨敵可勝也傳曰以欲從人則可以人從欲鮮濟也杜佑曰言君臣和同勇而戰者勝故孟子曰天時不如地利地利不如人和梅堯臣曰心齊一也王皙曰上下一心若先縠剛復以取敗吕布違異以致亡皆上下不同欲之所致何氏曰書云受有億兆夷人離心離德予有亂臣十人同心同德商滅而周興張預曰百將一心三軍同力人人欲戰則所向無前矣以虞待不虞者勝李筌杜牧曰有備預也孟氏曰虞度也左傳曰不備不虞不可以師待敵之可勝也陳皥曰謂先為不可勝之師待敵之可勝也杜佑曰虞度也以我有法度之師擊彼無法度之兵梅堯臣曰慎備非常王皙曰以我之虞待敵之不虞也何氏曰春秋時城濮之役晋無楚備以敗於邲邲之役楚無晋備以敗於鄢自鄢已來晋不失備而加之以禮重之以睦是以楚弗能加晋又周末荆人伐陳吴救之軍行三十里雨十日夜不見星左史倚相謂大將子期曰雨十日夜甲輯兵聚吴人必至不如備之乃為陳而吴人至見荆有備而反左史曰其反覆六十里其君子外小人為食我行三十里擊之必克從之遂破吴軍魏大將軍南征吴到積湖魏將滿寵帥諸軍在前與敵隔水相對寵令諸將曰今夕風甚猛賊必來燒營宜豫為之備諸軍皆警夜半賊果遣十部來燒營寵掩擊破之又春秋衛人以燕師伐鄭鄭祭足原繁洩駕以三軍軍其前使曼伯與子元潜軍軍其後燕人畏鄭三軍而不虞制人六月鄭二公子以制人敗燕師于北制君子曰不備不虞不可以師又楚子重自陳伐莒圍渠丘渠丘城惡衆潰奔莒楚入渠丘莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒城亦惡庚申莒潰楚遂入鄆莒無備故也君子曰恃陋而不備罪之大者也備豫不虞善之大者也莒恃其陋而不修城郭浹辰之間而楚克其三都無備也夫張預曰常為不可勝以待敵故吴起曰出門如見敵士季曰有備不敗將能而君不御者勝曹操曰司馬法曰進退惟時無曰寡人也李筌曰將在外君命有所不受者勝真將軍也吴伐楚吴公子光弟夫槩王至請擊楚子常不許夫槩曰所謂見義而行不待命也今日我死楚可入也以其屬五千先擊子常敗之審此則將能而君不能御也晋宣帝拒諸葛於五丈原天子使辛毗仗節軍門曰敢問戰者斬亮聞笑曰苟能制吾豈千里請戰假言天子不許示武於衆此是不能之將杜牧曰尉繚子曰夫將者上不制乎天下不制乎地中不制乎人故兵者凶器也將者死官也杜佑曰將既精能曉練兵勢君能專任事不從中御故王子曰指授在君决戰在將也梅堯臣曰自閫以外將軍制之王皙曰君御能將者不能絶疑忌耳若賢明之主必能知人固當委任以責成効推轂授𨱆是其義也攻戰之事一以專之不從中御所以一威且盡其才也況臨敵乘機間不容髮安可遥制之乎何氏曰古者遣將於太廟親操鉞持其首授其柄曰從是以上至天者將軍制之乃復操柄授與刃曰從是以下至淵者將軍制之故李牧之為趙將居邊軍市之祖皆自用饗士賞賜決於外不從中御也周亞夫之軍細柳軍中唯聞將軍之命不聞天子之詔也蓋用兵之法一步百變見可則進知難而退而曰有王命焉是白大人以救火也未及反命而煨燼久矣曰有監軍焉是作舍道邊也謀無適從而終不可成矣故御能將而責平猾虜者如絆韓盧而求獲狡兔者又何異焉張預曰將有智勇之能則當任以責成功不可從中御也故曰閫外之事將軍裁之此五者知勝之道也曹操曰此上五事也故曰知彼知己者百戰不殆李筌曰量力而拒敵有何危殆乎杜牧曰以我之政料敵之政以我之將料敵之將以我之衆料敵之衆以我之食料敵之食以我之地料敵之地校量已定優劣短長皆先見之然後兵起故有百戰百勝也孟氏曰審知彼己强弱利害之勢雖百戰實無危殆乎梅堯臣曰彼己五者盡知之故無敗王皙曰殆危也謂校盡彼我之情知勝而後戰則百戰不危張預曰知彼知己者攻守之謂也知彼則可以攻知己則可以守攻是守之機守是攻之策苟能知之雖百戰不危也或曰士會察楚師之不可敵陳平料劉項之長短是知彼知己也不知彼而知己一勝一負李筌曰自以己强而不料敵則勝負未定秦主符堅以百萬之衆南伐或謂曰彼有人焉謝安桓沖江表偉才不可輕之堅曰我以八州之衆士馬百萬投鞭可斷江水何難之有後果敗續則其義也杜牧曰恃我之强不知敵不可伐者一勝一負王猛將終諫符堅曰晋氏雖在江表而正朔所禀謝安桓沖江表偉人不可伐也及堅南伐曰吾士馬百萬投鞭可濟遂有淝水之敗也陳皥曰杜說恃强之兵無名而伐無罪所以敗也非一勝一負之義杜佑曰雖不知敵之形勢恃己能克之者勝負各半梅堯臣曰自知己者勝負半也王皙曰但能計己不知敵之强弱則或勝或負張預曰唐太宗曰今之將臣雖未能知彼苟能知己則安有不利乎所謂知己者守吾氣而有待焉者也故知守而不知攻則勝負之半不知彼不知己每戰必殆李筌曰是謂狂㓂不敗何待也杜佑曰外不料敵内不知己用戰必殆梅堯臣曰一不知何以勝王皙曰全昩於計也張預曰攻守之術皆不知以戰則敗孫子註解卷之三
