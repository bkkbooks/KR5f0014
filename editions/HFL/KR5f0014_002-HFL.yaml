body:
  text: 作戰篇曹操曰欲戰必先筭其費務因糧於敵也李筌曰先定計然後修戰具是以戰次計之篇也王皙曰計以知勝然後興戰而具軍費猶不可以久也張預曰計筭已定然後完車馬利器械運糧草約費用以作戰備故次計孫子曰凡用兵之法馳車千駟革車千乗帶甲十萬曹操曰馳車輕車也駕駟馬革車重車也言萬騎之重車駕四馬率三萬軍養二人主炊家子一人主保固守衣裝廐二人主養馬凡五人步兵十人重以大車駕牛養二人主炊家子一人主守衣裝凡三人也帶甲十萬士卒數也李筌曰馳車戰車也革車輕車也帶甲步卒車一兩駕以駟馬步卒七十人計千駟之軍帶甲七萬馬四千匹孫子約以軍資之數以十萬為率則百萬可知也杜牧曰輕車乃戰車也古者車戰革車輜車重車也載器械財貨衣裝也司馬法曰一車甲士三人步卒七十二人炊家子十人固守衣裝五人廐養五人樵汲五人輕車七十五人重車二十五人故二乗兼一百人為一隊舉十萬之衆革車千乗校其費用支計則百萬之衆皆可知也梅堯臣曰馳車輕車也革車重車也凡輕車一乘甲士步卒二十五人重車一乗甲士步卒七十五人舉二車各千乘是帶甲者十萬人王皙曰曹公曰輕車也駕駟馬凡千乘皙謂馳車謂駕革車也一乘四馬為駟千駟則革車千乘曹公曰重車也皙謂革車兵車也有五戎千乗之賦諸侯之大者曹公曰帶甲十萬步卒數也皙謂井田之法甸出兵車一乘甲士三人步卒七十二人千乗總七萬五千人此言帶甲十萬豈當時權制歟何氏曰十萬舉成數也張預曰馳車即攻車也革車即守車也按曹公新書云攻車一乗前拒一隊左右角二隊共七十五人守車一乗炊子十人守裝五人廐養五人樵汲五人共二十五人攻守二乗凡一百人興師十萬則用車二千輕重各半與此同矣千里饋糧曹操曰越境千里李筌曰道理縣遠則内外之費賓客之用膠漆之材車甲之奉日費千金然後十萬之師舉矣曹操曰謂購賞猶在外李筌曰夫軍出於外則帑蔵竭於内舉千金者言多費也千里之外贏糧則二十人奉一人也杜牧曰軍有諸侯交聘之禮故曰賓客也車甲器械完緝修繕言膠漆者舉其微細千金者言費用多也猶贈賞在外也賈林曰計費不足未可以興師動衆故李太尉曰三軍之門必有賓客論議梅堯臣曰舉師十萬饋糧千里曰費如此師久之戒也王皙曰内謂國中外謂軍所也賓客若諸侯之使及軍中宴饗吏士也膠漆車甲舉細與大也何氏曰老師費財智者慮之張預曰去國千里即當因糧若須供餉則内外騷動疲困於路蠹耗無極也賓客者使命與遊士也膠漆者修飾器械之物也車甲者膏轄金革之類也約其所費日用千金然後能興十萬之師千金言重費也購賞猶在外其用戰也勝久則鈍兵挫銳攻城則力屈曹操曰鈍弊也屈盡也杜牧曰勝久謂淹久而後能勝也言與敵相持久而後勝則甲兵鈍弊銳氣挫衂攻城則人力殫盡屈折也賈林曰戰雖勝人久則無利兵貴全勝鈍兵挫銳士傷馬疲則屈梅堯臣曰雖勝且久則必兵仗鈍弊而軍氣挫銳攻城而久則力必殫屈王皙曰屈窮也求勝以久則鈍弊折挫攻城則益甚也張預曰及交兵合戰也久而後能勝則兵疲氣沮矣千里攻城力必困屈久暴師則國用不足孟氏曰久暴師露衆千里之外則軍國費用不足相供梅堯臣曰師久暴於外則輸用不給張預曰日費千金師久暴則國用豈能給若漢武帝窮征深討久而不解及其國用空虚乃下哀痛之詔是也夫鈍兵挫銳屈力殫貨則諸侯乗其弊而起雖有智者不能善其後矣李筌曰十萬衆舉日費千金非唯頓挫於外亦財殫於内是以聖人無暴師也隋大業初煬帝重兵好征力屈鴈門之下兵挫遼水之上疏河引淮轉輸彌廣出師萬里國用不足於是楊玄感李密乘其弊而起縱蘇威高熲豈能為之謀也杜牧曰蓋以師久不勝財力俱困諸侯乘之而起雖有智能之士亦不能於此之後善為謀畫也賈林曰人離財竭雖伊吕復生亦不能救此亡敗也杜佑曰雖當時有用兵之術不能防其後患梅堯臣曰取勝攻城暴師且久則諸侯乘此弊而起襲我我雖有智將不能制也王皙曰以其弊甚必有危亡之憂何氏曰其後謂共不勝而敵乘其危殆雖智者不能盡其善計而保全張預曰兵已疲矣力已困矣財已匱矣隣國因其罷弊起兵以襲之則縱有智能之人亦不能防其後患若吴伐楚入郢久而不歸越兵遂入吴當是時雖有伍員孫武之徒何嘗能為善謀於後乎故兵聞拙速未睹巧之久也曹操李筌曰雖拙有以速勝未睹者言其無也杜牧曰攻取之間雖拙於機智然以神速為上蓋無老師費財鈍兵之患則為巧矣孟氏曰雖拙有以速勝陳皥曰所謂疾雷不及掩耳卒電不及瞬目杜佑註同孟氏梅堯臣曰拙尚以速勝未見工而久可也王皙曰皙謂久則師老財費國虚人困巧者保無所患也何氏曰速雖拙不費財力也久雖巧恐生後患也後秦姚萇與符登相持萇將苟曜據逆萬堡密引符登萇與登戰敗於馬頭原收衆復戰姚碩德謂諸將曰上慎於輕戰每欲以計取之今戰既失利而更逼賊必有由也萇聞而謂碩德曰登用兵遲緩不識虚實今輕兵直進徑據吾東必苟曜與之連結也事久變成其禍難測所以速戰者欲使苟曜堅子謀之未就好之未深耳果大敗之武后初徐敬業舉兵於江都稱匡復皇家以盩厔尉魏思恭為謀主問計於思恭對曰明公既以太后幽縶少主志在匡復兵貴拙速宜早渡淮北親率大衆直入東都山東將士知公有勤王之舉必以死從此則指日刻期天下必定敬業欲從其策薛璋又說曰金陵之地王氣已見宜早應之兼有大江設險足可以自固請且攻取常潤等州以為王霸之業然後率兵北上鼓行而前此則退有所歸進無不利實良策也敬業以為然乃自率兵四千人南渡以擊潤州思恭密謂杜求仁曰兵勢宜合不可分今敬業不知并力渡淮率山東之衆以合洛陽必無能成事果敗張預曰但能取勝則寧拙速而無巧久若司馬宣王伐上庸以一月圖一年不計死傷與糧競者斯可謂欲拙速也夫兵久而國利者未之有也李筌曰春秋曰兵猶火也弗戢將自焚賈林曰兵久無功諸侯生心杜佑曰兵者凶器久則生變若智伯圍趙逾年不歸卒為襄子所擒身死國分故新序傳曰好戰窮武未有不亡者也梅堯臣曰力屈貨殫何利之有張預曰師老財竭於國何利故不盡知用兵之害者則不能盡知用兵之利也李筌曰利害相依之所生先知其害然後知其利也杜牧曰害之者勞人費財利之者吞敵拓境苟不顧己之患則舟中之人盡為敵國安能取利於敵人哉賈林曰將驕卒惰貪利忘變此害最甚也杜佑曰言謀國動軍行師不先慮危亡之禍則不足取利也若秦伯見襲鄭之利不顧崤函之敗吴王矜伐齊之功而忘姑蘇之禍也梅堯臣曰不再籍不三載利也百姓虚公家費害也苟不知害又安知利王皙曰久而能勝未免於害速則利斯盡也張預曰先知老師殫貨之害然後能知擒敵制勝之利善用兵者役不再籍糧不三載曹操曰籍猶賦也言初賦民而便取勝不復歸國發兵也始載糧後遂因食於敵還兵入國不復以糧迎之也李筌曰籍書也不再籍書恐人勞怨生也秦發關中之卒是以有陳吴之難也軍出度遠近饋之軍入載糧迎之謂之三載越境則館穀於敵無三載之義也杜牧曰審敵可攻審我可戰然後起兵便能勝敵而還鄭司農周禮註曰役謂發兵起役籍乃伍籍也比參為伍因内政寄軍令以伍籍發軍起役也陳皥曰籍借也不再借民而役也糧者往則載焉歸則迎之是不三載也不困乎兵不竭乎國言速而利也梅堯臣同陳皥註王皙同曹操註張預曰役謂興兵動衆之役故師卦註曰任大役重無功則凶籍謂調兵之符籍故漢制有尺籍伍符言一舉則勝不可再籍兵役於國也糧始出則載之越境則掠之歸國則迓之是不三載也此言兵不可久暴也取用於國因糧於敵故軍食可足也曹操曰兵甲戰具取用國中糧食因敵也李筌曰具我戎器因敵之食雖出師千里無匱乏也杜佑曰兵甲戰具取用國中糧食因敵也取資用於我國因糧食於敵家也晋師館穀於楚是也梅堯臣曰軍之須用取於國軍之糧餉因於敵何氏曰因謂兵出境鈔聚掠野至於克敵拔城得其儲積也張預曰器用取於國者以物輕而易致也糧食因於敵者以粟重而難運也夫千里饋糧則士有飢色故因糧則食可足國之貧於師者遠輸遠輸則百姓貧李筌曰兵役數起而賦歛重杜牧曰管子曰粟行三百里則國無一年之積粟行四百里則國無二年之積粟行五百里則衆有飢色此言粟重物輕也不可推移推移之則農夫耕牛俱失南畝故百姓不得不貧也賈林曰遠輸則財耗於道路弊於轉運百姓日貧孟氏曰兵車轉運千里之外財則費於道路人有困窮者張預曰以七十萬家之力供餉十萬之師於千里之外則百姓不得不貧近於師者貴賣貴賣則百姓財竭曹操曰軍行已出界近師者貪財皆貴賣則百姓虚竭也李筌曰夫近軍必有貨易百姓徇財殫産而從之竭也賈林曰師徒所聚物皆暴貴人貪非常之利竭財物以賣之初雖獲利殊多終當力疲貨竭又云既有非常之歛故賣者求價無厭百姓竭力買之自然家國虚盡也杜佑曰言近軍師市多非常之賣當時貪貴以趨末利然後財貨殫盡家國虚也梅堯臣曰遠者供役以轉饋近者貪利而貴賣皆貧國匱民之道也王皙曰夫遠輸則人勞費近市則物騰貴是故久師則為國患也曹公曰軍行已岀界近於師者貪財皆貴賣皙謂將出界也張預曰近師之民必貪利而貴貨其物於遠來輸餉之人則財不得不竭財竭則急於丘役張預曰財力殫竭則丘井之役急迫而不易供也或曰丘役謂如魯成公作丘甲也國用急迫乃使丘出甸賦違常制也丘十六井甸六十四井力屈財殫中原内虚於家百姓之費十去其七曹操曰丘十六井也百姓財殫盡而兵不解則運糧盡力於原野也十去其七者所破費也李筌曰兵久不止男女怨曠困於輸輓丘役力屈財殫而百姓之費十去其七杜牧曰司馬法曰六尺為步步百為畝畝百為夫夫三為屋屋三為井四井為邑四邑為丘四丘為甸丘蓋十六井也丘有戎馬一匹牛四頭甸有戎馬四匹牛十六頭丘車一乘甲士三人步卒七十二人今言兵不解則丘役益急百姓糧盡財竭力盡於原野家業十耗其七也陳皥曰丘聚也聚歛賦役以應軍須如此則財竭於人人無不困也王皙曰急者暴於常賦也若魯成公作丘甲是也如此則民費太半矣要見公費差減故云十七曹公曰丘十六井兵不觧則運糧盡力於原野何氏曰國以民為本民以食為天居人上者宜乎重惜張預曰運糧則力屈輸餉則財殫原野之民家産内虚度其所費十無其七也公家之費破車罷馬甲冑矢弩㦸楯蔽櫓丘牛大車十去其六一本作十去其七曹操曰丘牛謂丘邑之大車乃長轂車也李筌曰丘大也此數器者皆軍之所須言遠近之費公家之物十損於七也梅堯臣曰百姓以財糧力役奉軍之費其資十損乎七公家以牛馬器仗奉軍之費其資十損乎六是以竭賦窮兵百姓弊矣役急民貧國家虚矣王皙曰楯干也蔽可以屏蔽櫓大楯也丘牛古所謂匹馬丘牛也大車牛車也易曰大車以載張預曰兵以車馬為本故先言車馬疲敝也蔽櫓楯也今謂之彭排丘牛大牛也大車必革車也始言破車疲馬者謂攻戰之馳車也次言丘牛大車者即輜重之革車也公家車馬器械亦十損其六故智將務食於敵食敵一鍾當吾二十鍾𦮼秆一石當吾二十石曹操曰六斛四㪷為鍾𦮼豆稭也秆禾藁也石者一百二十斤也轉輸之法費二十石得一石一云𦮼音忌豆也七十斤為一石當吾二十言遠費也杜牧曰六石四㪷為一鍾一石一百二十斤𦮼豆稭也秆禾藁也或言𦮼秆藁也秦攻匈奴使天下運糧起於黄腄瑯琊負海之郡轉輸北河率三十鍾而致一石漢武建元中通西南夷作者數萬人千里負擔饋糧率十餘鍾致一石今校孫子之言食敵一鍾當吾二十鍾蓋約平地千里轉輸之法費二十石得一石不約道里蓋漏闕也黄腄音直瑞反又音誰在東萊北河即今之朔方郡李筌曰遠師轉一鍾之粟費二十鍾方可達軍將之智也務食於敵以省己之費也孟氏曰十斛為鍾計千里轉運道路耗費二十鍾可致一鍾於軍中矣梅堯臣註同曹操王皙曰曹公曰𦮼豆稭也秆藳也石者百二十斤也轉輸之法費二十乃得一皙謂上文千里饋糧則轉輸之法謂千里耳𦮼今作箕秆故書為芊當作秆張預曰六石四㪷為鍾一百二十斤為石𦮼豆稭也秆禾藳也千里饋糧則費二十鍾石而得一鍾石到軍所若越險阻則猶不啻故秦征匈奴率三十鍾而致一石此言能將必因糧於敵也故殺敵者怒也曹操曰威怒以致敵李筌曰怒者軍威也杜牧曰萬人非能同心皆怒在我激之以勢使然也田單守即墨使燕人劓降者掘城中人墳墓之類是也賈林曰人之無怒則不肯殺王皙曰兵主威怒何氏曰燕圍齊之即墨齊之降者盡劓齊人皆怒愈堅守田單又縱反間曰吾懼燕人掘吾城外冢墓戮辱先人可為寒心燕軍盡掘壠墓燒死人即墨人從城上望見皆泣涕其欲出戰怒自十倍單知士卒可用遂破燕師後漢班超使西域到鄯善會其吏士三十六人與共飲酒酣因激怒之曰今俱在絶域欲立大功以求富貴虜使到裁數日而王禮貌即廢如收吾屬送匈奴骸骨長為豺狼食矣官屬皆曰今在危亡之地死生從司馬超曰不入虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡也滅此虜則功成事立矣衆曰善初夜將吏士奔虜營會天大風超令十人持鼓藏虜舍後約曰見火燃皆當鳴鼓大呼餘人悉持弓弩夾門而伏超順風縱火虜衆驚亂衆悉燒死蜀龐統勸劉備襲益州牧劉璋備曰此大事不可倉卒及璋使備擊張魯乃從璋求萬兵及資寶欲以東行璋但許兵四千其餘皆給半備因激怒其衆曰吾為益州征强敵師徒勤瘁不遑寧居今積帑蔵之財而恡於賞功望士大夫為出死力戰其可得乎由是相與破璋張預曰激吾士卒使上下同怒則敵可殺尉繚子曰民之所以戰者氣也謂氣怒則人人自戰取敵之利者貨也曹操曰軍無財士不來軍無賞士不往李筌曰利者益軍實也杜牧曰使士見取敵之利者貨財也謂得敵之貨財必以賞之使人皆有欲各自為戰後漢荆州刺史度尚討桂州賊帥卜陽潘鴻等入南海破其三屯多獲珍寶而鴻等黨聚猶衆士卒驕富莫有闘志尚曰卜陽潘鴻作賊十年皆習於攻守當須諸郡併力可攻之今軍恣聽射獵兵士喜悅大小相與從禽尚乃密使人潜焚其營珍積皆盡獵者來還莫不泣涕尚曰卜陽等財貨足富數世諸卿但不併力耳所亡少少何足介意衆聞咸憤踴願戰尚令秣馬蓐食眀晨徑赴賊屯陽鴻不設備吏士乘銳遂破之此乃是也孟氏同杜牧註杜佑曰人知勝敵有厚賞之利則冒白刃當矢石而樂以進戰者皆貨財酬勳賞勞之誘也梅堯臣曰殺敵則激吾人以怒取敵則利吾人以貨王皙曰謂設厚賞耳若使衆貪利自取則或違節制耳張預曰以貨㗖士使人自為戰則敵利可取故曰重賞之下必有勇夫皇朝太祖命將伐蜀諭之曰所得州邑當與我傾竭帑庫以饗土卒國家所欲惟土疆耳於是將吏死戰所至皆下遂平蜀故車戰得車十乘已上賞其先得者曹操曰以車戰能得敵車十乘已上賞賜之不言車戰得車十乘已上者賞之而言賞得者何言欲開示賞其所得車之卒也陳車之法五車為隊僕射一人十車為官卒長一人車滿十乘將吏二人因而用之故别言賜之欲使將恩下及也或曰言使自有車十乘已上與敵戰但取其有功者賞之其十乘已下雖一乘獨得餘九乘皆賞之所以率進勵士也李筌曰重賞而勸進也杜牧曰夫得車十乘已上者蓋衆人用命之所致也若徧賞之則力不足與其所獲之車公家仍自以財貨賞其唱謀先登者此所以勸勵士卒故上文云取敵之利者貨也言十乘者舉其綱目也賈林曰勸未得者使自勉也梅堯臣曰徧賞則難周故奬一而勸百也王皙曰以財賞其所先得之卒張預曰車一乘凡七十五人以車與敵戰吾士卒能獲敵車十乘已上者吾士卒必不下千餘人也以其人衆故不能徧賞但以厚利賞其䧟陳先獲者以勸餘衆古人用兵必使車奪車騎奪騎步奪步故吴起與秦人戰令三軍曰若車不得車騎不得騎徒不得徒雖破軍皆無功而更其旌旗曹操曰與吾同也李筌曰惡色與吾同賈林曰令不識也張預曰變敵之色令與已同車雜而乘之曹操曰不獨任也李筌曰夫降虜之旌旗必更其色而雜其事車乃可用也杜牧曰士卒自獲敵車任雜然自乘之官不録也梅堯臣曰車許雜乘旗無因故王皙曰謂得敵車可與我車雜用之也張預曰已車與敵車參雜而用之不可獨任也卒善而養之張預曰所獲之卒必以恩信撫養之俾為我用是謂勝敵而益强曹操曰益已之强李筌曰後漢光武破銅馬賊於南陽虜衆數萬各配部曲然人心未安光武令各歸本營乃輕行其間以勞之相謂曰蕭王推赤心置人腹中安得不投死乎於是漢益振則其義也杜牧曰得敵卒也因敵之資益己之强梅堯臣曰獲卒則任其所長養之以恩必為我用也王皙曰得敵卒則養之與吾卒同善者謂勿侵辱之也若厚撫初附或失人心何氏曰因敵以勝敵何往不强張預曰勝其敵而獲其車與卒既為我用則是增已之强光武推赤心人人投死之類也故兵貴勝不貴久曹操曰久則不利兵猶火也不戢將自焚也孟氏曰貴速勝疾還也梅堯臣曰上所言皆貴速也速則省財用息民力也何氏曰孫子首尾言兵久之理蓋知兵不可玩武不可黷之深也張預曰久則師老財竭易以生變故但貴其速勝疾歸故知兵之將生民之司命國家安危之主也曹操曰將賢則國安也李筌曰將有殺伐之權威欲却敵人命所繫國家安危在於此矣杜牧曰民之性命國之安危皆由於將也梅堯臣曰此言任將之重王皙曰將賢則民保其生而國家安矣否則民被毒殺而國家危矣明君任屬可不精乎何氏曰民之性命國之治亂皆主於將將之材難古今所患也張預曰民之死生國之安危繫乎將之賢否孫子註觧卷之二
