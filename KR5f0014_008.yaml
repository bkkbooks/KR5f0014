body:
  text: 九變篇曹操曰變其正得其所用九也王皙曰皙謂九者數之極用兵之法當極其變耳逸詩云九變復貫不知曹公謂何為九或曰九地之變也張預曰變者不拘常法臨事適變從宜而行之之謂也凡與人爭利必知九地之變故次軍爭孫子曰凡用兵之法將受命於君合軍聚衆張預曰已解上文圯地無舍曹操曰無所依也水毁曰圯李筌曰地下曰圯行必水淹也陳皥曰圯低下也孔明謂之地獄獄者中下四面高也孟氏曰太下則為敵所囚杜佑曰擇地頓兵當趨利而避害也梅堯臣曰山林險阻沮澤之地不可舍止無所依也何氏曰下篇言圯地則吾將進其塗謂必固之地宜速去之也張預曰山林險阻沮澤凡難行之道為圯地以其無所依故不可舍止衢地交合曹操曰結諸侯也李筌曰四通曰衢結諸侯之交地也賈林曰結諸侯以為援梅堯臣曰夫四通之地與旁國相通當結其交也何氏曰下篇云衢地吾將固其結言交結諸侯使牢固也張預曰四通之地旁有鄰國先往結之以為交援絶地無留曹操曰無久止也李筌曰地無泉井畜牧采樵之處為絶地不可留也賈林曰溪谷坎險前無通路曰絶當速去無留梅堯臣曰始去國始出境猶不居輕地是不可久留也張預曰去國越境而師者絶地也危絶之地過於重地故不可淹留久止也圍地則謀曹操曰發奇謀也李筌曰因地能通賈林曰居四險之中曰圍地敵可往來我難出入居此地者可預設奇謀使敵不為我患乃可濟也梅堯臣曰往返險迂當出奇謀何氏曰下篇亦云圍地則謀言在艱險之地與敵相持須用奇險詭譎之謀不至於害也張預曰居前隘後固之地當發奇謀若漢高為胸奴所圍用陳平奇計得出兹近之死地則戰曹操曰殊死戰也李筌曰置兵於必死之地人自為私鬭韓信破趙此是也梅堯臣曰前後有礙决在死戰此而上舉九地之大約也王皙注上之五地並同曹公何氏曰下篇亦云死地則戰者此地速為死戰則生若緩而不戰氣衰糧絶不死何待也張預曰走無所往當殊死戰淮陰背水陳是也從圯地無舍至此為九變止陳五事者舉其大略也九地篇中說九地之變唯言六事亦陳其大略也凡地有勢有變九地篇上所陳者是其勢也下所叙者是其變也何以知九變為九地之變下文云將不通九變雖知地形不能得地利又九地篇云九地之變屈伸之利不可不察以此觀之義可見也下既說九地此復言九變者孫子欲叙五利故先陳九變蓋九變五利相須而用故兼言之塗有所不由曹操曰隘難之地所不當從不得已從之故為變李筌曰道有險狹懼其邀伏不可由也杜牧曰後漢光武遣將軍馬援耿舒討武陵五溪蠻軍次下雋今辰州也有兩道可入從壼頭則路近而水險從充道則路夷而運遠帝初以為疑及軍至耿舒欲從充道援以為棄日費糧不如進壼頭扼其咽喉則賊自破以事上之帝從援策乃進營壺頭賊乘高守隘水疾船不得上會暑濕士卒多疫死援亦中病卒耿舒與兄好畤侯書曰舒前上言當先擊充糧雖難運而兵馬得用軍人數萬爭欲先奮今壼頭竟不得進大衆怫鬱行死誠可痛惜賈林曰由從也途且不利雖近不從杜佑曰厄難之地所不當從也不得已從之故為變也梅堯臣曰避其險厄也王皙曰途雖可從而有所不從慮奇伏也若趙涉說周亞夫避殽黽厄狹之間慮置伏兵請走藍田出武關抵洛陽間不過差一二日是也張預曰險厄之地車不得方軌騎不得成列故不可由也不得已而行之必為權變韓信知陳餘不用李左車計乃敢入井陘口是也軍有所不擊曹操曰軍雖可擊以地險難久留之失前利若得之則利薄困窮之兵必死戰也杜牧曰蓋以鋭卒勿攻歸師勿遏窮寇勿迫死地不可攻或我彊敵弱敵前軍先至亦不可擊恐驚之退走也言有如此之軍皆不可擊斯統言為將須知有此不可擊之軍即須不擊益為知變也故列於九變篇中陳皥曰見小利不能傾敵則勿擊之恐重勞人也賈林曰軍可威懷勢將降伏則不擊寇窮據險擊則死戰可自固守待其心惰取之杜佑曰軍雖可擊以地險難久留之失前利若得之利薄也窮困之卒隘陷之軍不可攻為死戰也當固守之以待隙也梅堯臣曰往無利也王皙曰曹公曰軍雖可擊以地險難久留之失前利若得之則利薄皙謂餌兵鋭卒正正之旗堂堂之陳亦是也張預曰縱之而無所損克之而無所利則不須擊也又若我弱彼彊我曲彼直亦不可擊如晋楚相持士會曰楚人德刑政事典禮不易不可敵也不為是征義相近也城有所不攻曹操曰城小而固糧饒不可攻也操所以置華費而深入徐州得十四縣也杜牧曰操捨華費不攻故能兵力完全深入徐州得十四縣也蓋言敵於要害之地深峻城隍多積糧食欲留我師若攻拔之未足為利不拔則挫我兵勢故不可攻也宋順帝時荆州守沈攸之反素蓄士馬資用豐積戰士十萬甲馬二千軍至郢城功曹臧寅以為攻守異勢非旬日所拔若不時舉挫鋭損威今順流長驅計日可捷既傾根本則郢城豈能自固故兵法曰城有所不攻是也攸之不從郢郡守柳世隆拒攸之攸之盡鋭攻之不克衆潰走入林自縊後周武帝欲出兵於河陽以伐齊吏部宇文弼進曰今用兵須擇地河陽要衝精兵所聚盡力攻之恐難得志如臣所見彼汾之曲戌小山平攻之易拔用武之地莫過於此帝不納師竟無功復大舉伐齊卒用弼計以滅齊國家自元和三年至于今三十年間凡四攻寇魏薄攻寇之南宫縣上黨攻寇之臨城縣太原攻寇之河星鎮是寇三城池浚壁堅芻粟米石金炭麻膏凡城守之資常為不可勝之計以備官軍擊虜攻既不拔兵頓力疲寇以徑兵來救故百戰百敗故三十年間困天下之功力攻數萬之寇四圍其境通計十歲竟無尺寸之功者蓋常墮寇計中不能知變也賈林曰臣忠義重禀命堅守者亦不可攻也梅堯臣曰有所害也王皙曰城非控要雖可攻然懼於鈍兵挫鋭或非堅實而得士死力又剋雖有期而救兵至吾雖得之利不勝其所害也張預曰拔之而不能守委之而不為患則不須攻也又若深溝高壘卒不能下亦不可攻如士丐請伐逼陽荀罃曰城小而固勝之不武弗服為笑是也地有所不爭曹操曰小利之地方爭得而失之則不爭也杜牧曰言得之難守失之無害伍子胥諫夫差曰今我伐齊獲其地猶石田也東晋陶侃鎮武昌議者以武昌北岸有邾城宜分兵鎮之侃每不答而言者不已侃乃渡水獵引諸將佐語之曰我所以設險而禦寇正以長江耳邾城隔在江北內無所倚外接羣夷夷中利深晋人貪利夷不堪命必引寇虜乃致禍之由非禦寇也且今縱有兵守之亦無益於江南若羯虜有可乘之會此又非所資也後庾亮戍之果大敗也梅堯臣曰得之無益者王皙曰謂地雖要害敵已據之或得之無所用若難守者張預曰得之不便於戰失之無害於已則不須爭也又若遼遠之地雖得之終非己有亦不可爭如吳子伐齊伍員諫曰得地於齊猶獲石田也不如早從事於越不聽為越所滅是也君命有所不受曹操曰苟便於事不拘於君命也李筌曰苟便於事不拘君命穰苴斬莊賈魏絳戮楊干是也杜牧曰尉繚子曰兵者凶器也爭者逆德也將者死官也無天於上無地於下無敵於前無主於後賈林曰決必勝之機不可推於君命苟利社稷專之可也孟氏曰無敵於前無君於後閫外之事將軍制之梅堯臣曰從宜而行也此而上五利也張預曰苟便於事不從君命夫槩王曰見義而行不待命是也自塗有所不由至此為五利或曰自圯地無舍至地有所不爭為九變謂此九事皆不從中覆但臨時制宜故統之以君命有所不受故將通於九變之地利者知用兵矣李筌曰謂上之九事也杜佑曰九事之變皆臨時制宜不由常道故言變也賈林曰九變上九事將帥之任機權遇勢則變因利則制不拘常道然後得其通變之利變之則九數之則十故君命不在常變例也梅堯臣曰達九地之勢變而為利也王皙曰非賢智不能盡事理之變也何氏曰孫子以九變名篇解者十有餘家皆不條其九變之目者何也蓋自圯地無舍而下至君命有所不受其數十矣使人不得不惑愚熟觀文意上下止述其地之利害爾且十事之中君命有所不受且非地事昭然不類矣蓋孫子之意言凡受命之將合聚軍衆如經此九地有害而無利則當變之雖君命使之舍留攻爭亦不受也況下文言將不通於九變之利者雖知地形不能得地之利矣其君命豈得與地形而同算也況下之地形篇云戰道必勝主曰無戰必戰可也戰道不勝主曰必戰無戰可也厥旨盡在此矣張預曰更變常道而得其利者知用兵之道矣將不通於九變之利者雖知地形不能得地之利矣賈林曰雖知地形心無通變豈惟不得其利亦恐反受害也將貴適變也梅堯臣曰知地不知變安得地之利張預曰凡地有形有變知形而不曉變豈能得地之利治兵不知九變之術雖知五利不能得人之用矣曹操曰謂下五事也九變一云五變賈林曰五利五變亦在九變之中遇勢能變則利不變則害在人故無常體能盡此理乃得人之用也五變謂途雖近知有險阻奇伏之變而不由軍雖可擊知有窮蹙死鬭之變而不擊城雖勢孤可攻知有糧充兵鋭將智臣忠不測之變而不攻地雖可爭知得之難守得之無利有反奪傷人之變而不爭君命雖宜從之知有內御不利之害而不受此五變者臨時制宜不可預定貪五利者途近則由軍勢孤則擊城勢危則攻地可取則爭軍可用則受命貪此五利不知其變豈惟不得人用抑亦敗軍傷士也梅堯臣曰知利不知變安得人而用王皙曰雖知五地之利不通其變如膠柱鼓瑟耳張預曰凡兵有利有變知利而不識變豈能得人之用曹公言下五事為五利者謂九變之下五事也非謂雜於利害已下五事也是故智者之慮必雜於利害曹操曰在利思害在害思利當難行權也李筌曰害彼利此之慮賈林曰雜一為親一為難言利害相參雜智者能慮之慎之乃得其利也梅堯臣同曹操注王皙曰將通九變則利害盡矣張預曰智者慮事雖處利地必思所以害雖處害地必思所以利此亦通變之謂也雜於利而務可信也曹操曰計敵不能依五地為我害所務可信也杜牧曰信申也言我欲取利於敵人不可但見取敵人之利先須以敵人害我之事參雜而計量之然後我所務之利乃可申行也賈林曰在利之時則思害以自慎一云以害雜利行之威令以臨之刑法以戮之已不二三則衆務皆信人不敢欺也梅堯臣曰以害參利則事可行王皙曰曲盡其利則可勝矣張預曰以所害而參所利可以伸己之事鄭師克蔡國人皆喜惟子産懼曰小國無文德而有武功禍莫大焉後楚果伐鄭此是在利思害也雜於害而患可解也曹操曰既參於利則亦計於害雖有患可解也李筌曰智者為利害之事必合於道不至於極杜牧曰我欲解敵人之患不可但見敵能害我之事亦須先以我能取敵人之利參雜而計量之然後有患乃可解釋也故上文云智者之慮必雜於利害也譬如敵人圍我我若但知突圍而去志必懈怠即必為追擊未若勵士奮擊因戰勝之利以解圍也舉一可知也賈林曰在害之時則思利而免害故措之死地則生投之亡地則存是其患解也梅堯臣曰以利參害則禍可脫王皙曰周知其害則不敗矣何氏曰利害相生明者常慮張預曰以所利而參所害可以解已之難張方入洛陽連戰皆敗或勸方宵遁方曰兵之利鈍是常貴因敗以為成耳夜潜進逼敵遂致克捷此是在害思利也是故屈諸侯者以害曹操曰害其所惡也李筌曰害其政也杜牧曰惡音一路反言敵人苟有其所惡之事我能乘而害之不失其機則能屈敵也賈林曰為害之計理非一途或誘其賢智令彼無臣或遺以姦人破其政令或為巧詐間其君臣或遺工巧使其人疲財耗或潰淫樂變其風俗或與美人惑亂其心此數事若能潜運陰謀密行不泄皆能害人使之屈折也梅堯臣曰制之以害則屈也王皙曰窮屈於必害之地勿使可解也張預曰致之於受害之地則自屈服或曰間之使君臣相疑勞之使民失業所以害之也若韋孝寬間斛律光高熲平陳之策是也役諸侯者以業曹操曰業事也使其煩勞若彼入我出彼出我入也李筌曰煩其農也杜牧曰言勞役敵人使不得休我須先有事業乃可為也事業者兵衆國富人和令行也杜佑曰能以事勞役諸侯之人令不得安佚韓人令秦鑿渠之類是也或以奇技藝業淫巧功能令其耽之心目內役諸侯若此而勞梅堯臣曰撓之以事則勞王皙曰常若為攻襲之業以弊敵也田常曰吾兵業已加魯矣張預曰以事勞之使不得休或曰壓之以富彊之業則可役使若晋楚國彊鄭人以犧牲玉帛奔走以事之是也趨諸侯者以利曹操曰令自來也李筌曰誘之以利杜牧曰言以利誘之使自來至我也墮吾畫中孟氏曰趨速也善示以利令忘變而速至我作變以制之亦謂得人之用也梅堯臣同杜牧注王皙曰趨敵之間當周旋我利也張預曰動之以小利使之必趨故用兵之法無恃其不來恃吾有以待也梅堯臣曰所恃者不懈也無恃其不攻恃吾有所不可攻也曹操曰安不忘危常設備也李筌曰預備不可闕也杜佑曰安則思危存則思亡常有備梅堯臣曰所賴者有備也王皙曰備者實也何氏曰吳略曰君子當安平之世刀劔不離身古諸侯相見兵衛不徹警蓋雖有文事必有武備況守邊固圉交刃之際歟凡兵所以勝者謂擊其空虛襲其懈怠苟嚴整終事則敵人不至傳曰不備不虞不可以師昔晋人禦秦深壘固軍以待之秦師不能久楚為陳而吳人至見有備而返程不識將屯正部曲行伍營陳擊刁斗吏治軍簿虜不得犯朱然為軍師雖世無事每朝夕嚴鼓兵在營者咸行裝就隊使敵不知所備故出輒有功是謂能外禦其侮者乎常能居安思危在治思亂戒之於無形防之於未然斯善之善者也其次莫如險其走集明其伍候慎固其封守繕完其溝隍或多調軍食或益修戰械故曰物不素具不可以應卒又曰惟事事乃其有備有備無患常使彼勞我佚彼老我壯亦可謂先人有奪人之心不戰而屈人之師也若夫莒以恃陋而潰齊以狎敵而殲虢以易晋而亡魯以果邾而敗莫敖小羅而無次吳子入巢而自輕斯皆可以作鑒也故吾有以待吾有所不可攻者能豫備之之謂也張預曰言須思患而預防之傳曰不備不虞不可以師故將有五危李筌張預曰下五事也必死可殺也曹操曰勇而無慮必欲死鬭不可曲撓可以奇伏中之李筌曰勇而無謀也杜牧曰將愚而勇者患也黃石公曰勇者好行其志愚者不顧其死吳子曰凡人之論將常觀於勇勇之於將乃數分之一耳夫勇者必輕合輕合而不知利未可將也梅堯臣同李筌注何氏曰司馬法曰上死不勝言貴其謀勝也張預曰勇而無謀必欲死鬭不可與力爭當以奇伏誘致而殺之故司馬法曰上死不勝言將無策略止能以死先士卒則不勝也必生可虜也曹操曰見利畏法不進也李筌曰疑怯可虜也杜牧曰晋將劉裕泝江追桓玄戰于峥嶸洲于時義軍數千玄兵甚盛而玄懼有敗衄常漾輕舸於舫側故其衆莫有鬭心義軍秉風縱火盡鋭爭先玄衆是以大敗也孟氏曰將之怯弱志必生返意不親戰士卒不精上下猶豫可急擊而取之新訓曰為將怯懦見利而不能進太公曰失利後時反受其殃梅堯臣曰怯而不果王皙曰無鬭志曹公曰見利怯不進也皙謂見害亦輕走矣何氏曰司馬法曰上生多疑疑為大患也張預曰臨陳畏怯必欲生返當鼓噪乘之可以虜也晋楚相攻晋將趙嬰齊令其徒先具舟於河欲敗而先濟是也忿速可侮也曹操曰疾急之人可忿怒侮而致之也李筌曰急疾之人性剛而可侮致也太宗殺宋老生而平霍邑杜牧曰忿者剛怒也速者褊急也性不厚重也若敵人如此可以凌侮使之輕進而敗之也十六國姚襄攻黃落前秦符生遣符黃眉鄧羌討之襄深溝高壘固守不戰鄧羌說黃眉曰襄性剛狠易以剛動若長驅鼓行直壓其壘必忿而出師可一戰而擒也黃眉從之襄怒出戰黃眉等斬之杜佑曰急疾之人可忿怒而致死忿速易怒者狷戇疾急不計其難可動作欺侮梅堯臣曰狷急易動王皙曰將性貴持重忿狷則易撓張預曰剛愎褊急之人可凌侮而致之楚子玉剛忿晋人執其使以怒之果從晋師遂為所敗是也廉潔可辱也曹操曰廉潔之人可汙辱致之也李筌曰矜疾之人可辱也杜佑曰此言敵人若高壁固壘欲老我師我勢不可留利在速戰揣知其將多忿急則輕侮而致之性本廉潔則汙辱之如諸葛孔明遺司馬仲達以巾幗欲使怒而出戰仲達忿怒欲濟師魏帝遣辛毗仗節以止之仲達之才猶不勝其忿況常才之人乎梅堯臣曰徇名不顧王皙同曹操注張預曰清潔愛民之士可垢辱以撓之必可致也愛民可煩也曹操曰出其所必趨愛民者則必倍道兼行以救之救之則煩勞也李筌曰攻其所愛必卷甲而救愛其人乃可以計疲杜牧曰言仁人愛人者惟恐殺傷不能捨短從長棄彼取此不度遠近不量事力凡為我攻則必來救如此可以煩之令其勞頓而後取之也陳皥曰兵有須救不必救者項羽救趙此須救也亞父委梁不必救也賈林曰廉潔之人不好侵掠愛人之仁不好鬭戰辱而煩之其動必敗梅堯臣曰力疲則困王皙曰以奇兵若將攻城邑者彼愛民必數救則煩勞也張預曰民雖可愛當審利害若無微不救無遠不援則出其所必趨使煩而困也凡此五者將之過也用兵之灾也陳皥曰良將則不然不必死不必生隨事而用不忿遠不耻辱見可如虎否則閉户動靜以計不可喜怒也梅堯臣曰皆將之失為兵之凶何氏曰將材古今難之其性往往失於一偏爾故孫子首篇言將者智信仁勇嚴貴其全也張預曰庸常之將守一而不知變故取則於已為凶於兵智者則不然雖勇而不必死雖怯而不必生雖剛而不可侮雖廉而不可辱雖仁而不可煩也覆軍殺將必以五危不可不察也賈林曰此五種之人不可任為大將用兵必敗也梅堯臣曰當慎重焉張預曰言須識權變不可執一道也孫子注解卷之八
